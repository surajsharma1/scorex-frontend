<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Broadcast Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Roboto', sans-serif; }
        
        .strip {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; height: 80px;
            background: #121212; color: #fff;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-top: 3px solid #00e676;
        }

        .section { padding: 0 20px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #333; }
        
        .match-info { min-width: 120px; }
        .teams { font-weight: 900; font-size: 20px; letter-spacing: 1px; color: #bdbdbd; }
        .teams span { color: #fff; }

        .score-box { min-width: 140px; background: #1e1e1e; align-items: center; }
        .big-score { font-size: 36px; font-weight: 900; color: #00e676; }
        .overs { font-size: 14px; color: #9e9e9e; font-weight: bold; }

        .batter-box { min-width: 200px; font-size: 14px; }
        .batter { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .batter.active { color: #00e676; font-weight: bold; }
        .batter.active::after { content: '*'; }

        .bowler-box { min-width: 180px; background: #1e1e1e; }
        .bowler-name { font-weight: bold; color: #2979ff; margin-bottom: 5px; }
        .balls-vec { display: flex; gap: 3px; }
        .dot { width: 18px; height: 18px; background: #424242; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .dot.bound { background: #2979ff; color: white; }
        .dot.out { background: #ff1744; color: white; }

    </style>
</head>
<body>
    <div class="strip">
        <div class="section match-info">
            <div class="teams"><span id="bat">IND</span> v <span id="bwl">AUS</span></div>
            <div style="font-size: 10px; opacity: 0.6; margin-top: 5px;">LIVE</div>
        </div>
        <div class="section score-box">
            <div class="big-score"><span id="sc">0</span>/<span id="wk">0</span></div>
            <div class="overs"><span id="ov">0.0</span> OVS</div>
        </div>
        <div class="section batter-box">
            <div class="batter active"><span id="p1">Striker</span> <span id="s1">0</span></div>
            <div class="batter"><span id="p2">Non-Striker</span> <span id="s2">0</span></div>
        </div>
        <div class="section bowler-box">
            <div style="display:flex; justify-content:space-between;">
                <span class="bowler-name" id="bname">Bowler</span>
                <span style="font-size:12px;" id="bfig">0/0</span>
            </div>
            <div class="balls-vec" id="bvec"></div>
        </div>
    </div>

    <script src="/overlays/engine.js"></script>
    <script>
        // Custom update function for this overlay's specific element IDs
        function updateBroadcastBar(data) {
            console.log('Updating broadcast bar with:', data);
            
            // Handle different data formats
            var team1 = data.team1 || {};
            var team2 = data.team2 || {};
            var striker = data.striker || {};
            var nonStriker = data.nonStriker || {};
            var bowler = data.bowler || {};
            
            // Team names
            var batTeam = document.getElementById('bat');
            var bwlTeam = document.getElementById('bwl');
            if (batTeam) batTeam.innerText = team1.name ? team1.name.substring(0,3).toUpperCase() : (data.team1Name || 'IND').substring(0,3);
            if (bwlTeam) bwlTeam.innerText = team2.name ? team2.name.substring(0,3).toUpperCase() : (data.team2Name || 'AUS').substring(0,3);
            
            // Score
            var scEl = document.getElementById('sc');
            var wkEl = document.getElementById('wk');
            var ovEl = document.getElementById('ov');
            
            if (scEl) scEl.innerText = data.team1Score || team1.score || data.score1 || 0;
            if (wkEl) wkEl.innerText = data.team1Wickets || team1.wickets || data.wickets1 || 0;
            if (ovEl) ovEl.innerText = data.team1Overs || team1.overs || data.overs1 || '0.0';
            
            // Batsmen
            var p1 = document.getElementById('p1');
            var s1 = document.getElementById('s1');
            var p2 = document.getElementById('p2');
            var s2 = document.getElementById('s2');
            
            if (p1) p1.innerText = data.strikerName || striker.name || 'Striker';
            if (s1) s1.innerText = data.strikerRuns || striker.runs || 0;
            if (p2) p2.innerText = data.nonStrikerName || nonStriker.name || 'Non-Striker';
            if (s2) s2.innerText = data.nonStrikerRuns || nonStriker.runs || 0;
            
            // Bowler
            var bname = document.getElementById('bname');
            var bfig = document.getElementById('bfig');
            
            if (bname) bname.innerText = data.bowlerName || bowler.name || 'Bowler';
            if (bfig) bfig.innerText = (data.bowlerWickets || bowler.wickets || 0) + '/' + (data.bowlerRuns || bowler.runsConceded || 0);
            
            // Balls vector
            var bvec = document.getElementById('bvec');
            if (bvec && data.stats && data.stats.last5Overs) {
                bvec.innerHTML = '';
                var balls = data.stats.last5Overs.toString().split('');
                balls.forEach(function(r) {
                    var d = document.createElement('div');
                    d.className = 'dot ' + (['4','6'].includes(r) ? 'bound' : r === 'W' ? 'out' : '');
                    d.innerText = r;
                    bvec.appendChild(d);
                });
            }
        }
        
        // Listen for postMessage directly (from LiveScoring)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_SCORE' && event.data.data) {
                console.log('Direct postMessage received in broadcast-bar:', event.data.data);
                updateBroadcastBar(event.data.data);
            }
        });
        
        console.log('Broadcast Bar overlay initialized with engine.js');
    </script>
</body>
</html>
