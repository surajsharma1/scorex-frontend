<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Broadcast Bar (Thin)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { background: transparent; overflow: hidden; color: #fff; }

    /* Top Island */
    #top-island {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: white;
      padding: 6px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      border: 2px solid #fff;
    }

    /* Event Popup (4, 6, OUT) */
    #event-popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 120px;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 0 10px 30px rgba(0,0,0,0.8);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #event-popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

    /* Ultra-thin Bottom Bar */
    #bottom-bar {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 96%;
      height: 50px;
      background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      border-radius: 8px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
    }

    .segment { height: 100%; display: flex; align-items: center; padding: 0 20px; border-right: 1px solid rgba(255,255,255,0.1); }
    .segment:last-child { border-right: none; }

    /* Score Area */
    .score-seg { background: #e94560; min-width: 200px; justify-content: space-between; }
    .team-name { font-size: 20px; font-weight: 900; }
    .score-txt { font-size: 24px; font-weight: 900; color: #ffd700; }
    .overs-txt { font-size: 13px; margin-left: 10px; opacity: 0.9; }

    /* Player Areas */
    .player-seg { flex: 1; font-size: 16px; justify-content: space-around; }
    .batter { display: flex; align-items: baseline; gap: 8px; }
    .b-name { font-weight: 700; }
    .b-runs { font-weight: 900; color: #fff; }
    .b-balls { font-size: 12px; color: #bbb; }
    
    .on-strike { color: #e94560; }
    .on-strike .b-runs { color: #e94560; }

    .bowler-seg { min-width: 300px; justify-content: flex-start; gap: 15px; }
    .lbl { font-size: 11px; color: #aaa; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="top-island">SCOREX CHAMPIONSHIP</div>
  <div id="event-popup"></div>

  <div id="bottom-bar">
    <div class="segment score-seg">
      <span id="teamName" class="team-name">IND</span>
      <div>
        <span class="score-txt"><span id="teamScore">142</span>/<span id="teamWickets">3</span></span>
        <span class="overs-txt">OV <span id="teamOvers">15.2</span></span>
      </div>
    </div>

    <div class="segment player-seg">
      <div class="batter on-strike">
        <span class="lbl">▶</span>
        <span id="strikerName" class="b-name">V. Kohli</span>
        <span id="strikerRuns" class="b-runs">64</span>
        <span class="b-balls">(<span id="strikerBalls">41</span>)</span>
      </div>
      <div class="batter">
        <span id="nonStrikerName" class="b-name">S. Yadav</span>
        <span id="nonStrikerRuns" class="b-runs">12</span>
        <span class="b-balls">(<span id="nonStrikerBalls">8</span>)</span>
      </div>
    </div>

    <div class="segment bowler-seg">
      <span class="lbl">BOWLER:</span>
      <span id="bowlerName" class="b-name">M. Starc</span>
      <span class="b-runs" style="color:#4caf50;"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">24</span></span>
      <span class="b-balls">(<span id="bowlerOvers">2.2</span>)</span>
    </div>
  </div>

  <script>
    let pScore = -1, pWickets = -1, iState = 0, pData = {};

    function set(id, val) { 
      const e = document.getElementById(id); 
      if(e && val !== undefined) e.innerText = val; 
    }

    function triggerEvent(text, color) {
      const popup = document.getElementById('event-popup');
      popup.innerText = text;
      popup.style.color = color;
      popup.classList.add('show');
      setTimeout(() => popup.classList.remove('show'), 3000);
    }

    setInterval(() => {
      const el = document.getElementById('top-island');
      if(!pData.tournamentName) return;
      iState = (iState + 1) % 3;
      if(iState === 0) el.innerText = pData.tournamentName;
      else if(iState === 1) el.innerText = "BATTING: " + pData.team1Name;
      else el.innerText = pData.target > 0 ? "TARGET: " + pData.target : pData.status || "LIVE";
    }, 5000);

    function handleData(d) {
      pData = d;
      set('teamName', d.team1Name);
      set('teamScore', d.team1Score); set('teamWickets', d.team1Wickets); set('teamOvers', d.team1Overs);
      set('strikerName', d.strikerName); set('strikerRuns', d.strikerRuns); set('strikerBalls', d.strikerBalls);
      set('nonStrikerName', d.nonStrikerName); set('nonStrikerRuns', d.nonStrikerRuns); set('nonStrikerBalls', d.nonStrikerBalls);
      set('bowlerName', d.bowlerName); set('bowlerRuns', d.bowlerRuns); set('bowlerWickets', d.bowlerWickets); set('bowlerOvers', d.bowlerOvers);

      let cS = parseInt(d.team1Score)||0, cW = parseInt(d.team1Wickets)||0;
      if (pScore !== -1) {
        if (cW > pWickets) triggerEvent("OUT!", "#ff3333");
        else if (cS - pScore === 6) triggerEvent("SIX!", "#33ccff");
        else if (cS - pScore === 4) triggerEvent("FOUR!", "#4caf50");
      }
      pScore = cS; pWickets = cW;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') handleData(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') handleData(e.data.data); };
  </script>
</body>
</html>
