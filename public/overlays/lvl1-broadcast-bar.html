<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Minimal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Roboto', sans-serif; }
        
        .strip {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; height: 80px;
            background: #121212; color: #fff;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-top: 3px solid #00e676;
        }

        .section { padding: 0 20px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #333; }
        
        .match-info { min-width: 120px; }
        .teams { font-weight: 900; font-size: 20px; letter-spacing: 1px; color: #bdbdbd; }
        .teams span { color: #fff; }

        .score-box { min-width: 140px; background: #1e1e1e; align-items: center; }
        .big-score { font-size: 36px; font-weight: 900; color: #00e676; }
        .overs { font-size: 14px; color: #9e9e9e; font-weight: bold; }

        .batter-box { min-width: 200px; font-size: 14px; }
        .batter { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .batter.active { color: #00e676; font-weight: bold; }
        .batter.active::after { content: '*'; }

        .bowler-box { min-width: 180px; background: #1e1e1e; }
        .bowler-name { font-weight: bold; color: #2979ff; margin-bottom: 5px; }
        .balls-vec { display: flex; gap: 3px; }
        .dot { width: 18px; height: 18px; background: #424242; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .dot.bound { background: #2979ff; color: white; }
        .dot.out { background: #ff1744; color: white; }

    </style>
</head>
<body>
    <div class="strip">
        <div class="section match-info">
            <div class="teams"><span id="bat">IND</span> v <span id="bwl">AUS</span></div>
            <div style="font-size: 10px; opacity: 0.6; margin-top: 5px;">LIVE</div>
        </div>
        <div class="section score-box">
            <div class="big-score"><span id="sc">0</span>/<span id="wk">0</span></div>
            <div class="overs"><span id="ov">0.0</span> OVS</div>
        </div>
        <div class="section batter-box">
            <div class="batter active"><span id="p1">Striker</span> <span id="s1">0</span></div>
            <div class="batter"><span id="p2">Non-Striker</span> <span id="s2">0</span></div>
        </div>
        <div class="section bowler-box">
            <div style="display:flex; justify-content:space-between;">
                <span class="bowler-name" id="bname">Bowler</span>
                <span style="font-size:12px;" id="bfig">0/0</span>
            </div>
            <div class="balls-vec" id="bvec"></div>
        </div>
    </div>

<script>
        const config = window.OVERLAY_CONFIG || { apiBaseUrl: 'http://localhost:5000/api/v1' };
        const socket = io(config.apiBaseUrl);
        if(config.matchId) socket.emit('join_match', config.matchId);

        // ========== BROADCAST CHANNEL (from ScoreboardUpdate.tsx) ==========
        let broadcastChannel = null;
        try {
            broadcastChannel = new BroadcastChannel('cricket_score_updates');
            broadcastChannel.onmessage = (event) => {
                console.log('BroadcastChannel message received:', event.data);
                handleScoreUpdate(event.data);
            };
        } catch (e) {
            console.log('BroadcastChannel not supported');
        }

        // ========== POST MESSAGE (from LiveScoring.tsx via iframe) ==========
        window.addEventListener('message', (event) => {
            console.log('PostMessage received:', event.data);
            if (event.data && event.data.type === 'UPDATE_SCORE' && event.data.data) {
                handleScoreUpdate(event.data.data);
            }
        });

        // ========== UNIFIED UPDATE HANDLER ==========
        function handleScoreUpdate(d) {
            if (!d) return;
            
            // Handle ScoreboardUpdate format (team1/team2 objects with nested data - has batsmen array)
            if (d.team1 && typeof d.team1 === 'object' && d.team1.batsmen) {
                // Determine which team is batting
                const battingTeam = d.battingTeam || 'team1';
                const battingData = d[battingTeam] || {};
                const bowlingTeam = battingTeam === 'team1' ? 'team2' : 'team1';
                const bowlingData = d[bowlingTeam] || {};
                
                // Update scores
                document.getElementById('sc').innerText = battingData.score || 0;
                document.getElementById('wk').innerText = battingData.wickets || 0;
                
                // Update overs
                const overs = battingData.overs || 0;
                const balls = battingData.balls || 0;
                document.getElementById('ov').innerText = `${overs}.${balls}`;
                
                // Update team names
                document.getElementById('bat').innerText = d.team1?.name || 'Team 1';
                document.getElementById('bwl').innerText = d.team2?.name || 'Team 2';
                
                // Update striker
                if (battingData.batsmen && battingData.batsmen[0]) {
                    document.getElementById('p1').innerText = battingData.batsmen[0].name || 'Striker';
                    document.getElementById('s1').innerText = battingData.batsmen[0].runs || 0;
                }
                
                // Update non-striker
                if (battingData.batsmen && battingData.batsmen[1]) {
                    document.getElementById('p2').innerText = battingData.batsmen[1].name || 'Non-Striker';
                    document.getElementById('s2').innerText = battingData.batsmen[1].runs || 0;
                }
                
                // Update bowler
                if (battingData.bowler) {
                    document.getElementById('bname').innerText = battingData.bowler.name || 'Bowler';
                    document.getElementById('bfig').innerText = `${battingData.bowler.wickets || 0}/${battingData.bowler.runs || 0}`;
                }
                
                // Update last 5 overs balls
                const v = document.getElementById('bvec');
                v.innerHTML = '';
                const last5 = d.stats?.last5Overs || d.lastFiveOvers || '';
                if (typeof last5 === 'string') {
                    last5.split('').forEach(r => {
                        if (['0','1','2','3','4','6','W','w'].includes(r)) {
                            const b = document.createElement('div');
                            b.className = `dot ${['4','6'].includes(r) ? 'bound' : ['W','w'].includes(r) ? 'out' : ''}`;
                            b.innerText = r;
                            v.appendChild(b);
                        }
                    });
                }
            }
            // Handle LiveScoring format (flat team1Score, team2Score, etc.)
            else if (d.team1Score !== undefined || d.team2Score !== undefined) {
                // Team 1 is batting
                document.getElementById('sc').innerText = d.team1Score || 0;
                document.getElementById('wk').innerText = d.team1Wickets || 0;
                document.getElementById('ov').innerText = d.team1Overs || '0.0';
                document.getElementById('bat').innerText = d.team1Name || 'Team 1';
                document.getElementById('bwl').innerText = d.team2Name || 'Team 2';
                
                // Update striker
                document.getElementById('p1').innerText = d.strikerName || 'Striker';
                document.getElementById('s1').innerText = d.strikerRuns || 0;
                
                // Update non-striker
                document.getElementById('p2').innerText = d.nonStrikerName || 'Non-Striker';
                document.getElementById('s2').innerText = d.nonStrikerRuns || 0;
                
                // Update bowler
                document.getElementById('bname').innerText = d.bowlerName || 'Bowler';
                document.getElementById('bfig').innerText = `${d.bowlerWickets || 0}/${d.bowlerRuns || 0}`;
            }
            // Handle legacy socket format
            else if (d.score !== undefined) {
                document.getElementById('sc').innerText = d.score;
                document.getElementById('wk').innerText = d.wickets;
                document.getElementById('ov').innerText = d.overs;
                document.getElementById('bat').innerText = d.battingTeam;
                document.getElementById('bwl').innerText = d.bowlingTeam;
                
                if(d.striker) {
                    document.getElementById('p1').innerText = d.striker.name;
                    document.getElementById('s1').innerText = d.striker.runs;
                }
                if(d.nonStriker) {
                    document.getElementById('p2').innerText = d.nonStriker.name;
                    document.getElementById('s2').innerText = d.nonStriker.runs;
                }
                if(d.bowler) {
                    document.getElementById('bname').innerText = d.bowler.name;
                    document.getElementById('bfig').innerText = `${d.bowler.wickets}/${d.bowler.runsConceded}`;
                }

                const v = document.getElementById('bvec');
                v.innerHTML = '';
                (d.thisOver || []).forEach(r => {
                    const b = document.createElement('div');
                    b.className = `dot ${['4','6'].includes(r) ? 'bound' : r === 'W' ? 'out' : ''}`;
                    b.innerText = r;
                    v.appendChild(b);
                });
            }
        }

        // Keep original socket listener for backward compatibility
        socket.on('match_update', d => {
            handleScoreUpdate(d);
        });
    </script>
</body>
</html>
