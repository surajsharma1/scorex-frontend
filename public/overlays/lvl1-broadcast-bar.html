<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; font-family: 'Roboto', sans-serif; }
        
        .strip {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; height: 80px;
            background: #121212; color: #fff;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-top: 3px solid #00e676;
        }

        .section { padding: 0 20px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #333; }
        
        .match-info { min-width: 120px; }
        .teams { font-weight: 900; font-size: 20px; letter-spacing: 1px; color: #bdbdbd; }
        .teams span { color: #fff; }

        .score-box { min-width: 140px; background: #1e1e1e; align-items: center; }
        .big-score { font-size: 36px; font-weight: 900; color: #00e676; }
        .overs { font-size: 14px; color: #9e9e9e; font-weight: bold; }

        .batter-box { min-width: 200px; font-size: 14px; }
        .batter { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .batter.active { color: #00e676; font-weight: bold; }
        .batter.active::after { content: '*'; }

        .bowler-box { min-width: 180px; background: #1e1e1e; }
        .bowler-name { font-weight: bold; color: #2979ff; margin-bottom: 5px; }
        .balls-vec { display: flex; gap: 3px; }
        .dot { width: 18px; height: 18px; background: #424242; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        .dot.bound { background: #2979ff; color: white; }
        .dot.out { background: #ff1744; color: white; }

    </style>
</head>
<body>
    <div class="strip">
        <div class="section match-info">
            <div class="teams"><span id="bat"></span> v <span id="bwl"></span></div>
            <div style="font-size: 10px; opacity: 0.6; margin-top: 5px;"></div>
        </div>
        <div class="section score-box">
            <div class="big-score"><span id="sc"></span>/<span id="wk"></span></div>
            <div class="overs">Overs: <span id="ov"></span></div>
        </div>
        <div class="section batter-box">
            <div class="batter active" id="p1"><span id="s1"></span></div>
            <div class="batter" id="p2"><span id="s2"></span></div>
        </div>
        <div class="section bowler-box">
            <div class="bowler-name" id="bname"></div>
            <div class="balls-vec" id="bvec"></div>
        </div>
    </div>

    <script src="/overlays/overlay-utils.js"></script>
    <script src="/overlays/engine.js"></script>
    <script>
        // Broadcast Bar Overlay - Enhanced with multiple event listeners
        
        console.log('Broadcast Bar overlay initialized');
        
        // Main update function
        function updateBroadcastBar(data) {
            console.log('Broadcast Bar updating with:', data);
            
            // Get all elements with fallbacks
            var batEl = document.getElementById('bat');
            var bwlEl = document.getElementById('bwl');
            var scEl = document.getElementById('sc');
            var wkEl = document.getElementById('wk');
            var ovEl = document.getElementById('ov');
            
            // Update team names
            if (batEl) batEl.innerText = (data.team1Name || 'IND').substring(0, 3).toUpperCase();
            if (bwlEl) bwlEl.innerText = (data.team2Name || 'AUS').substring(0, 3).toUpperCase();
            
            // Update score
            if (scEl) scEl.innerText = data.team1Score || data.score1 || 0;
            if (wkEl) wkEl.innerText = data.team1Wickets || data.wickets1 || 0;
            if (ovEl) ovEl.innerText = data.team1Overs || data.overs1 || '0.0';
            
            // Update batsmen
            var p1 = document.getElementById('p1');
            var s1 = document.getElementById('s1');
            var p2 = document.getElementById('p2');
            var s2 = document.getElementById('s2');
            
            if (p1) p1.innerHTML = (data.strikerName || 'Striker') + ' <span id="s1">' + (data.strikerRuns || 0) + '</span>';
            if (p2) p2.innerHTML = (data.nonStrikerName || 'Non-Striker') + ' <span id="s2">' + (data.nonStrikerRuns || 0) + '</span>';
            
            // Update bowler
            var bname = document.getElementById('bname');
            if (bname) bname.innerText = data.bowlerName || 'Bowler';
            
            // Update balls vector
            var bvec = document.getElementById('bvec');
            if (bvec && data.last5Overs) {
                bvec.innerHTML = '';
                var balls = data.last5Overs.toString().split('');
                balls.forEach(function(r) {
                    var d = document.createElement('div');
                    d.className = 'dot ' + (['4','6'].includes(r) ? 'bound' : r === 'W' ? 'out' : '');
                    d.innerText = r;
                    bvec.appendChild(d);
                });
            }
        }
        
        // Method 1: Listen for postMessage from parent (LiveScoring.tsx)
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_SCORE' && event.data.data) {
                console.log('Broadcast Bar: postMessage received');
                updateBroadcastBar(event.data.data);
            }
        });
        
        // Method 2: Listen for BroadcastChannel events
        if (typeof BroadcastChannel !== 'undefined') {
            try {
                var bc = new BroadcastChannel('cricket_score_updates');
                bc.onmessage = function(event) {
                    console.log('Broadcast Bar: BroadcastChannel message received');
                    updateBroadcastBar(event.data);
                };
            } catch(e) {
                console.log('BroadcastChannel not supported in overlay');
            }
        }
        
        // Method 3: Listen for custom scoreUpdated event
        window.addEventListener('scoreUpdated', function(e) {
            console.log('Broadcast Bar: scoreUpdated event received');
            if (e.detail) {
                updateBroadcastBar(e.detail);
            }
        });
        
        // Method 4: Socket.io events (via engine.js)
        if (typeof socket !== 'undefined') {
            socket.on('scoreUpdate', function(data) {
                console.log('Broadcast Bar: Socket scoreUpdate received');
                if (data.match) {
                    updateBroadcastBar(data.match);
                }
            });
        }
        
        console.log('Broadcast Bar overlay ready - listening for updates');
    </script>
</body>
</html>
