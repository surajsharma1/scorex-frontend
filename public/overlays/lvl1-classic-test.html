<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Broadcast Heavyweight</title>
  <style>
    /* Heavy, condensed fonts for that premium sports TV look */
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@500;700;900&display=swap');

    :root {
      --net-navy: #0a1128;
      --net-gold: #ffb703;
      --net-gold-dark: #fb8500;
      --net-white: #ffffff;
      --net-gray: #e5e5e5;
      --net-red: #d90429;
      --text-dark: #14213d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--net-white);
      font-family: 'Roboto', sans-serif;
    }

    /* Entrance Animations */
    @keyframes slideInLeft {
      0% { transform: translateX(-50px) skewX(-10deg); opacity: 0; }
      100% { transform: translateX(0) skewX(-10deg); opacity: 1; }
    }
    @keyframes slideInRight {
      0% { transform: translateX(50px) skewX(-10deg); opacity: 0; }
      100% { transform: translateX(0) skewX(-10deg); opacity: 1; }
    }

    /* Continuous Metallic Shimmer */
    @keyframes metallicShimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Top Static Island */
    #bh-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--net-navy);
      color: var(--net-white);
      font-family: 'Oswald', sans-serif;
      font-size: 14px; 
      font-weight: 700; 
      letter-spacing: 2px;
      padding: 6px 40px;
      border-bottom: 3px solid var(--net-gold);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
      animation: slideInLeft 0.5s ease-out forwards;
    }

    /* The Main Bottom Bar Wrapper - Adds the master slant */
    #bh-bottom {
      position: absolute; 
      bottom: 25px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      padding: 0 2vw;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
    }

    /* Module Containers */
    .bh-mod {
      display: flex; 
      align-items: center; 
      padding: 10px 45px;
      transform: skewX(-10deg); /* The broadcast slant */
      opacity: 0; /* Handled by animation */
    }

    /* Un-skew the text inside the modules */
    .unskew {
      transform: skewX(10deg);
      display: flex;
      align-items: center;
      width: 100%;
    }

    /* 1. Score Panel (Gold Shimmer) */
    .mod-score {
      background: linear-gradient(90deg, var(--net-gold) 0%, #ffd000 50%, var(--net-gold) 100%);
      background-size: 200% auto;
      color: var(--text-dark);
      flex: 0 1 350px;
      animation: slideInLeft 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, metallicShimmer 4s linear infinite;
      border-left: 8px solid var(--net-navy);
      z-index: 3;
    }

    /* 2. Batting Panel (White/Gray) */
    .mod-bat {
      background: var(--net-white);
      color: var(--text-dark);
      flex: 1 1 auto;
      margin-left: -15px; /* Overlap to remove gaps */
      padding-left: 60px;
      animation: slideInLeft 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s forwards;
      border-right: 2px solid var(--net-gray);
      z-index: 2;
    }

    /* 3. Bowling Panel (Navy) */
    .mod-bowl {
      background: var(--net-navy);
      flex: 0 1 360px;
      margin-left: -15px; /* Overlap */
      padding-left: 60px;
      animation: slideInRight 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards;
      border-right: 8px solid var(--net-red);
      z-index: 1;
    }

    /* Typography Classes */
    .tm { 
      font-family: 'Oswald', sans-serif; 
      font-size: 26px; 
      font-weight: 700; 
      letter-spacing: -0.5px;
      margin-bottom: 5px;
      line-height: 1;
    }
    .sc { 
      font-family: 'Oswald', sans-serif; 
      font-size: 52px; 
      font-weight: 700; 
      line-height: 0.85; 
    }
    .sc span { font-size: 28px; color: var(--net-gold-dark); margin: 0 2px;}
    .ov { 
      font-family: 'Roboto', sans-serif;
      font-size: 15px; 
      font-weight: 900; 
      color: var(--net-navy); 
      margin-left: 15px; 
    }

    .pn { font-size: 22px; font-weight: 900; letter-spacing: -0.5px;}
    .ps { 
      font-family: 'Oswald', sans-serif; 
      font-size: 42px; 
      font-weight: 700; 
      margin-left: 15px;
      line-height: 0.85;
    }
    .pb { font-family: 'Roboto', sans-serif; font-size: 15px; color: #6b7280; margin-left: 8px; font-weight: 700;}
    
    .lbl { 
      font-family: 'Roboto', sans-serif; 
      font-size: 12px; 
      color: var(--net-gray); 
      letter-spacing: 1px; 
      font-weight: 700;
      margin-bottom: 2px;
    }
    
    .v-div { 
      width: 2px; 
      height: 40px; 
      background: var(--net-gray); 
      margin: 0 25px;
    }

  </style>
</head>
<body>

  <div id="bh-island">SCOREX LIVE . BROADCAST PRO</div>

  <div id="bh-bottom">
    
    <div class="bh-mod mod-score">
      <div class="unskew" style="justify-content: space-between;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore" style="color:var(--text-dark); font-size: 52px;">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers" style="font-size: 20px;">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="bh-mod mod-bat">
      <div class="unskew" style="justify-content: center;">
        <div style="display:flex; align-items:baseline;">
          <span style="color:var(--net-gold-dark); font-size: 14px; margin-right:10px;">▶</span>
          <span id="strikerName" class="pn">Striker</span>
          <span id="strikerRuns" class="ps" style="color:var(--net-gold-dark);">0</span>
          <span class="pb">(<span id="strikerBalls">0</span>)</span>
        </div>
        
        <div class="v-div"></div>
        
        <div style="display:flex; align-items:baseline; opacity: 0.6;">
          <span id="nonStrikerName" class="pn">Non-Striker</span>
          <span id="nonStrikerRuns" class="ps" style="color:var(--text-dark);">0</span>
        </div>
      </div>
    </div>

    <div class="bh-mod mod-bowl">
      <div class="unskew" style="justify-content: space-between;">
        <div style="display:flex; flex-direction:column;">
          <span class="lbl">CURRENT BOWLER</span>
          <span id="bowlerName" class="pn">Bowler Name</span>
        </div>
        <div style="display:flex; align-items:baseline;">
          <span class="ps" style="color:var(--net-red);"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
          <span class="pb" style="color:var(--net-gray);">OV <span id="bowlerOvers" style="color:var(--net-white);">0.0</span></span>
        </div>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      // Handle raw data or normalized data
      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to your engine's triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
