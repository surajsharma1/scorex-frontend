<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Floating Cloud Pill</title>
  <style>
    /* Clean, round, modern font */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    :root {
      --cloud-bg: rgba(255, 255, 255, 0.95);
      --cloud-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      --cloud-border: rgba(255, 255, 255, 1);
      
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --accent-coral: #f43f5e;
      
      --text-dark: #1e293b;
      --text-gray: #64748b;
      --text-light: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--text-dark);
      font-family: 'Poppins', sans-serif;
    }

    /* Animations */
    @keyframes popIn {
      0% { transform: scale(0.9) translateY(40px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pulseDot {
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Top Static Island */
    #cloud-island {
      position: absolute; 
      top: 20px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--cloud-bg);
      backdrop-filter: blur(10px);
      color: var(--accent-blue);
      font-size: 13px; 
      font-weight: 700; 
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 30px;
      border-radius: 40px;
      box-shadow: var(--cloud-shadow);
      border: 1px solid var(--cloud-border);
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* Bottom Bar Wrapper */
    #cloud-bottom {
      position: absolute; 
      bottom: 30px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 20px;
      padding: 0 2vw;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
      opacity: 0;
    }

    /* Pill Containers */
    .cloud-pill {
      background: var(--cloud-bg);
      backdrop-filter: blur(15px);
      border: 1px solid var(--cloud-border);
      border-radius: 60px; /* Fully rounded edges */
      display: flex; 
      align-items: center; 
      padding: 12px 40px;
      box-shadow: var(--cloud-shadow);
      animation: gentleFloat 6s ease-in-out infinite;
    }

    /* Stagger the float animation so they don't move exactly together */
    .mod-score { animation-delay: 0s; }
    .mod-bat { animation-delay: 0.5s; flex: 1 1 auto; justify-content: space-around; }
    .mod-bowl { animation-delay: 1s; }

    /* Typography & Data Styling */
    .tm { 
      font-size: 14px; 
      font-weight: 700; 
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: -2px;
    }
    .sc { 
      font-size: 44px; 
      font-weight: 800; 
      line-height: 1; 
      color: var(--accent-blue);
      letter-spacing: -1px;
    }
    .sc span { font-size: 24px; color: var(--text-light); font-weight: 600; margin: 0 4px;}
    .ov { 
      font-size: 14px; 
      font-weight: 700; 
      color: var(--text-gray); 
      margin-left: 20px; 
      background: #f1f5f9;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .ov span { color: var(--text-dark); font-weight: 800; font-size: 16px; margin-left: 4px;}

    .pn { font-size: 18px; font-weight: 700; }
    .ps { 
      font-size: 32px; 
      font-weight: 800; 
      margin-left: 12px;
      line-height: 1;
      letter-spacing: -1px;
    }
    .pb { font-size: 14px; color: var(--text-light); margin-left: 8px; font-weight: 600;}
    
    .lbl { 
      font-size: 12px; 
      color: var(--text-light); 
      letter-spacing: 1px; 
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* Active Indicator Dot */
    .active-dot {
      width: 10px;
      height: 10px;
      background-color: var(--accent-green);
      border-radius: 50%;
      display: inline-block;
      margin-right: 12px;
      animation: pulseDot 2s infinite;
    }
    
    .v-div { 
      width: 2px; 
      height: 30px; 
      background: #e2e8f0; 
      margin: 0 20px;
      border-radius: 2px;
    }

  </style>
</head>
<body>

  <div id="cloud-island">SCOREX LIVE STREAM</div>

  <div id="cloud-bottom">
    
    <div class="cloud-pill mod-score">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OVERS <span id="teamOvers">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="cloud-pill mod-bat">
      <div style="display:flex; align-items:center;">
        <span class="active-dot"></span>
        <div style="display:flex; align-items:baseline;">
          <span id="strikerName" class="pn" style="color:var(--text-dark);">Striker</span>
          <span id="strikerRuns" class="ps" style="color:var(--accent-green);">0</span>
          <span class="pb">(<span id="strikerBalls">0</span>)</span>
        </div>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:var(--text-gray);">0</span>
      </div>
    </div>

    <div class="cloud-pill mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">BOWLER</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline; margin-left: 20px;">
        <span class="ps" style="color:var(--accent-coral); margin-left:0;"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="ov">OV <span id="bowlerOvers">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
