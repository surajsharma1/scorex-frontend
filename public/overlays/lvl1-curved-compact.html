<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Curved Compact (Thin)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
    body { background: transparent; overflow: hidden; color: #fff; }

    /* Top Island */
    #island-pill {
      position: absolute;
      top: 15px; left: 50%; transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.9);
      border: 2px solid #ff5722;
      padding: 6px 25px;
      border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    /* Big Event Popup */
    #event-anim {
      position: absolute;
      top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
      font-size: 110px; font-weight: 900; text-transform: uppercase;
      color: #fff;
      text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 0 0 40px #ff5722;
      opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #event-anim.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Bottom Assembly */
    #bottom-assembly {
      position: absolute;
      bottom: 15px; left: 5%;
      width: 90%; height: 50px;
      display: flex; align-items: center;
    }

    /* Score Circle */
    .score-circle {
      width: 66px; height: 66px;
      background: linear-gradient(135deg, #ff5722 0%, #d84315 100%);
      border-radius: 50%;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border: 3px solid #fff;
      box-shadow: 0 5px 15px rgba(255, 87, 34, 0.5);
      z-index: 10;
      flex-shrink: 0;
    }
    .c-score { font-size: 22px; font-weight: 900; line-height: 1; }
    .c-wkts { font-size: 14px; color: #ffe0b2; }

    /* Attached Slick Bar */
    .slick-bar {
      flex-grow: 1;
      height: 44px;
      background: rgba(20, 20, 25, 0.95);
      margin-left: -20px; /* Pulls bar behind circle */
      padding-left: 35px; /* Makes room for overlapping circle */
      border-radius: 0 22px 22px 0;
      border: 1px solid rgba(255,255,255,0.1);
      border-left: none;
      display: flex; align-items: center; justify-content: space-between;
      padding-right: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .grp { display: flex; align-items: center; gap: 20px; font-size: 15px; }
    .b-name { font-weight: 700; color: #fff; }
    .b-run { font-weight: 900; color: #ff5722; font-size: 18px; margin-left: 5px; }
    .b-ball { color: #aaa; font-size: 12px; }
    .b-sub { color: #bbb; font-weight: 500; font-size: 13px;}
    
    .divider { width: 1px; height: 20px; background: #444; }
  </style>
</head>
<body>

  <div id="island-pill">SUMMER CUP T20</div>
  <div id="event-anim"></div>

  <div id="bottom-assembly">
    <div class="score-circle">
      <div class="c-score" id="teamScore">186</div>
      <div class="c-wkts">W: <span id="teamWickets">4</span></div>
    </div>
    
    <div class="slick-bar">
      
      <div class="grp" style="margin-right: auto; gap: 10px;">
        <span id="teamName" style="font-weight:900; font-size: 18px; letter-spacing:1px;">TEAM</span>
        <span class="b-ball">OV: <span id="teamOvers">14.2</span></span>
      </div>

      <div class="grp">
        <div style="display:flex; align-items:baseline;">
          <span style="color:#ff5722; font-size:10px; margin-right:4px;">▶</span>
          <span id="strikerName" class="b-name">Batter 1</span>
          <span id="strikerRuns" class="b-run">56</span>
          <span class="b-ball">(<span id="strikerBalls">32</span>)</span>
        </div>

        <div class="divider"></div>

        <div style="display:flex; align-items:baseline;">
          <span id="nonStrikerName" class="b-sub">Batter 2</span>
          <span id="nonStrikerRuns" class="b-run" style="color:#ccc; font-size:15px;">22</span>
        </div>

        <div class="divider"></div>

        <div style="display:flex; align-items:baseline; gap: 8px;">
          <span class="b-ball">BOWL:</span>
          <span id="bowlerName" class="b-name">Bowler X</span>
          <span class="b-run" style="color: #4caf50; font-size: 16px;"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">28</span></span>
        </div>
      </div>

    </div>
  </div>

  <script>
    let pScore = -1, pWickets = -1, iState = 0, pData = {};
    const set = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function flash(text, color) {
      const p = document.getElementById('event-anim');
      p.innerText = text; p.style.color = color;
      p.classList.add('show');
      setTimeout(() => p.classList.remove('show'), 3200);
    }

    setInterval(() => {
      const el = document.getElementById('island-pill');
      if(!pData.tournamentName) return;
      iState = (iState + 1) % 3;
      if(iState === 0) el.innerText = pData.tournamentName;
      else if(iState === 1) el.innerText = "CRR: " + (pData.runRate || "0.0");
      else el.innerText = pData.target > 0 ? "TARGET: " + pData.target : "1ST INNINGS";
    }, 4500);

    function rx(d) {
      pData = d;
      set('teamName', d.team1Name); set('teamScore', d.team1Score); set('teamWickets', d.team1Wickets); set('teamOvers', d.team1Overs);
      set('strikerName', d.strikerName); set('strikerRuns', d.strikerRuns); set('strikerBalls', d.strikerBalls);
      set('nonStrikerName', d.nonStrikerName); set('nonStrikerRuns', d.nonStrikerRuns);
      set('bowlerName', d.bowlerName); set('bowlerRuns', d.bowlerRuns); set('bowlerWickets', d.bowlerWickets);

      let cS = parseInt(d.team1Score)||0, cW = parseInt(d.team1Wickets)||0;
      if (pScore !== -1) {
        if (cW > pWickets) flash("OUT!", "#f44336");
        else if (cS - pScore === 6) flash("SIX!", "#03a9f4");
        else if (cS - pScore === 4) flash("FOUR!", "#4caf50");
      }
      pScore = cS; pWickets = cW;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
