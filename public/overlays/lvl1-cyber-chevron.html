<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Tech Glass & Emerald (Edge-to-Edge)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700;900&family=Inter:wght@400;600;800;900&display=swap');

    :root {
      --em-bg-dark: rgba(2, 6, 23, 0.95);
      --em-bg-glass: rgba(15, 23, 42, 0.85);
      --em-green: #10b981;
      --em-green-glow: #34d399;
      --em-white: #f8fafc;
      --em-gray: #94a3b8;
      --em-dark-gray: #334155;
      --em-red: #ef4444;
      --em-blue: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--em-white);
      font-family: 'Inter', sans-serif;
    }

    /* Entrance Animations */
    @keyframes bootUp { 
      0% { transform: translateY(100px); opacity: 0; } 
      100% { transform: translateY(0); opacity: 1; } 
    }
    @keyframes neonPulse { 
      0%, 100% { box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.2); } 
      50% { box-shadow: inset 0 0 30px rgba(16, 185, 129, 0.6); } 
    }
    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 5px var(--em-green); }
      50% { text-shadow: 0 0 20px var(--em-green-glow); }
    }

    /* Static Top Island */
    #em-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--em-bg-dark); border: 1px solid var(--em-green);
      color: var(--em-green-glow); font-family: 'Chakra Petch', sans-serif; 
      font-size: 16px; font-weight: 700; letter-spacing: 5px; padding: 6px 40px;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
      clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 100%, 0 100%);
      animation: bootUp 0.4s ease-out forwards;
    }

    /* Edge to Edge Bottom Bar */
    #em-bottom {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 90px;
      display: flex; background: var(--em-bg-glass); backdrop-filter: blur(12px);
      border-top: 2px solid var(--em-green);
      animation: bootUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
    }

    /* Layout Blocks */
    .em-block {
      display: flex; height: 100%; border-right: 1px solid var(--em-dark-gray);
      position: relative;
    }

    /* 1. Score Block */
    .em-score-zone {
      flex: 0 0 420px; display: flex;
      background: linear-gradient(90deg, rgba(16,185,129,0.1), transparent);
    }
    
    .team-box { 
      font-family: 'Chakra Petch', sans-serif; font-size: 50px; font-weight: 700; 
      color: var(--em-white); padding: 0 30px; display: flex; align-items: center; 
      border-right: 2px solid var(--em-green); background: rgba(0,0,0,0.4);
      animation: textGlow 3s infinite;
    }
    
    .score-data { display: flex; flex-direction: column; justify-content: center; padding-left: 25px; }
    .score-txt { font-family: 'Chakra Petch', sans-serif; font-size: 65px; font-weight: 700; line-height: 0.8; }
    .score-txt span { font-size: 35px; color: var(--em-gray); margin: 0 5px; }
    .ov-txt { font-size: 16px; font-weight: 800; color: var(--em-green-glow); margin-top: 4px; letter-spacing: 1px;}

    /* 2. Batting Block */
    .em-bat-zone { 
      flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 40px;
    }
    .bat-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .bat-row:last-child { border-bottom: none; }
    
    .b-name-wrap { display: flex; align-items: center; gap: 12px; flex: 1; }
    .b-ind { width: 4px; height: 20px; background: var(--em-green); box-shadow: 0 0 8px var(--em-green); }
    .b-name { font-size: 20px; font-weight: 800; color: #fff; }
    .b-runs { font-family: 'Chakra Petch', sans-serif; font-size: 40px; font-weight: 700; color: var(--em-white); line-height: 1; width: 50px; text-align: right;}
    .b-balls { font-size: 15px; color: var(--em-gray); width: 50px; text-align: right; font-weight: 800;}
    
    .bat-row.inactive .b-ind { opacity: 0; }
    .bat-row.inactive .b-name { color: var(--em-gray); font-size: 18px; }
    .bat-row.inactive .b-runs { font-size: 30px; color: var(--em-gray); }

    /* 3. Bowling Block */
    .em-bowl-zone { 
      flex: 0 0 500px; display: flex; flex-direction: column; justify-content: center; padding: 0 40px; border-right: none;
    }
    
    .bw-main { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;}
    .bw-name { font-size: 20px; font-weight: 800; flex: 1; color: var(--em-white); }
    .bw-name span { color: var(--em-gray); font-size: 14px; margin-right: 10px; }
    .bw-fig { font-family: 'Chakra Petch', sans-serif; font-size: 42px; font-weight: 700; color: var(--em-green); line-height: 0.8; }
    .bw-ov { font-size: 15px; color: var(--em-white); font-weight: 800; margin-left: 20px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px;}

    .this-over-row { display: flex; align-items: center; gap: 10px; padding-top: 8px; }
    .this-over-row span { font-size: 13px; color: var(--em-gray); font-weight: 900; letter-spacing: 1px; }
    .ball-dot { width: 16px; height: 16px; border-radius: 2px; background: rgba(0,0,0,0.5); border: 1px solid var(--em-dark-gray); }
    .ball-dot.fill { background: var(--em-green); border-color: var(--em-green); box-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }


    /* =========================================
       4. EVENT ANIMATIONS (4, 6, OUT, DECISION)
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Chakra Petch', sans-serif; font-size: 190px; font-weight: 900; line-height: 1;
      text-align: center; opacity: 0; text-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }
    
    .anim-event.fire { animation: techPop 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: var(--em-blue); -webkit-text-stroke: 3px #fff; }
    #ev-six { color: var(--em-green); -webkit-text-stroke: 4px #fff; font-size: 240px; text-shadow: 0 0 50px rgba(16, 185, 129, 0.8); }
    #ev-out { color: var(--em-red); -webkit-text-stroke: 4px #fff; }

    /* Tech Radar for Decision Pending */
    .d-title { font-size: 18px; color: var(--em-gray); letter-spacing: 8px; margin-bottom: 5px; font-weight: 800;}
    .d-text { font-family: 'Chakra Petch', sans-serif; font-size: 85px; color: var(--em-green-glow); line-height: 1; white-space: nowrap;}

    @keyframes techPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) translateY(-50px); opacity: 0; }
    }

    @keyframes techRadarPulse { 
      0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); } 
      70% { box-shadow: 0 0 0 60px rgba(16, 185, 129, 0); } 
      100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } 
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR!</div>
    <div id="ev-six" class="anim-event">SIX!</div>
    <div id="ev-out" class="anim-event">OUT!</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="em-island">SYS.LINK // LIVE MATCH</div>

  <div id="em-bottom">
      
    <div class="em-block em-score-zone">
      <div class="team-box" id="teamName">TM</div>
      <div class="score-data">
        <div class="score-txt"><span id="teamScore" style="color:#fff; margin:0;">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov-txt">OVERS <span id="teamOvers" style="color:#fff; font-size:22px; margin-left: 6px;">0.0</span></div>
      </div>
    </div>

    <div class="em-block em-bat-zone">
      <div class="bat-row">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="strikerName">Striker Name</div></div>
        <div class="b-runs" id="strikerRuns">0</div>
        <div class="b-balls">(<span id="strikerBalls">0</span>)</div>
      </div>
      <div class="bat-row inactive">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="nonStrikerName">Non-Striker</div></div>
        <div class="b-runs" id="nonStrikerRuns">0</div>
        <div class="b-balls">(<span id="nonStrikerBalls">0</span>)</div>
      </div>
    </div>

    <div class="em-block em-bowl-zone">
      <div class="bw-main">
        <div class="bw-name"><span>BOWLER</span> <span id="bowlerName" style="color:var(--em-white); font-size: 22px;">Name</span></div>
        <div style="display:flex; align-items:baseline;">
          <div class="bw-fig"><span id="bowlerWickets">0</span><span style="color:var(--em-gray); font-size:28px; margin:0 4px;">-</span><span id="bowlerRuns">0</span></div>
          <div class="bw-ov">OV <span id="bowlerOvers" style="color:var(--em-green-glow);">0.0</span></div>
        </div>
      </div>
      <div class="this-over-row" id="this-over">
        <span>THIS OVER</span>
        <div class="ball-dot"></div>
      </div>
    </div>

  </div>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/overlays/overlay-utils.js"></script>
<script src="/overlays/engine.js"></script>
<script src="/overlays/overlay-handlers.js"></script>
<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  let eventTimer = null;

  const safeSet = (id, val, fallback) => {
    const el = $(id);
    if (!el) return;
    const v = (val != null && val !== '') ? val : (fallback !== undefined ? fallback : '');
    el.innerText = String(v);
  };

  function processData(d) {
    if (!d) return;

    const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0, 4).toUpperCase();
    safeSet('teamName',      tName);
    safeSet('teamScore',     d.team1Score    ?? d.teamScore,    0);
    safeSet('teamWickets',   d.team1Wickets  ?? d.teamWickets,  0);
    safeSet('teamOvers',     d.team1Overs    ?? d.teamOvers,    '0.0');

    safeSet('strikerName',   d.strikerName,    'Striker');
    safeSet('strikerRuns',   d.strikerRuns,    0);
    safeSet('strikerBalls',  d.strikerBalls,   0);

    safeSet('nonStrikerName',  d.nonStrikerName,  'Non-Striker');
    safeSet('nonStrikerRuns',  d.nonStrikerRuns,  0);
    safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

    safeSet('bowlerName',    d.bowlerName,    'Bowler');
    safeSet('bowlerRuns',    d.bowlerRuns,    0);
    safeSet('bowlerWickets', d.bowlerWickets, 0);
    safeSet('bowlerOvers',   d.bowlerOvers,   '0.0');

    // Ball renderer
    if (typeof window.renderCurrentOver === 'function') {
      window.renderCurrentOver(d.thisOver || []);
    }
  }

  function handleTrigger(t) {
    const evFour     = $('ev-four');
    const evSix      = $('ev-six');
    const evOut      = $('ev-out');
    if (!evFour || !evSix || !evOut || !evDecision) return;

    // Clear all active animations first
    evFour.classList.remove('fire');
    evSix.classList.remove('fire');
    evOut.classList.remove('fire');
    clearTimeout(eventTimer);

    if (t.type === 'FOUR') {
      evFour.classList.add('fire');
      eventTimer = setTimeout(() => evFour.classList.remove('fire'), 3000);
    } else if (t.type === 'SIX') {
      evSix.classList.add('fire');
      eventTimer = setTimeout(() => evSix.classList.remove('fire'), 3000);
    } else if (t.type === 'WICKET') {
      evOut.classList.add('fire');
      eventTimer = setTimeout(() => evOut.classList.remove('fire'), 3000);
    } else if (t.type === 'RESTORE') {
      evDecision.classList.remove('fire');
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'UPDATE_SCORE' && e.data.data) {
      processData(e.data.data);
    }
    if (e.data.type === 'OVERLAY_TRIGGER' && e.data.payload) {
      handleTrigger(e.data.payload);
    }
  });
})();
</script>
</body>
</html>
