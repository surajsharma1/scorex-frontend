<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Neon Cyber-Glass</title>
  <style>
    /* Premium tech fonts */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Rajdhani:wght@500;600;700;900&display=swap');

    :root {
      --neon-cyan: #00f2fe;
      --neon-magenta: #fe0979;
      --glass-bg: rgba(10, 15, 30, 0.75);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
    }

    /* Initial Load Animation */
    @keyframes slideUpFade {
      0% { transform: translateY(50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes neonBreathe {
      0%, 100% { text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan); }
      50% { text-shadow: 0 0 15px var(--neon-cyan), 0 0 25px var(--neon-cyan); }
    }

    /* Top Static Island */
    #cyber-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-bottom: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px; 
      font-weight: 700; 
      letter-spacing: 3px;
      padding: 6px 30px;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.2);
      animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* The Main Bottom Bar Wrapper */
    #cyber-bottom {
      position: absolute; 
      bottom: 20px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 15px;
      padding: 0 2vw;
      animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.2s;
      opacity: 0; /* starts hidden until animation */
    }

    /* Base Glass Module Styles */
    .cyber-mod {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      display: flex; 
      align-items: center; 
      padding: 15px 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    /* Glowing Top Accents */
    .cyber-mod::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; width: 100%; height: 2px;
    }

    /* Specific Module Geometry and Colors */
    .mod-score {
      flex: 0 1 300px;
      justify-content: space-between;
      clip-path: polygon(0 0, 100% 0, calc(100% - 25px) 100%, 0 100%);
      border-left: 3px solid var(--neon-cyan);
    }
    .mod-score::before { background: linear-gradient(90deg, var(--neon-cyan), transparent); }

    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      clip-path: polygon(25px 0, 100% 0, calc(100% - 25px) 100%, 0 100%);
    }
    .mod-bat::before { background: linear-gradient(90deg, transparent, var(--neon-magenta), transparent); }

    .mod-bowl {
      flex: 0 1 320px;
      justify-content: space-between;
      clip-path: polygon(25px 0, 100% 0, 100% 100%, 0 100%);
      border-right: 3px solid var(--neon-magenta);
    }
    .mod-bowl::before { background: linear-gradient(-90deg, var(--neon-magenta), transparent); }

    /* Typography */
    .tm { 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 20px; 
      font-weight: 600; 
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: -5px;
    }
    .sc { 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 48px; 
      font-weight: 700; 
      line-height: 1; 
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .sc span { font-size: 28px; color: var(--neon-cyan); }
    .ov { 
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; 
      font-weight: 600; 
      color: var(--neon-cyan); 
      margin-left: 15px; 
      background: rgba(0, 242, 254, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .pn { font-size: 18px; font-weight: 700; letter-spacing: 0.5px;}
    .ps { 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 38px; 
      font-weight: 700; 
      margin-left: 12px;
      line-height: 1;
    }
    .ps-active { color: var(--neon-cyan); animation: neonBreathe 2s infinite ease-in-out;}
    .ps-inactive { color: var(--text-muted); }
    
    .pb { font-family: 'Rajdhani', sans-serif; font-size: 16px; color: var(--text-muted); margin-left: 6px; font-weight: 600;}
    
    .lbl { 
      font-family: 'Rajdhani', sans-serif; 
      font-size: 14px; 
      color: var(--neon-magenta); 
      letter-spacing: 2px; 
      font-weight: 600;
    }
    
    .v-div { 
      width: 1px; 
      height: 40px; 
      background: linear-gradient(to bottom, transparent, var(--glass-border), transparent); 
    }

  </style>
</head>
<body>

  <div id="cyber-island">SCOREX LIVE STREAM</div>

  <div id="cyber-bottom">
    
    <div class="cyber-mod mod-score">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers" style="color:#fff;">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="cyber-mod mod-bat">
      <div style="display:flex; align-items:baseline;">
        <span style="color:var(--neon-cyan); font-size: 12px; margin-right:8px; text-shadow: 0 0 8px var(--neon-cyan);">▶</span>
        <span id="strikerName" class="pn">Striker</span>
        <span id="strikerRuns" class="ps ps-active">0</span>
        <span class="pb">(<span id="strikerBalls">0</span>)</span>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.7;">
        <span id="nonStrikerName" class="pn" style="color:var(--text-muted);">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps ps-inactive">0</span>
      </div>
    </div>

    <div class="cyber-mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">BOWLING</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:var(--neon-magenta);"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="pb">OV <span id="bowlerOvers" style="color:#fff;">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      // Handle raw data or normalized data
      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to your engine's triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
