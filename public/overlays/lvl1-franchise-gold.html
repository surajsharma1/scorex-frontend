<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Arctic White & Blue (Edge-to-Edge)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Oswald:wght@500;700&display=swap');

    :root {
      --aw-white: #ffffff;
      --aw-off-white: #f8fafc;
      --aw-light-gray: #e2e8f0;
      --aw-slate: #0f172a;
      --aw-blue: #0284c7;
      --aw-blue-light: #38bdf8;
      --aw-red: #ef4444;
      --aw-text: #1e293b;
      --aw-text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; font-family: 'Inter', sans-serif; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--aw-text);
    }

    /* Entrance Animations */
    @keyframes smoothRise { 
      0% { transform: translateY(100px); opacity: 0; } 
      100% { transform: translateY(0); opacity: 1; } 
    }
    
    @keyframes pulseSoft {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Static Top Island */
    #aw-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--aw-white); color: var(--aw-blue);
      font-size: 13px; font-weight: 800; letter-spacing: 3px; 
      padding: 8px 35px; border-radius: 30px;
      border: 1px solid var(--aw-light-gray);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      animation: smoothRise 0.5s ease-out forwards;
    }

    /* Edge to Edge Bottom Bar */
    #aw-bottom {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 90px;
      display: flex; background: var(--aw-white); 
      border-top: 1px solid var(--aw-light-gray);
      animation: smoothRise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
    }

    /* Geometry Engine: Clean Grid */
    .aw-block {
      display: flex; height: 100%; border-right: 1px solid var(--aw-light-gray);
      position: relative;
    }

    /* 1. Score Block (Blue & White) */
    .aw-score-zone {
      flex: 0 0 400px; display: flex; background: var(--aw-white);
    }
    
    .team-box { 
      font-family: 'Oswald', sans-serif; font-size: 45px; 
      color: var(--aw-white); padding: 0 35px; display: flex; align-items: center; 
      background: linear-gradient(135deg, var(--aw-blue), #0369a1);
    }
    
    .score-data { display: flex; flex-direction: column; justify-content: center; padding-left: 30px; }
    .score-txt { font-family: 'Oswald', sans-serif; font-size: 60px; line-height: 0.9; color: var(--aw-slate); font-weight: 700;}
    .score-txt span { font-size: 30px; color: var(--aw-text-muted); margin: 0 4px; }
    .ov-txt { font-size: 15px; font-weight: 800; color: var(--aw-blue); margin-top: 2px; letter-spacing: 1px;}
    .ov-txt span { color: var(--aw-slate); font-size: 18px; margin-left: 5px;}

    /* 2. Batting Block (Off-White) */
    .aw-bat-zone { 
      flex: 1; display: flex; flex-direction: column; justify-content: center; 
      padding: 0 40px; background: var(--aw-off-white);
    }
    .bat-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--aw-light-gray); }
    .bat-row:last-child { border-bottom: none; }
    
    .b-name-wrap { display: flex; align-items: center; gap: 12px; flex: 1; }
    .b-ind { width: 10px; height: 10px; border-radius: 50%; background: var(--aw-blue); animation: pulseSoft 1.5s infinite;}
    .b-name { font-size: 20px; font-weight: 800; color: var(--aw-slate); }
    .b-runs { font-family: 'Oswald', sans-serif; font-size: 38px; color: var(--aw-blue); line-height: 1; width: 50px; text-align: right;}
    .b-balls { font-size: 15px; color: var(--aw-text-muted); width: 50px; text-align: right; font-weight: 700;}
    
    .bat-row.inactive .b-ind { opacity: 0; }
    .bat-row.inactive .b-name { color: var(--aw-text-muted); font-size: 18px; font-weight: 700;}
    .bat-row.inactive .b-runs { font-size: 30px; color: var(--aw-text-muted); }

    /* 3. Bowling Block (Slate) */
    .aw-bowl-zone { 
      flex: 0 0 450px; display: flex; flex-direction: column; justify-content: center; 
      padding: 0 40px; background: var(--aw-slate); border-right: none; color: var(--aw-white);
    }
    
    .bw-main { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px;}
    .bw-name { font-size: 20px; font-weight: 800; flex: 1; }
    .bw-name span { color: var(--aw-blue-light); font-size: 13px; margin-right: 10px; letter-spacing: 1px;}
    .bw-fig { font-family: 'Oswald', sans-serif; font-size: 40px; color: var(--aw-white); line-height: 0.8; }
    .bw-ov { font-size: 15px; color: var(--aw-white); font-weight: 800; margin-left: 20px; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 4px;}

    .this-over-row { display: flex; align-items: center; gap: 8px; padding-top: 8px; }
    .this-over-row span { font-size: 12px; color: var(--aw-text-muted); font-weight: 800; letter-spacing: 1px; }
    .ball-dot { width: 16px; height: 16px; border-radius: 50%; background: transparent; border: 2px solid rgba(255,255,255,0.3); }
    .ball-dot.fill { background: var(--aw-white); border-color: var(--aw-white); }


    /* =========================================
       4. EVENT ANIMATIONS (4, 6, OUT, DECISION)
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Oswald', sans-serif; font-size: 180px; line-height: 1; font-weight: 700;
      text-align: center; opacity: 0; text-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    
    .anim-event.fire { animation: elegantPop 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: var(--aw-white); -webkit-text-stroke: 3px var(--aw-blue); }
    #ev-six { color: var(--aw-blue); -webkit-text-stroke: 4px var(--aw-white); font-size: 220px; }
    
    /* OUT Animation - Sharp Red */
    #ev-out { color: var(--aw-red); -webkit-text-stroke: 4px var(--aw-white); }
    #ev-out.fire { animation: elegantPop 2.5s forwards; }

    /* Clean Pulse Radar */
    #ev-decision {
      position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
      background: var(--aw-white); border: 2px solid var(--aw-blue); border-radius: 40px;
      padding: 20px 60px; opacity: 0; transition: opacity 0.3s; text-align: center; pointer-events: none;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }
    #ev-decision.fire { opacity: 1; animation: cleanWarningFlash 1.5s infinite; }
    .d-title { font-size: 16px; color: var(--aw-text-muted); letter-spacing: 4px; margin-bottom: 2px; font-weight: 800;}
    .d-text { font-family: 'Oswald', sans-serif; font-size: 70px; color: var(--aw-blue); line-height: 1; white-space: nowrap; }

    @keyframes elegantPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.1) translateY(-30px); opacity: 0; }
    }

    @keyframes cleanWarningFlash {
      0%, 100% { box-shadow: 0 0 0 0 rgba(2, 132, 199, 0.4); }
      70% { box-shadow: 0 0 0 40px rgba(2, 132, 199, 0); }
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR!</div>
    <div id="ev-six" class="anim-event">SIX!</div>
    <div id="ev-out" class="anim-event">OUT!</div>
    <div id="ev-decision">
      <div class="d-title">THIRD UMPIRE</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="aw-island">GLOBAL BROADCAST CENTER</div>

  <div id="aw-bottom">
      
    <div class="aw-block aw-score-zone">
      <div class="team-box" id="teamName">TM</div>
      <div class="score-data">
        <div class="score-txt"><span id="teamScore" style="color:var(--aw-slate); margin:0;">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov-txt">OVERS <span id="teamOvers">0.0</span></div>
      </div>
    </div>

    <div class="aw-block aw-bat-zone">
      <div class="bat-row">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="strikerName">Striker Name</div></div>
        <div class="b-runs" id="strikerRuns">0</div>
        <div class="b-balls">(<span id="strikerBalls">0</span>)</div>
      </div>
      <div class="bat-row inactive">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="nonStrikerName">Non-Striker</div></div>
        <div class="b-runs" id="nonStrikerRuns">0</div>
        <div class="b-balls">(<span id="nonStrikerBalls">0</span>)</div>
      </div>
    </div>

    <div class="aw-block aw-bowl-zone">
      <div class="bw-main">
        <div class="bw-name"><span>BOWLER</span> <span id="bowlerName" style="color:var(--aw-white);">Name</span></div>
        <div style="display:flex; align-items:baseline;">
          <div class="bw-fig"><span id="bowlerWickets">0</span><span style="color:var(--aw-blue-light); font-size:30px; margin:0 4px;">-</span><span id="bowlerRuns">0</span></div>
          <div class="bw-ov">OV <span id="bowlerOvers">0.0</span></div>
        </div>
      </div>
      <div class="this-over-row">
        <span>THIS OVER</span>
        <div class="ball-dot fill"></div>
        <div class="ball-dot fill"></div>
        <div class="ball-dot"></div>
        <div class="ball-dot"></div>
        <div class="ball-dot"></div>
        <div class="ball-dot"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="engine.js">
    const $ = id => document.getElementById(id);
    let eventTimer;
    let decisionPendingState = false;

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0,3);
      safeSet('teamName', tName);
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);
      safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') {
        processData(e.data.data); 
      }

      if (e.data?.type === 'OVERLAY_TRIGGER') {
        const t = e.data.payload;
        
        if (['FOUR', 'SIX', 'WICKET', 'DECISION_PENDING', 'RESTORE'].includes(t.type)) {
          $('ev-four').classList.remove('fire'); $('ev-six').classList.remove('fire'); $('ev-out').classList.remove('fire');
          clearTimeout(eventTimer);

          if (t.type === 'FOUR') {
            $('ev-four').classList.add('fire');
            eventTimer = setTimeout(() => $('ev-four').classList.remove('fire'), 3000);
          } else if (t.type === 'SIX') {
            $('ev-six').classList.add('fire');
            eventTimer = setTimeout(() => $('ev-six').classList.remove('fire'), 3000);
          } else if (t.type === 'WICKET') {
            $('ev-out').classList.add('fire');
            eventTimer = setTimeout(() => $('ev-out').classList.remove('fire'), 3000);
          } else if (t.type === 'DECISION_PENDING') {
            decisionPendingState = !decisionPendingState;
            if (decisionPendingState) $('ev-decision').classList.add('fire');
            else $('ev-decision').classList.remove('fire');
          } else if (t.type === 'RESTORE') {
             decisionPendingState = false;
             $('ev-decision').classList.remove('fire');
          }
        }
      }
    });

    window.addEventListener('scorex:update', e => { if (e.detail) processData(e.detail); });
  </script>
</body>
</html>
