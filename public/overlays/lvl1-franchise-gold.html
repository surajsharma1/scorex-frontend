<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Tactical Telemetry HUD</title>
  <style>
    /* Sharp, technical, mechanical fonts */
    @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700;900&family=Share+Tech+Mono&display=swap');

    :root {
      --tac-dark: #0b0e14;
      --tac-panel: #151a22;
      --tac-border: #2a3441;
      
      --tac-yellow: #fbbf24;
      --tac-yellow-glow: #f59e0b;
      --tac-cyan: #22d3ee;
      --tac-red: #ef4444;
      
      --text-main: #f8fafc;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--text-main);
      font-family: 'Chakra Petch', sans-serif;
    }

    /* Animations */
    @keyframes tacticalSnap {
      0% { transform: translateY(60px) scale(0.95); opacity: 0; }
      70% { transform: translateY(-5px) scale(1); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes dataScan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    @keyframes blinkStatus {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Top Static Island */
    #tac-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--tac-dark);
      color: var(--tac-cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; 
      letter-spacing: 4px;
      padding: 6px 30px;
      border: 1px solid var(--tac-border);
      clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      display: flex;
      align-items: center;
      gap: 15px;
      animation: tacticalSnap 0.4s ease-out forwards;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--tac-cyan);
      border-radius: 50%;
      animation: blinkStatus 1.5s infinite;
    }

    /* Bottom Bar Wrapper */
    #tac-bottom {
      position: absolute; 
      bottom: 25px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 10px; /* Tight gaps for tactical look */
      padding: 0 2vw;
      animation: tacticalSnap 0.5s ease-out forwards;
      animation-delay: 0.1s;
      opacity: 0;
    }

    /* Tactical Module Base */
    .tac-mod {
      background: var(--tac-panel);
      display: flex; 
      align-items: center; 
      padding: 12px 35px;
      position: relative;
      border: 1px solid var(--tac-border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    /* Continuous Scanning Line at the top of each module */
    .tac-mod::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 50%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--tac-cyan), transparent);
      animation: dataScan 3s linear infinite;
      opacity: 0.5;
    }

    /* Specific Module Geometries */
    .mod-score {
      flex: 0 1 320px;
      justify-content: space-between;
      background: var(--tac-yellow);
      color: var(--tac-dark);
      border: none;
      clip-path: polygon(0 0, 100% 0, calc(100% - 20px) 100%, 0 100%);
    }
    .mod-score::before { display: none; } /* Remove scanline from solid yellow bg */

    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      clip-path: polygon(20px 0, 100% 0, calc(100% - 20px) 100%, 0 100%);
      border-left: 4px solid var(--tac-yellow);
    }

    .mod-bowl {
      flex: 0 1 340px;
      justify-content: space-between;
      clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%);
      border-right: 4px solid var(--tac-red);
    }

    /* Typography */
    .tm { 
      font-size: 20px; 
      font-weight: 900; 
      color: var(--tac-dark);
      letter-spacing: 1px;
      margin-bottom: -4px;
    }
    .sc { 
      font-size: 50px; 
      font-weight: 900; 
      line-height: 0.9; 
    }
    .sc span { font-size: 26px; color: #854d0e; margin: 0 4px;}
    .ov { 
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; 
      font-weight: 700; 
      color: var(--tac-dark); 
      margin-left: 15px; 
      background: rgba(0,0,0,0.1);
      padding: 4px 8px;
    }

    .pn { font-size: 20px; font-weight: 700; letter-spacing: 1px;}
    .ps { 
      font-size: 40px; 
      font-weight: 900; 
      margin-left: 12px;
      line-height: 0.9;
    }
    .pb { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--text-muted); margin-left: 8px;}
    
    .lbl { 
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; 
      color: var(--tac-cyan); 
      letter-spacing: 2px; 
      margin-bottom: 4px;
    }

    /* Target Reticle Indicator for Striker */
    .reticle {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--tac-yellow);
      position: relative;
      margin-right: 12px;
      transform: rotate(45deg);
    }
    .reticle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px; right: 3px; bottom: 3px;
      background: var(--tac-yellow);
    }

    .v-div { 
      width: 2px; 
      height: 40px; 
      background: var(--tac-border); 
      margin: 0 20px;
      transform: skewX(-15deg);
    }

  </style>
</head>
<body>

  <div id="tac-island">
    <div class="status-dot"></div>
    SYS.LINK // SCOREX LIVE
  </div>

  <div id="tac-bottom">
    
    <div class="tac-mod mod-score">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="tac-mod mod-bat">
      <div style="display:flex; align-items:center;">
        <span class="reticle"></span>
        <div style="display:flex; align-items:baseline;">
          <span id="strikerName" class="pn" style="color:var(--text-main);">Striker</span>
          <span id="strikerRuns" class="ps" style="color:var(--tac-yellow);">0</span>
          <span class="pb">(<span id="strikerBalls">0</span>)</span>
        </div>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.5;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:var(--text-main);">0</span>
      </div>
    </div>

    <div class="tac-mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">ACTIVE_BOWLER</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:var(--tac-red);"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="pb" style="margin-left: 15px;">OV <span id="bowlerOvers" style="color:var(--text-main);">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
