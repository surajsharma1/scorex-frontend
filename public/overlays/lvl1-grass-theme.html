<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Grass Theme (Thin)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto+Condensed:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto Condensed', sans-serif; }
    body { background: transparent; overflow: hidden; }

    /* Top Island */
    #grass-island {
      position: absolute;
      top: 15px; right: 30px;
      background: #1b5e20; color: white;
      padding: 4px 20px;
      border-radius: 4px;
      font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 3px solid #fbc02d;
      box-shadow: 0 4px 6px rgba(0,0,0,0.4);
    }

    /* Event Banner */
    #grass-banner {
      position: absolute;
      top: 35%; width: 100%; text-align: center;
      background: rgba(27, 94, 32, 0.95);
      padding: 10px 0;
      font-family: 'Oswald', sans-serif; font-size: 80px; color: #fff; text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      transform: scaleY(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #grass-banner.active { transform: scaleY(1); }

    /* Ultra-Thin Bottom Bar */
    #grass-bottom {
      position: absolute;
      bottom: 10px; left: 2%; width: 96%; height: 46px;
      display: flex;
      background: #ffffff;
      box-shadow: 0 6px 15px rgba(0,0,0,0.5);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    .g-sec { display: flex; align-items: center; padding: 0 20px; }

    .sec-score { background: #1b5e20; color: white; width: 28%; justify-content: space-between; border-right: 4px solid #fbc02d;}
    .g-team { font-family: 'Oswald', sans-serif; font-size: 22px; letter-spacing: 1px; }
    .g-runs { font-family: 'Oswald', sans-serif; font-size: 26px; color: #fbc02d; line-height: 1;}
    .g-runs span { font-size: 16px; color: white; }

    .sec-stats { flex: 1; justify-content: space-around; color: #222; font-size: 16px; }
    .bat-box, .bowl-box { display: flex; align-items: baseline; gap: 8px; }
    
    .p-name { font-weight: 700; color: #1b5e20; }
    .p-stat { font-weight: 700; font-size: 18px; }
    .p-sub { color: #777; font-size: 13px; }
    .strike-icn { color: #fbc02d; font-size: 12px; margin-right: 3px; }

    .v-div { width: 2px; height: 26px; background: #eee; }
  </style>
</head>
<body>

  <div id="grass-island">SCOREX T20 LEAGUE</div>
  <div id="grass-banner"></div>

  <div id="grass-bottom">
    
    <div class="g-sec sec-score">
      <span id="teamName" class="g-team">EAGLES</span>
      <div class="g-runs"><span id="teamScore">214</span><span>/</span><span id="teamWickets">5</span> <span style="margin-left: 8px; opacity:0.8;">(<span id="teamOvers">18.4</span>)</span></div>
    </div>
    
    <div class="g-sec sec-stats">
      <div class="bat-box">
        <span class="strike-icn">▶</span>
        <span id="strikerName" class="p-name">D. Warner</span>
        <span id="strikerRuns" class="p-stat">82</span>
        <span class="p-sub">(<span id="strikerBalls">48</span>)</span>
      </div>

      <div class="v-div"></div>

      <div class="bat-box">
        <span id="nonStrikerName" class="p-name" style="color:#555;">G. Maxwell</span>
        <span id="nonStrikerRuns" class="p-stat" style="color:#555;">14</span>
        <span class="p-sub">(<span id="nonStrikerBalls">9</span>)</span>
      </div>

      <div class="v-div"></div>

      <div class="bowl-box">
        <span class="p-sub">BOWL:</span>
        <span id="bowlerName" class="p-name">J. Bumrah</span>
        <span class="p-stat"><span id="bowlerWickets">2</span>-<span id="bowlerRuns">31</span></span>
        <span class="p-sub">(<span id="bowlerOvers">3.4</span>)</span>
      </div>
    </div>

  </div>

  <script>
    let cScr = -1, cWkt = -1, tgl = 0, pDat = {};
    const st = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function fireEvent(msg, bg) {
      const b = document.getElementById('grass-banner');
      b.innerText = msg; b.style.background = bg;
      b.classList.add('active');
      setTimeout(() => b.classList.remove('active'), 2800);
    }

    setInterval(() => {
      const el = document.getElementById('grass-island');
      if(!pDat.tournamentName) return;
      tgl = (tgl + 1) % 3;
      if(tgl === 0) el.innerText = pDat.tournamentName;
      else if(tgl === 1) el.innerText = pDat.target > 0 ? "REQ: " + pDat.requiredRunRate : "CRR: " + (pDat.runRate||'0.0');
      else el.innerText = pDat.status || "LIVE";
    }, 4000);

    function proc(d) {
      pDat = d;
      st('teamName', d.team1Name); st('teamScore', d.team1Score); st('teamWickets', d.team1Wickets); st('teamOvers', d.team1Overs);
      st('strikerName', d.strikerName); st('strikerRuns', d.strikerRuns); st('strikerBalls', d.strikerBalls);
      st('nonStrikerName', d.nonStrikerName); st('nonStrikerRuns', d.nonStrikerRuns); st('nonStrikerBalls', d.nonStrikerBalls);
      st('bowlerName', d.bowlerName); st('bowlerRuns', d.bowlerRuns); st('bowlerWickets', d.bowlerWickets); st('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (cScr !== -1) {
        if (nw > cWkt) fireEvent("WICKET!", "rgba(211, 47, 47, 0.95)");
        else if (ns - cScr === 6) fireEvent("MAXIMUM SIX!", "rgba(25, 118, 210, 0.95)");
        else if (ns - cScr === 4) fireEvent("FOUR RUNS!", "rgba(27, 94, 32, 0.95)");
      }
      cScr = ns; cWkt = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') proc(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') proc(e.data.data); };
  </script>
</body>
</html>
