<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 High-Vis Impact</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { background: transparent; overflow: hidden; }

    /* Top Island */
    #hv-island {
      position: absolute; top: 15px; right: 40px;
      background: #ffd700; color: #111;
      font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
      padding: 4px 30px; clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* Danger Event Popup */
    #hv-event {
      position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0) skewX(-10deg);
      background: #111; color: #ffd700;
      font-family: 'Bebas Neue', sans-serif; font-size: 130px; letter-spacing: 4px;
      padding: 10px 60px; border: 8px solid #ffd700;
      box-shadow: 20px 20px 0px rgba(0,0,0,0.8);
      opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #hv-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1) skewX(-10deg); }

    /* Bottom Bar Assembly */
    #hv-bottom {
      position: absolute; bottom: 20px; left: 5%; width: 90%; height: 85px;
      display: flex; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));
    }

    .hv-block { display: flex; align-items: center; justify-content: center; padding: 0 30px; }

    /* Score Block (Yellow) */
    .b-score { 
      background: #ffd700; color: #111; min-width: 280px; 
      clip-path: polygon(0 0, 100% 0, calc(100% - 25px) 100%, 0 100%);
      justify-content: space-between; z-index: 3;
    }
    .t-name { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; margin-top: 6px;}
    .t-score { font-family: 'Bebas Neue', sans-serif; font-size: 60px; line-height: 0.8;}
    .t-score span { font-size: 30px; }
    .t-ov { font-size: 15px; font-weight: 700; text-align: right; margin-top: -5px;}

    /* Batting Block (Black) */
    .b-bat { 
      background: #111; color: #fff; flex: 1; margin-left: -35px; padding-left: 50px;
      clip-path: polygon(25px 0, 100% 0, calc(100% - 25px) 100%, 0 100%); z-index: 2;
      justify-content: space-around;
    }
    .p-grp { display: flex; align-items: baseline; gap: 10px; }
    .pn { font-size: 22px; font-weight: 700; }
    .pr { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #ffd700; line-height: 0.8;}
    .pb { font-size: 16px; color: #888; font-weight: 700;}

    /* Bowler Block (Grey/Yellow edge) */
    .b-bowl {
      background: #333; color: #fff; min-width: 320px; margin-left: -35px; padding-left: 50px;
      clip-path: polygon(25px 0, 100% 0, 100% 100%, 0 100%); border-right: 8px solid #ffd700;
      justify-content: space-between; z-index: 1;
    }
    
  </style>
</head>
<body>

  <div id="hv-island">TOURNAMENT DATA</div>
  <div id="hv-event"></div>

  <div id="hv-bottom">
    
    <div class="hv-block b-score">
      <div id="teamName" class="t-name">TEAM</div>
      <div>
        <div class="t-score"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="t-ov">OVERS <span id="teamOvers">0.0</span></div>
      </div>
    </div>

    <div class="hv-block b-bat">
      <div class="p-grp">
        <span style="color:#ffd700; font-size:18px; margin-right:-4px;">▶</span>
        <span id="strikerName" class="pn">Striker</span>
        <span id="strikerRuns" class="pr">0</span>
        <span class="pb">(<span id="strikerBalls">0</span>)</span>
      </div>
      <div class="p-grp" style="opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="pr" style="color: #fff;">0</span>
        <span class="pb">(<span id="nonStrikerBalls">0</span>)</span>
      </div>
    </div>

    <div class="hv-block b-bowl">
      <span id="bowlerName" class="pn">Bowler</span>
      <div class="p-grp">
        <span class="pr"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="pb">Ov <span id="bowlerOvers">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    let hSc = -1, hWk = -1, hSt = 0, hDat = {};
    const put = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function fireEvent(text, bg, fg) {
      const b = document.getElementById('hv-event');
      b.innerText = text; b.style.background = bg; b.style.color = fg; b.style.borderColor = fg;
      b.classList.add('show');
      setTimeout(() => b.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const el = document.getElementById('hv-island');
      if(!hDat.tournamentName) return;
      hSt = (hSt + 1) % 3;
      if(hSt === 0) el.innerText = hDat.tournamentName;
      else if(hSt === 1) el.innerText = "RUN RATE: " + (hDat.runRate||'0.0');
      else el.innerText = hDat.target > 0 ? "CHASING: " + hDat.target : "FIRST INNINGS";
    }, 4500);

    function proc(d) {
      hDat = d;
      put('teamName', d.team1Name); put('teamScore', d.team1Score); put('teamWickets', d.team1Wickets); put('teamOvers', d.team1Overs);
      put('strikerName', d.strikerName); put('strikerRuns', d.strikerRuns); put('strikerBalls', d.strikerBalls);
      put('nonStrikerName', d.nonStrikerName); put('nonStrikerRuns', d.nonStrikerRuns); put('nonStrikerBalls', d.nonStrikerBalls);
      put('bowlerName', d.bowlerName); put('bowlerRuns', d.bowlerRuns); put('bowlerWickets', d.bowlerWickets); put('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (hSc !== -1) {
        if (nw > hWk) fireEvent("WICKET", "#e74c3c", "#111");
        else if (ns - hSc === 6) fireEvent("SIX RUNS", "#111", "#ffd700");
        else if (ns - hSc === 4) fireEvent("BOUNDARY", "#fff", "#111");
      }
      hSc = ns; hWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') proc(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') proc(e.data.data); };
  </script>
</body>
</html>
