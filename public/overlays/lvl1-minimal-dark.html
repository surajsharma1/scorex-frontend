<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Esports Armor</title>
  <style>
    /* Sci-fi gaming fonts */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap');

    :root {
      --es-bg-dark: #0b0914;
      --es-bg-panel: #161224;
      --es-border: #2d244a;
      
      --es-cyan: #00ffcc;
      --es-magenta: #ff00cc;
      
      --text-main: #ffffff;
      --text-dim: #8b80b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
    }

    /* Animations */
    @keyframes warpIn {
      0% { transform: perspective(500px) translateZ(-100px) translateY(50px); opacity: 0; }
      100% { transform: perspective(500px) translateZ(0) translateY(0); opacity: 1; }
    }

    @keyframes pulseTriangle {
      0%, 100% { filter: drop-shadow(0 0 2px var(--es-cyan)); }
      50% { filter: drop-shadow(0 0 10px var(--es-cyan)); }
    }

    @keyframes neonGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
      50% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); }
    }

    /* Top Static Island */
    #es-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--es-bg-dark);
      color: var(--es-cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; 
      font-weight: 700; 
      letter-spacing: 3px;
      padding: 6px 35px;
      border: 2px solid var(--es-border);
      border-bottom: 2px solid var(--es-cyan);
      /* Hexagon-like angled cuts */
      clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
      animation: warpIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    /* Bottom Bar Wrapper */
    #es-bottom {
      position: absolute; 
      bottom: 25px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 15px;
      padding: 0 2vw;
    }

    /* Base Armor Module */
    .es-mod {
      background: linear-gradient(135deg, var(--es-bg-panel), var(--es-bg-dark));
      display: flex; 
      align-items: center; 
      padding: 15px 35px;
      position: relative;
      border: 2px solid var(--es-border);
      opacity: 0;
      animation: warpIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      box-shadow: 0 15px 25px rgba(0,0,0,0.8);
    }

    /* 1. Score Armor Plate */
    .mod-score {
      flex: 0 1 330px;
      justify-content: space-between;
      clip-path: polygon(0 0, 100% 0, calc(100% - 25px) 100%, 0 100%);
      border-left: 4px solid var(--es-cyan);
      animation-delay: 0.1s;
    }
    
    /* 2. Batting Armor Plate */
    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      clip-path: polygon(25px 0, 100% 0, calc(100% - 25px) 100%, 0 100%);
      animation-delay: 0.2s;
    }

    /* 3. Bowling Armor Plate */
    .mod-bowl {
      flex: 0 1 350px;
      justify-content: space-between;
      clip-path: polygon(25px 0, 100% 0, 100% 100%, 0 100%);
      border-right: 4px solid var(--es-magenta);
      animation-delay: 0.3s;
    }

    /* Typography */
    .tm { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 16px; 
      font-weight: 900; 
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 2px;
    }
    .sc { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 46px; 
      font-weight: 900; 
      line-height: 0.9; 
      color: #fff;
    }
    .sc span { font-size: 24px; color: var(--es-cyan); margin: 0 4px;}
    
    .ov { 
      font-size: 18px; 
      font-weight: 700; 
      color: var(--es-cyan); 
      margin-left: 15px; 
      background: rgba(0, 255, 204, 0.1);
      padding: 2px 10px;
      border-radius: 2px;
      border: 1px solid rgba(0, 255, 204, 0.3);
    }

    .pn { 
      font-size: 22px; 
      font-weight: 700; 
      letter-spacing: 1px;
    }
    .ps { 
      font-family: 'Orbitron', sans-serif; 
      font-size: 38px; 
      font-weight: 900; 
      margin-left: 15px;
      line-height: 0.9;
    }
    .pb { 
      font-size: 16px; 
      color: var(--text-dim); 
      margin-left: 8px; 
      font-weight: 700;
    }
    
    .lbl { 
      font-size: 13px; 
      color: var(--es-magenta); 
      letter-spacing: 2px; 
      font-weight: 700;
      margin-bottom: 2px;
    }

    /* Glowing Triangle Indicator for Striker */
    .es-triangle {
      display: inline-block;
      width: 0;
      height: 0;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid var(--es-cyan);
      margin-right: 12px;
      animation: pulseTriangle 1.5s infinite;
    }

    .v-div { 
      width: 2px; 
      height: 40px; 
      background: var(--es-border); 
      margin: 0 20px;
    }

  </style>
</head>
<body>

  <div id="es-island">SCOREX // ESPORTS ARENA</div>

  <div id="es-bottom">
    
    <div class="es-mod mod-score">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore" style="color:#fff;">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers" style="color:#fff;">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="es-mod mod-bat">
      <div style="display:flex; align-items:center;">
        <span class="es-triangle"></span>
        <div style="display:flex; align-items:baseline;">
          <span id="strikerName" class="pn">Striker</span>
          <span id="strikerRuns" class="ps" style="color:var(--es-cyan);">0</span>
          <span class="pb">(<span id="strikerBalls">0</span>)</span>
        </div>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:var(--text-main);">0</span>
      </div>
    </div>

    <div class="es-mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">TARGET ACQUIRED</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:var(--es-magenta);"><span id="bowlerWickets">0</span><span style="color:var(--text-dim); margin:0 4px;">-</span><span id="bowlerRuns">0</span></span>
        <span class="pb" style="margin-left:15px;">OV <span id="bowlerOvers" style="color:#fff;">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
