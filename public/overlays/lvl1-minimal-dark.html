<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Solid Silver & Navy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700;900&family=Oswald:wght@500;700&display=swap');

    :root {
      /* Pure Silver/Gray Gradients (No Pure White) */
      --slv-light: #ffffff;
      --slv-mid: #ffffff;
      --slv-base: #ffffff;
      --slv-dark: #64748b;
      --slv-deep: #ffffff;
      
      /* Theme Colors */  
      --navy: #0f172a;
      --navy-light: #1e293b;
      --blue: #0ea5e9;
      --yellow: #eab308;
      --black: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      font-family: 'Chakra Petch', sans-serif;
    }

    @keyframes barRise { 
      0% { transform: translateY(120px); opacity: 0; } 
      100% { transform: translateY(0); opacity: 1; } 
    }

    /* =========================================
       THE SOLID SILVER SCOREBOARD
       ========================================= */
    #silver-bottom-bar {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 95px;
      display: flex; align-items: stretch; padding: 10px 15px; gap: 15px;
      
      /* Solid Silver Base (No White) */
      background: linear-gradient(180deg, var(--slv-mid) 0%, var(--slv-base) 20%, var(--slv-dark) 80%, var(--slv-deep) 100%);
      
      /* Heavy Inset Shadow in the center */
      box-shadow: inset 0 0 60px rgba(0,0,0,0.6), 0 -10px 25px rgba(0,0,0,0.5);
      border-top: 2px solid var(--slv-light);
      
      animation: barRise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      z-index: 100;
    }

    /* Common Navy Box Style */
    .navy-box {
      background: var(--navy);
      border: 1px solid var(--navy-light);
      border-radius: 4px;
      display: flex; align-items: center;
      box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
      position: relative;
      z-index: 2; /* Sits above the silver shadow */
    }

    /* Common Yellow Shape */
    .yellow-shape {
      background: var(--yellow);
      color: var(--black);
      clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      display: flex; align-items: baseline; justify-content: center; gap: 6px;
    }

    /* 1. Team & Score Box */
    .box-team-score { flex: 0 0 auto; padding: 0 20px 0 30px; gap: 20px; }
    
    .team-name { 
      font-family: 'Oswald', sans-serif; font-size: 45px; font-weight: 700;
      color: var(--slv-light); letter-spacing: 2px;
    }
    
    .box-team-score .yellow-shape { height: 60px; padding: 0 30px; }
    .box-team-score .yellow-shape .main-val { font-family: 'Oswald', sans-serif; font-size: 45px; font-weight: 700; line-height: 1.2; }
    .box-team-score .yellow-shape .sub-val { font-size: 24px; font-weight: 700; color: rgba(0,0,0,0.7); }
    
    .ov-txt { font-size: 14px; font-weight: 700; color: var(--slv-base); display: flex; flex-direction: column; align-items: center; line-height: 1;}
    .ov-txt span { color: var(--slv-light); font-size: 22px; margin-top: 2px;}

    /* 2. Batting Box */
    .box-batting { flex: 1; flex-direction: column; justify-content: center; padding: 0 20px; gap: 4px;}
    
    .bat-row { display: flex; align-items: center; width: 100%; justify-content: space-between; }
    .b-name-wrap { display: flex; align-items: center; flex: 1; }
    
    /* Single Blue Line & Slanted Bar */
    .blue-line { width: 4px; height: 30px; background: var(--blue); margin-right: 8px; }
    .blue-slant {
      background: var(--blue);
      clip-path: polygon(0 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      padding: 2px 40px 2px 15px; min-width: 180px; display: flex; align-items: center;
    }
    .b-name { font-size: 20px; font-weight: 700; color: var(--slv-light); letter-spacing: 1px;}
    
    /* Inactive State (No Blue) */
    .bat-row.inactive .blue-line { background: transparent; }
    .bat-row.inactive .blue-slant { background: transparent; clip-path: none; padding: 2px 15px; }
    .bat-row.inactive .b-name { color: var(--slv-base); }
    
    /* Batting Yellow Shape */
    .bat-row .yellow-shape { height: 32px; padding: 0 20px; clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%); }
    .bat-row .yellow-shape .main-val { font-size: 24px; font-weight: 700; line-height: 1.3;}
    .bat-row .yellow-shape .sub-val { font-size: 15px; color: rgba(0,0,0,0.7); font-weight: 700;}

    /* Inactive Yellow Shape fades out slightly */
    .bat-row.inactive .yellow-shape { background: var(--slv-dark); color: var(--slv-light); }
    .bat-row.inactive .yellow-shape .sub-val { color: var(--slv-base); }

    /* 3. Bowling Box */
    .box-bowling { flex: 1; justify-content: space-between; padding: 0 20px; }
    
    .bw-info-wrap { display: flex; align-items: center; gap: 20px; }
    .bw-details { display: flex; flex-direction: column; justify-content: center; }
    .bw-name { font-size: 22px; font-weight: 700; color: var(--slv-light); letter-spacing: 1px; margin-bottom: 2px;}
    .bw-ov { font-size: 13px; color: var(--slv-base); font-weight: 700;}
    .bw-ov span { color: var(--slv-light); font-size: 16px; margin-left: 6px;}
    
    /* Bowler Yellow Shape */
    .box-bowling .yellow-shape { height: 45px; padding: 0 25px; }
    .box-bowling .yellow-shape .main-val { font-size: 32px; font-weight: 700; line-height: 1.3;}
    .box-bowling .yellow-shape .sub-val { font-size: 22px; font-weight: 700; margin: 0 2px;}

    /* This Over: Yellow Pill with Black Frame */
    .this-over-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .tracker-lbl { font-size: 12px; color: var(--slv-base); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; }
    
    .yellow-pill {
      background: var(--yellow);
      border: 3px solid var(--black);
      border-radius: 50px;
      padding: 4px 12px;
      display: flex; gap: 8px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
    }

    /* Silver Circular Balls */
    .silver-ball { 
      width: 18px; height: 18px; border-radius: 50%; 
      border: 1px solid var(--black);
      background: radial-gradient(circle at 30% 30%, var(--slv-light) 0%, var(--slv-base) 50%, var(--slv-dark) 100%);
      box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    .silver-ball.fill { 
      /* Fill state uses the blue to indicate current over action */
      background: radial-gradient(circle at 30% 30%, var(--slv-light) 0%, var(--blue) 50%, #0284c7 100%);
    }


    /* =========================================
       EVENT ANIMATIONS
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Oswald', sans-serif; font-size: 200px; line-height: 1; font-weight: 900;
      text-align: center; opacity: 0; font-style: italic; text-shadow: 6px 6px 0 rgba(0,0,0,0.8);
    }
    
    .anim-event.fire { animation: popIn 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: var(--blue); -webkit-text-stroke: 4px var(--slv-light); }
    #ev-six { color: var(--yellow); font-size: 240px; -webkit-text-stroke: 4px var(--navy); }
    #ev-out { color: #ef4444; -webkit-text-stroke: 4px var(--slv-light); }

    /* Umpire Decision HUD */
    #ev-decision {
      position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
      background: var(--navy); border: 4px solid var(--yellow); border-radius: 8px;
      padding: 15px 60px; opacity: 0; transition: opacity 0.3s; text-align: center; pointer-events: none;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 10px 10px 0 var(--black);
    }
    #ev-decision.fire { opacity: 1; animation: umpireFlash 1.2s infinite; }
    .d-title { font-size: 16px; color: var(--slv-base); letter-spacing: 6px; margin-bottom: 2px; font-weight: 900;}
    .d-text { font-family: 'Oswald', sans-serif; font-size: 70px; color: var(--yellow); line-height: 1; white-space: nowrap; text-shadow: 3px 3px 0 var(--black);}

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-5deg); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.2) translateY(-40px); opacity: 0; }
    }

    @keyframes umpireFlash {
      0%, 100% { border-color: var(--yellow); box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 10px 10px 0 var(--black); }
      50% { border-color: var(--slv-light); box-shadow: inset 0 0 40px rgba(234, 179, 8, 0.4), 10px 10px 0 var(--black); }
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR!</div>
    <div id="ev-six" class="anim-event">SIX!</div>
    <div id="ev-out" class="anim-event">OUT!</div>
    <div id="ev-decision">
      <div class="d-title">THIRD UMPIRE</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="silver-bottom-bar">
      
    <div class="navy-box box-team-score">
      <div class="team-name" id="teamName">TM</div>
      <div class="yellow-shape">
        <span class="main-val"><span id="teamScore">0</span>/<span id="teamWickets">0</span></span>
      </div>
      <div class="ov-txt">OVERS <span id="teamOvers">0.0</span></div>
    </div>

    <div class="navy-box box-batting">
      
      <div class="bat-row">
        <div class="b-name-wrap">
          <div class="blue-line"></div>
          <div class="blue-slant"><div class="b-name" id="strikerName">Striker Name</div></div>
        </div>
        <div class="yellow-shape">
          <span class="main-val" id="strikerRuns">0</span>
          <span class="sub-val">(<span id="strikerBalls">0</span>)</span>
        </div>
      </div>
      
      <div class="bat-row inactive">
        <div class="b-name-wrap">
          <div class="blue-line"></div>
          <div class="blue-slant"><div class="b-name" id="nonStrikerName">Non-Striker</div></div>
        </div>
        <div class="yellow-shape">
          <span class="main-val" id="nonStrikerRuns">0</span>
          <span class="sub-val">(<span id="nonStrikerBalls">0</span>)</span>
        </div>
      </div>

    </div>

    <div class="navy-box box-bowling">
      
      <div class="bw-info-wrap">
        <div class="bw-details">
          <div class="bw-name" id="bowlerName">Bowler Name</div>
          <div class="bw-ov">OVERS <span id="bowlerOvers">0.0</span></div>
        </div>
        
        <div class="yellow-shape">
          <span class="main-val"><span id="bowlerWickets">0</span><span class="sub-val">-</span><span id="bowlerRuns">0</span></span>
        </div>
      </div>

      <div class="this-over-wrapper">
        <div class="tracker-lbl">THIS OVER</div>
        <div class="yellow-pill" id="this-over">
          <div class="silver-ball"></div>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/overlays/overlay-utils.js"></script>
<script src="/overlays/overlay-handlers.js"></script>
      <script src="/overlays/engine.js"></script>
<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  let eventTimer = null;
  let decisionPendingState = false;

  const safeSet = (id, val, fallback) => {
    const el = $(id);
    if (!el) return;
    const v = (val != null && val !== '') ? val : (fallback !== undefined ? fallback : '');
    el.innerText = String(v);
  };

  function processData(d) {
    if (!d) return;

    const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0, 4).toUpperCase();
    safeSet('teamName',      tName);
    safeSet('teamScore',     d.team1Score    ?? d.teamScore,    0);
    safeSet('teamWickets',   d.team1Wickets  ?? d.teamWickets,  0);
    safeSet('teamOvers',     d.team1Overs    ?? d.teamOvers,    '0.0');

    safeSet('strikerName',   d.strikerName,    'Striker');
    safeSet('strikerRuns',   d.strikerRuns,    0);
    safeSet('strikerBalls',  d.strikerBalls,   0);

    safeSet('nonStrikerName',  d.nonStrikerName,  'Non-Striker');
    safeSet('nonStrikerRuns',  d.nonStrikerRuns,  0);
    safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

    safeSet('bowlerName',    d.bowlerName,    'Bowler');
    safeSet('bowlerRuns',    d.bowlerRuns,    0);
    safeSet('bowlerWickets', d.bowlerWickets, 0);
    safeSet('bowlerOvers',   d.bowlerOvers,   '0.0');

    // Ball renderer
    if (typeof window.renderCurrentOver === 'function') {
      window.renderCurrentOver(d.thisOver || []);
    }
  }

  function handleTrigger(t) {
    const evFour     = $('ev-four');
    const evSix      = $('ev-six');
    const evOut      = $('ev-out');
    const evDecision = $('ev-decision');
    if (!evFour || !evSix || !evOut || !evDecision) return;

    // Clear all active animations first
    evFour.classList.remove('fire');
    evSix.classList.remove('fire');
    evOut.classList.remove('fire');
    clearTimeout(eventTimer);

    if (t.type === 'FOUR') {
      evFour.classList.add('fire');
      eventTimer = setTimeout(() => evFour.classList.remove('fire'), 3000);
    } else if (t.type === 'SIX') {
      evSix.classList.add('fire');
      eventTimer = setTimeout(() => evSix.classList.remove('fire'), 3000);
    } else if (t.type === 'WICKET') {
      evOut.classList.add('fire');
      eventTimer = setTimeout(() => evOut.classList.remove('fire'), 3000);
    } else if (t.type === 'DECISION_PENDING') {
      decisionPendingState = (t.data && t.data.active !== false);
      evDecision.classList.toggle('fire', decisionPendingState);
      // sharedHandleTrigger NOT called — evDecision handles DECISION_PENDING natively
    } else if (t.type === 'RESTORE') {
      decisionPendingState = false;
      evDecision.classList.remove('fire');
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'UPDATE_SCORE' && e.data.data) {
      processData(e.data.data);
    }
    if (e.data.type === 'OVERLAY_TRIGGER' && e.data.payload) {
      handleTrigger(e.data.payload);
    }
  });
})();
</script>
</body>
</html>
