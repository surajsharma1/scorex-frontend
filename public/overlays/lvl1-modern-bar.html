<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Modern Bar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: transparent; overflow: hidden; color: #fff; }

    /* Modern sleek header */
    #modern-header {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #0ea5e9, #0284c7); border: 1px solid #22c55e;
      color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 1.2px;
      padding: 8px 30px; border-radius: 12px;
      box-shadow: 0 8px 32px rgba(14,165,233,0.3);
    }

    /* Sleek full-width modern bar */
    #modern-bar {
      position: absolute; bottom: 18px; left: 0; width: 100%; height: 80px;
      display: flex; background: linear-gradient(90deg, #111827 0%, #1f2937 100%);
      border-top: 2px solid #22c55e; backdrop-filter: blur(20px);
      filter: drop-shadow(0 12px 40px rgba(0,0,0,0.6));
    }

    /* Seamless modern modules */
    .mod { display: flex; align-items: center; padding: 0 35px; position: relative; }

    .mod-score {
      background: linear-gradient(135deg, #22c55e, #16a34a); color: #0f172a; min-width: 280px; justify-content: space-between;
      clip-path: polygon(0 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      z-index: 3;
    }

    .mod-bat {
      background: linear-gradient(90deg, #1f2937, #111827); flex: 1; justify-content: space-around;
      clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
      margin-left: -15px; padding-left: 45px; z-index: 2;
    }

    .mod-bowl {
      background: #1e293b; min-width: 300px; justify-content: space-between;
      clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%);
      margin-left: -15px; padding-left: 45px; z-index: 1;
    }

    /* Modern typography */
    .tm { font-size: 24px; font-weight: 900; letter-spacing: -0.3px;}
    .sc { font-size: 40px; font-weight: 900; line-height: 1; }
    .sc span { font-size: 22px; color: #064e3b; }
    .ov { font-size: 12px; font-weight: 700; margin-left: 8px; color: #064e3b; }

    .pn { font-size: 17px; font-weight: 700; }
    .ps { font-size: 26px; font-weight: 900; color: #22c55e; margin-left: 8px;}
    .pb { font-size: 12px; color: #94a3b8; margin-left: 4px;}
    
    .lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-bottom: 1px;}
    .v-div { width: 1.5px; height: 28px; background: linear-gradient(to bottom, #334155, transparent); }
  </style>
</head>
<body>

  <div id="modern-header">SCOREX MODERN BAR</div>

  <div id="modern-bar">
    
    <div class="mod mod-score">
      <div id="teamName" class="tm">MODERN BAR</div>
      <div style="display:flex; align-items:baseline;">
        <div class="sc"><span id="teamScore">142</span><span>/</span><span id="teamWickets">4</span></div>
        <div class="ov">OV <span id="teamOvers">14.2</span></div>
      </div>
    </div>

    <div class="mod mod-bat">
      <div style="display:flex; align-items:baseline;">
        <span style="color:#22c55e; font-size:11px; margin-right:6px;">▶</span>
        <span id="strikerName" class="pn">Striker</span>
        <span id="strikerRuns" class="ps">68</span>
        <span class="pb">(<span id="strikerBalls">42</span>)</span>
      </div>
      <div class="v-div"></div>
      <div style="display:flex; align-items:baseline; opacity: 0.7;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:#fff;">32</span>
      </div>
    </div>

    <div class="mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">BOWLER</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:#fff;"><span id="bowlerWickets">2</span>-<span id="bowlerRuns">45</span></span>
        <span class="pb">OV <span id="bowlerOvers">3.4</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);
    function processData(d) {
      $('teamName').innerText = d.team1Name || 'Team'; 
      $('teamScore').innerText = d.team1Score || 0; 
      $('teamWickets').innerText = d.team1Wickets || 0; 
      $('teamOvers').innerText = d.team1Overs || '0.0';
      $('strikerName').innerText = d.strikerName || 'Striker'; 
      $('strikerRuns').innerText = d.strikerRuns || 0; 
      $('strikerBalls').innerText = d.strikerBalls || 0;
      $('nonStrikerName').innerText = d.nonStrikerName || 'Non-Striker'; 
      $('nonStrikerRuns').innerText = d.nonStrikerRuns || 0;
      $('bowlerName').innerText = d.bowlerName || 'Bowler'; 
      $('bowlerRuns').innerText = d.bowlerRuns || 0; 
      $('bowlerWickets').innerText = d.bowlerWickets || 0; 
      $('bowlerOvers').innerText = d.bowlerOvers || '0.0';
    }
    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') processData(e.data.data); });
    window.addEventListener('scorex:update', e => { 
      const detail = (e as CustomEvent).detail; 
      if(detail) processData(detail); 
    });
  </script>
</body>
</html>
