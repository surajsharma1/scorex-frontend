<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Origami Ribbon</title>
  <style>
    /* Bold, geometric font for a very clean, sporty look */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap');

    :root {
      --rib-crimson: #e63946;
      --rib-navy: #1d3557;
      --rib-blue: #457b9d;
      --rib-light: #f1faee;
      --rib-accent: #a8dadc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--rib-light);
      font-family: 'Montserrat', sans-serif;
    }

    /* Animations */
    @keyframes ribbonSlide {
      0% { transform: translateX(-100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes ribbonSheen {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    /* Top Static Island */
    #rib-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--rib-light);
      color: var(--rib-navy);
      font-size: 13px; 
      font-weight: 800; 
      letter-spacing: 2px;
      padding: 6px 30px;
      clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0 50%);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: ribbonSlide 0.5s ease-out forwards;
    }

    /* Bottom Bar Wrapper */
    #rib-bottom {
      position: absolute; 
      bottom: 25px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      padding: 0 2vw;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
    }

    /* Ribbon Modules */
    .rib-mod {
      display: flex; 
      align-items: center; 
      padding: 12px 40px;
      position: relative;
      opacity: 0;
      overflow: hidden;
    }

    /* The Continuous Sheen Effect */
    .sheen::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; width: 50%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-20deg);
      animation: ribbonSheen 4s infinite ease-in-out;
    }

    /* 1. Score Ribbon (Crimson) */
    .mod-score {
      flex: 0 1 330px;
      justify-content: space-between;
      background: var(--rib-crimson);
      color: var(--rib-light);
      clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 50%, calc(100% - 25px) 100%, 0 100%);
      animation: ribbonSlide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
      z-index: 3;
    }

    /* 2. Batting Ribbon (Navy) */
    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      background: var(--rib-navy);
      clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 50%, calc(100% - 25px) 100%, 0 100%, 25px 50%);
      margin-left: -20px; /* Overlap to nest inside the previous ribbon */
      padding-left: 50px;
      animation: ribbonSlide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) 0.15s forwards;
      z-index: 2;
    }

    /* 3. Bowling Ribbon (Light Blue) */
    .mod-bowl {
      flex: 0 1 350px;
      justify-content: space-between;
      background: var(--rib-blue);
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 25px 50%);
      margin-left: -20px; /* Overlap */
      padding-left: 50px;
      animation: ribbonSlide 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) 0.3s forwards;
      z-index: 1;
    }

    /* Typography */
    .tm { 
      font-size: 20px; 
      font-weight: 900; 
      letter-spacing: 0.5px;
      margin-bottom: -2px;
    }
    .sc { 
      font-size: 46px; 
      font-weight: 900; 
      line-height: 0.9; 
    }
    .sc span { font-size: 24px; color: #ffb3b8; margin: 0 3px;}
    .ov { 
      font-size: 14px; 
      font-weight: 800; 
      color: var(--rib-crimson); 
      margin-left: 15px; 
      background: var(--rib-light);
      padding: 4px 10px;
      border-radius: 3px;
    }

    .pn { font-size: 18px; font-weight: 700; }
    .ps { 
      font-size: 36px; 
      font-weight: 900; 
      margin-left: 12px;
      line-height: 0.9;
      color: var(--rib-accent);
    }
    .pb { font-size: 14px; color: #a8b2c1; margin-left: 6px; font-weight: 700;}
    
    .lbl { 
      font-size: 12px; 
      color: var(--rib-light); 
      opacity: 0.7;
      letter-spacing: 1px; 
      font-weight: 800;
      margin-bottom: 2px;
    }

    .v-div { 
      width: 2px; 
      height: 35px; 
      background: rgba(255,255,255,0.2); 
      margin: 0 20px;
    }

  </style>
</head>
<body>

  <div id="rib-island">SCOREX.LIVE - EVENT BROADCAST</div>

  <div id="rib-bottom">
    
    <div class="rib-mod mod-score sheen">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore" style="color:#fff;">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="rib-mod mod-bat">
      <div style="display:flex; align-items:baseline;">
        <span style="color:var(--rib-accent); font-size: 14px; margin-right:8px;">►</span>
        <span id="strikerName" class="pn" style="color:#fff;">Striker</span>
        <span id="strikerRuns" class="ps">0</span>
        <span class="pb">(<span id="strikerBalls">0</span>)</span>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:#fff;">0</span>
      </div>
    </div>

    <div class="rib-mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">BOWLER</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:#fff;"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="pb" style="color:var(--rib-light); opacity:0.8; margin-left: 15px;">OV <span id="bowlerOvers" style="color:#fff; opacity:1;">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
