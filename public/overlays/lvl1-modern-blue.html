<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Modern Blue (Thin)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: transparent; overflow: hidden; }

    /* Top Island Pill */
    #blue-island {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      color: #0056b3;
      padding: 6px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: 0 6px 15px rgba(0,43,91,0.3);
      transition: all 0.5s;
    }

    /* Event Banner */
    #blue-event {
      position: absolute;
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: 800;
      color: #0056b3;
      background: white;
      padding: 10px 60px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,43,91,0.5);
      opacity: 0;
      transition: opacity 0.3s;
    }
    #blue-event.active { opacity: 1; }

    /* Bottom Thin Bar */
    #blue-bar {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 52px;
      background: #ffffff;
      border-radius: 26px;
      box-shadow: 0 10px 25px rgba(0,43,91,0.4);
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .m-sec { display: flex; align-items: center; height: 100%; padding: 0 25px; }

    .sec-main { background: #0056b3; color: white; min-width: 250px; justify-content: space-between; border-radius: 26px 0 0 26px;}
    .tm { font-size: 22px; font-weight: 800; }
    .sc { font-size: 26px; font-weight: 800; color: #ffeb3b; line-height: 1;}
    .ov { font-size: 12px; color: #b3d4ff; margin-left: 5px;}

    .sec-players { flex: 1; justify-content: center; gap: 40px; color: #333; font-size: 15px;}
    .player { display: flex; align-items: baseline; gap: 6px; }
    .pn { font-weight: 800; color: #002b5b; }
    .pr { font-weight: 800; font-size: 18px; }
    .pb { color: #888; font-size: 12px; }

    .strike-ind { color: #ea4c89; font-size: 12px; }

    .divider { width: 1px; height: 30px; background: #ddd; }

    .sec-bowl { background: #f0f4f8; min-width: 250px; justify-content: center; gap: 10px; border-radius: 0 26px 26px 0;}
  </style>
</head>
<body>

  <div id="blue-island">SUPER LEAGUE T20</div>
  <div id="blue-event"></div>

  <div id="blue-bar">
    <div class="m-sec sec-main">
      <span id="teamName" class="tm">STRIKERS</span>
      <div>
        <span class="sc"><span id="teamScore">76</span>/<span id="teamWickets">1</span></span>
        <span class="ov">(<span id="teamOvers">8.2</span>)</span>
      </div>
    </div>

    <div class="m-sec sec-players">
      <div class="player">
        <span class="strike-ind">●</span>
        <span id="strikerName" class="pn">V. Kohli</span>
        <span id="strikerRuns" class="pr">45</span>
        <span class="pb">(<span id="strikerBalls">22</span>)</span>
      </div>
      
      <div class="divider"></div>

      <div class="player">
        <span id="nonStrikerName" class="pn">J. Root</span>
        <span id="nonStrikerRuns" class="pr" style="color: #666;">12</span>
        <span class="pb">(<span id="nonStrikerBalls">10</span>)</span>
      </div>
    </div>

    <div class="m-sec sec-bowl">
      <span class="pb">BOWL</span>
      <span id="bowlerName" class="pn">M. Starc</span>
      <span class="pr"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">18</span></span>
      <span class="pb">(<span id="bowlerOvers">2.2</span>)</span>
    </div>
  </div>

  <script>
    let scr = -1, wkt = -1, st = 0, dat = {};
    const sd = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function pop(text) {
      const banner = document.getElementById('blue-event');
      banner.innerText = text;
      banner.classList.add('active');
      setTimeout(() => banner.classList.remove('active'), 2800);
    }

    setInterval(() => {
      const el = document.getElementById('blue-island');
      if(!dat.tournamentName) return;
      st = (st + 1) % 3;
      if(st === 0) el.innerText = dat.tournamentName;
      else if(st === 1) el.innerText = "CHASING: " + dat.team1Name;
      else el.innerText = dat.target > 0 ? "TARGET: " + dat.target : dat.status;
    }, 4000);

    function rx(d) {
      dat = d;
      sd('teamName', d.team1Name); sd('teamScore', d.team1Score); sd('teamWickets', d.team1Wickets); sd('teamOvers', d.team1Overs);
      sd('strikerName', d.strikerName); sd('strikerRuns', d.strikerRuns); sd('strikerBalls', d.strikerBalls);
      sd('nonStrikerName', d.nonStrikerName); sd('nonStrikerRuns', d.nonStrikerRuns); sd('nonStrikerBalls', d.nonStrikerBalls);
      sd('bowlerName', d.bowlerName); sd('bowlerRuns', d.bowlerRuns); sd('bowlerWickets', d.bowlerWickets); sd('bowlerOvers', d.bowlerOvers);

      let cS = parseInt(d.team1Score)||0, cW = parseInt(d.team1Wickets)||0;
      if (scr !== -1) {
        if (cW > wkt) pop("WICKET!");
        else if (cS - scr === 6) pop("SIX RUNS!");
        else if (cS - scr === 4) pop("FOUR RUNS!");
      }
      scr = cS; wkt = cW;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
