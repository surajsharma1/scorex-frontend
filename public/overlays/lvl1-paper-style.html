<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Neo-Brutalist Print</title>
  <style>
    /* Elegant serif for labels, technical sans for numbers */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,600&family=Space+Grotesk:wght@500;700;900&display=swap');

    :root {
      --mono-bg: #ffffff;
      --mono-fg: #000000;
      --mono-accent: #e63946; /* Stark editorial red */
      --mono-gray: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--mono-fg);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Animations */
    @keyframes blockSlam {
      0% { transform: translateY(100px); opacity: 0; box-shadow: 0 0 0 var(--mono-fg); }
      100% { transform: translateY(0); opacity: 1; box-shadow: 8px 8px 0px var(--mono-fg); }
    }

    @keyframes recBlink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.2; transform: scale(0.8); }
    }

    /* Top Static Island */
    #print-island {
      position: absolute; 
      top: 20px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--mono-bg);
      color: var(--mono-fg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; 
      font-weight: 900; 
      letter-spacing: 2px;
      padding: 8px 30px;
      border: 3px solid var(--mono-fg);
      box-shadow: 6px 6px 0px var(--mono-fg);
      animation: blockSlam 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Bottom Bar Wrapper */
    #print-bottom {
      position: absolute; 
      bottom: 30px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 20px;
      padding: 0 2vw;
    }

    /* Brutalist Modules */
    .print-mod {
      display: flex; 
      align-items: center; 
      padding: 15px 40px;
      border: 4px solid var(--mono-fg);
      opacity: 0;
      background: var(--mono-bg);
      animation: blockSlam 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* 1. Score Block (Inverted - Black BG) */
    .mod-score {
      flex: 0 1 340px;
      justify-content: space-between;
      background: var(--mono-fg);
      color: var(--mono-bg);
      animation-delay: 0.1s;
    }

    /* 2. Batting Block */
    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      animation-delay: 0.2s;
    }

    /* 3. Bowling Block */
    .mod-bowl {
      flex: 0 1 360px;
      justify-content: space-between;
      animation-delay: 0.3s;
    }

    /* Typography */
    .tm { 
      font-family: 'Playfair Display', serif; 
      font-size: 24px; 
      font-weight: 900; 
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .sc { 
      font-size: 55px; 
      font-weight: 900; 
      line-height: 0.85; 
      letter-spacing: -2px;
    }
    .sc span { font-size: 30px; color: #a3a3a3; margin: 0 4px; font-weight: 700;}
    
    .ov { 
      font-size: 16px; 
      font-weight: 900; 
      color: var(--mono-fg); 
      margin-left: 20px; 
      background: var(--mono-bg);
      padding: 4px 10px;
      border: 2px solid var(--mono-bg); /* Matches inner background to look cut out */
    }

    .pn { 
      font-family: 'Playfair Display', serif;
      font-size: 22px; 
      font-weight: 900; 
    }
    .ps { 
      font-size: 45px; 
      font-weight: 900; 
      margin-left: 15px;
      line-height: 0.85;
      letter-spacing: -1px;
    }
    .pb { font-size: 16px; color: var(--mono-gray); margin-left: 8px; font-weight: 700;}
    
    .lbl { 
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px; 
      color: var(--mono-gray); 
      font-weight: 700;
      margin-bottom: 2px;
    }

    /* The flashing red recording dot */
    .rec-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background-color: var(--mono-accent);
      border-radius: 50%;
      margin-right: 12px;
      animation: recBlink 1.5s infinite;
    }

    .v-div { 
      width: 4px; 
      height: 45px; 
      background: var(--mono-fg); 
      margin: 0 25px;
    }

  </style>
</head>
<body>

  <div id="print-island">SCOREX.LIVE :: EDITORIAL HUD</div>

  <div id="print-bottom">
    
    <div class="print-mod mod-score">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">TEAM</div>
        <div style="display:flex; align-items:baseline;">
          <div class="sc"><span id="teamScore" style="color:var(--mono-bg);">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov">OV <span id="teamOvers">0.0</span></div>
        </div>
      </div>
    </div>

    <div class="print-mod mod-bat">
      <div style="display:flex; align-items:center;">
        <span class="rec-dot"></span>
        <div style="display:flex; align-items:baseline;">
          <span id="strikerName" class="pn">Striker</span>
          <span id="strikerRuns" class="ps">0</span>
          <span class="pb">(<span id="strikerBalls">0</span>)</span>
        </div>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.5;">
        <span id="nonStrikerName" class="pn">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps">0</span>
      </div>
    </div>

    <div class="print-mod mod-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">Current Bowler</span>
        <span id="bowlerName" class="pn">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:var(--mono-accent);"><span id="bowlerWickets">0</span><span style="color:var(--mono-fg); margin:0 4px;">-</span><span id="bowlerRuns">0</span></span>
        <span class="pb">OV <span id="bowlerOvers" style="color:var(--mono-fg);">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', d.team1ShortName || d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
