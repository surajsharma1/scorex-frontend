<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Cyber Polygon (Edge-to-Edge)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,500;0,700;0,900;1,700&family=Rajdhani:wght@500;700;900&display=swap');

    :root {
      --pg-void: #020617;
      --pg-panel: #0f172a;
      --pg-cyan: #06b6d4;
      --pg-cyan-glow: #22d3ee;
      --pg-violet: #8b5cf6;
      --pg-violet-dark: #5b21b6;
      --pg-white: #f8fafc;
      --pg-gray: #94a3b8;
      --pg-red: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--pg-white);
      font-family: 'Rajdhani', sans-serif;
    }

    /* Entrance Animations */
    @keyframes polyRise { 
      0% { transform: translateY(120px); opacity: 0; } 
      100% { transform: translateY(0); opacity: 1; } 
    }
    
    @keyframes gridPulse {
      0%, 100% { box-shadow: inset 0 0 10px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: inset 0 0 25px rgba(6, 182, 212, 0.5); }
    }

    /* Static Top Island */
    #pg-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--pg-void); color: var(--pg-cyan-glow);
      font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 4px; 
      padding: 6px 40px; border: 2px solid var(--pg-cyan);
      clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
      box-shadow: 0 10px 20px rgba(0,0,0,0.8);
      animation: polyRise 0.5s ease-out forwards;
    }

    /* Edge to Edge Bottom Bar */
    #pg-bottom {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 90px;
      display: flex; background: transparent; 
      animation: polyRise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      filter: drop-shadow(0 -10px 20px rgba(0,0,0,0.8));
    }

    /* The Polygon Blocks */
    .pg-block {
      display: flex; height: 100%; position: relative;
      background: var(--pg-panel); 
    }

    /* 1. Score Block */
    .pg-score-zone {
      flex: 0 0 440px; background: var(--pg-void);
      border-top: 3px solid var(--pg-cyan);
      border-bottom: 3px solid var(--pg-cyan);
      clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 100%, 0 100%);
      z-index: 3; animation: gridPulse 3s infinite;
    }
    
    .team-box { 
      font-family: 'Exo 2', sans-serif; font-size: 48px; font-weight: 900;
      color: var(--pg-void); padding: 0 35px; display: flex; align-items: center; 
      background: var(--pg-cyan); border-right: 4px solid var(--pg-cyan-glow);
      clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 100%, 0 100%);
    }
    
    .score-data { display: flex; flex-direction: column; justify-content: center; padding-left: 20px; }
    .score-txt { font-family: 'Exo 2', sans-serif; font-size: 65px; line-height: 0.85; color: var(--pg-white); font-weight: 900;}
    .score-txt span { font-size: 35px; color: var(--pg-gray); margin: 0 5px; font-family: 'Rajdhani', sans-serif;}
    .ov-txt { font-size: 16px; font-weight: 800; color: var(--pg-cyan-glow); margin-top: 2px; letter-spacing: 2px;}
    .ov-txt span { color: var(--pg-white); font-size: 20px; margin-left: 6px;}

    /* 2. Batting Block */
    .pg-bat-zone { 
      flex: 1.2; padding: 0 40px; padding-left: 60px; margin-left: -30px;
      display: flex; flex-direction: column; justify-content: center;
      background: var(--pg-panel); border-top: 3px solid var(--pg-violet); border-bottom: 3px solid var(--pg-violet);
      clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 100%, 0 100%);
      z-index: 2;
    }
    .bat-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .bat-row:last-child { border-bottom: none; }
    
    .b-name-wrap { display: flex; align-items: center; gap: 15px; flex: 1; }
    .b-ind { width: 12px; height: 12px; background: var(--pg-cyan); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    .b-name { font-size: 22px; font-weight: 700; color: var(--pg-white); letter-spacing: 1px;}
    .b-runs { font-family: 'Exo 2', sans-serif; font-size: 40px; color: var(--pg-cyan); line-height: 1; width: 60px; text-align: right; font-weight: 900;}
    .b-balls { font-size: 16px; color: var(--pg-gray); width: 50px; text-align: right; font-weight: 700;}
    
    .bat-row.inactive .b-ind { opacity: 0; }
    .bat-row.inactive .b-name { color: var(--pg-gray); }
    .bat-row.inactive .b-runs { font-size: 30px; color: var(--pg-gray); }

    /* 3. Bowling Block */
    .pg-bowl-zone { 
      flex: 1; padding: 0 40px; padding-left: 60px; margin-left: -30px;
      display: flex; flex-direction: column; justify-content: center;
      background: var(--pg-violet-dark); border-top: 3px solid var(--pg-violet); border-bottom: 3px solid var(--pg-violet);
      clip-path: polygon(30px 0, 100% 0, 100% 100%, 0 100%);
      z-index: 1;
    }
    
    .bw-main { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px;}
    .bw-name { font-size: 22px; font-weight: 700; flex: 1; color: var(--pg-white); letter-spacing: 1px;}
    .bw-fig { font-family: 'Exo 2', sans-serif; font-size: 45px; color: var(--pg-cyan-glow); line-height: 0.8; font-weight: 900;}
    .bw-ov { font-size: 16px; color: var(--pg-white); font-weight: 700; margin-left: 20px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px;}

    .this-over-row { display: flex; align-items: center; gap: 10px; padding-top: 8px; }
    .this-over-row span { font-size: 14px; color: #ddd6fe; font-weight: 800; letter-spacing: 1px; }
    .ball-dot { width: 16px; height: 16px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: rgba(0,0,0,0.4); border: 1px solid var(--pg-cyan); }
    .ball-dot.fill { background: var(--pg-cyan); border-color: var(--pg-cyan); box-shadow: 0 0 10px var(--pg-cyan);}


    /* =========================================
       4. EVENT ANIMATIONS (4, 6, OUT, DECISION)
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Exo 2', sans-serif; font-size: 200px; line-height: 1; font-weight: 900;
      text-align: center; opacity: 0; font-style: italic;
    }
    
    .anim-event.fire { animation: cyberPop 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: var(--pg-cyan); text-shadow: 0 15px 30px rgba(0,0,0,0.9); -webkit-text-stroke: 4px var(--pg-void); }
    #ev-six { color: var(--pg-violet); text-shadow: 0 0 40px var(--pg-violet), 0 20px 40px rgba(0,0,0,0.9); font-size: 250px; -webkit-text-stroke: 4px var(--pg-white); }
    #ev-out { color: var(--pg-red); text-shadow: 0 20px 40px rgba(0,0,0,0.9); -webkit-text-stroke: 5px var(--pg-void); }

    /* Cyber Radar */
    .d-title { font-size: 16px; color: var(--pg-gray); letter-spacing: 6px; margin-bottom: 2px; font-weight: 800; font-family: 'Rajdhani', sans-serif;}
    .d-text { font-family: 'Exo 2', sans-serif; font-size: 75px; color: var(--pg-cyan-glow); line-height: 1; white-space: nowrap; font-style: italic;}

    @keyframes cyberPop {
      0% { transform: translate(-50%, -50%) scale(0) skewX(-10deg); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1) skewX(5deg); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1) skewX(0deg); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1) skewX(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.2) translateY(-40px); opacity: 0; }
    }

    @keyframes cyberFlash {
      0%, 100% { filter: drop-shadow(0 0 5px var(--pg-cyan)); }
      50% { filter: drop-shadow(0 0 25px var(--pg-cyan-glow)); }
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR!</div>
    <div id="ev-six" class="anim-event">SIX!</div>
    <div id="ev-out" class="anim-event">OUT!</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="pg-island">T20 CYBER SERIES</div>

  <div id="pg-bottom">
      
    <div class="pg-block pg-score-zone">
      <div class="team-box" id="teamName">TM</div>
      <div class="score-data">
        <div class="score-txt"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov-txt">OVERS <span><span id="teamOvers">0.0</span></span></div>
      </div>
    </div>

    <div class="pg-block pg-bat-zone">
      <div class="bat-row">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="strikerName">Striker Name</div></div>
        <div class="b-runs" id="strikerRuns">0</div>
        <div class="b-balls">(<span id="strikerBalls">0</span>)</div>
      </div>
      <div class="bat-row inactive">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="nonStrikerName">Non-Striker</div></div>
        <div class="b-runs" id="nonStrikerRuns">0</div>
        <div class="b-balls">(<span id="nonStrikerBalls">0</span>)</div>
      </div>
    </div>

    <div class="pg-block pg-bowl-zone">
      <div class="bw-main">
        <div class="bw-name">BOWL: <span id="bowlerName" style="color:var(--pg-cyan-glow); margin-left: 8px;">Name</span></div>
        <div style="display:flex; align-items:baseline;">
          <div class="bw-fig"><span id="bowlerWickets">0</span><span style="color:var(--pg-white); font-size:30px; margin:0 4px; font-family:'Rajdhani', sans-serif;">-</span><span id="bowlerRuns">0</span></div>
          <div class="bw-ov">OV <span id="bowlerOvers">0.0</span></div>
        </div>
      </div>
      <div class="this-over-row" id="this-over">
        <span>THIS OVER:</span>
        <div class="ball-dot"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/overlays/overlay-utils.js"></script>
<script src="/overlays/engine.js"></script>
<script src="/overlays/overlay-handlers.js"></script>
<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  let eventTimer = null;

  const safeSet = (id, val, fallback) => {
    const el = $(id);
    if (!el) return;
    const v = (val != null && val !== '') ? val : (fallback !== undefined ? fallback : '');
    el.innerText = String(v);
  };

  function processData(d) {
    if (!d) return;

    const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0, 4).toUpperCase();
    safeSet('teamName',      tName);
    safeSet('teamScore',     d.team1Score    ?? d.teamScore,    0);
    safeSet('teamWickets',   d.team1Wickets  ?? d.teamWickets,  0);
    safeSet('teamOvers',     d.team1Overs    ?? d.teamOvers,    '0.0');

    safeSet('strikerName',   d.strikerName,    'Striker');
    safeSet('strikerRuns',   d.strikerRuns,    0);
    safeSet('strikerBalls',  d.strikerBalls,   0);

    safeSet('nonStrikerName',  d.nonStrikerName,  'Non-Striker');
    safeSet('nonStrikerRuns',  d.nonStrikerRuns,  0);
    safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

    safeSet('bowlerName',    d.bowlerName,    'Bowler');
    safeSet('bowlerRuns',    d.bowlerRuns,    0);
    safeSet('bowlerWickets', d.bowlerWickets, 0);
    safeSet('bowlerOvers',   d.bowlerOvers,   '0.0');

    // Ball renderer
    if (typeof window.renderCurrentOver === 'function') {
      window.renderCurrentOver(d.thisOver || []);
    }
  }

  function handleTrigger(t) {
    const evFour     = $('ev-four');
    const evSix      = $('ev-six');
    const evOut      = $('ev-out');
    if (!evFour || !evSix || !evOut || !evDecision) return;

    // Clear all active animations first
    evFour.classList.remove('fire');
    evSix.classList.remove('fire');
    evOut.classList.remove('fire');
    clearTimeout(eventTimer);

    if (t.type === 'FOUR') {
      evFour.classList.add('fire');
      eventTimer = setTimeout(() => evFour.classList.remove('fire'), 3000);
    } else if (t.type === 'SIX') {
      evSix.classList.add('fire');
      eventTimer = setTimeout(() => evSix.classList.remove('fire'), 3000);
    } else if (t.type === 'WICKET') {
      evOut.classList.add('fire');
      eventTimer = setTimeout(() => evOut.classList.remove('fire'), 3000);
    } else if (t.type === 'RESTORE') {
      evDecision.classList.remove('fire');
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'UPDATE_SCORE' && e.data.data) {
      processData(e.data.data);
    }
    if (e.data.type === 'OVERLAY_TRIGGER' && e.data.payload) {
      handleTrigger(e.data.payload);
    }
  });
})();
</script>
</body>
</html>
