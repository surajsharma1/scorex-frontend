<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Clean Print</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@500;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: transparent; overflow: hidden; color: #111; }

    /* Minimal Island */
    #print-island {
      position: absolute; top: 20px; left: 40px;
      background: #fff; color: #111;
      padding: 8px 24px; border: 3px solid #111;
      font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 6px 6px 0px #111;
    }

    /* Stamp Event Popup */
    #print-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
      background: #111; color: #fff;
      font-size: 90px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px;
      padding: 15px 50px; border: 6px solid #111;
      box-shadow: 15px 15px 0px #e63946; /* Red shadow pop */
      opacity: 0; transition: opacity 0.2s;
    }
    #print-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Solid Grid Bottom Bar */
    #print-bottom {
      position: absolute; bottom: 25px; left: 5%; width: 90%; height: 85px;
      display: flex; background: #fff; border: 4px solid #111;
      box-shadow: 10px 10px 0px #111;
    }

    .pr-cell { display: flex; align-items: center; padding: 0 25px; border-right: 3px solid #111; }
    .pr-cell:last-child { border-right: none; }

    /* Score Cell */
    .c-score { min-width: 250px; justify-content: space-between; background: #f8f9fa;}
    .pr-tm { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; font-style: italic;}
    .pr-sc { font-size: 46px; font-weight: 900; line-height: 1; letter-spacing: -1px;}
    .pr-sc span { font-size: 24px; color: #666; }
    .pr-ov { font-size: 14px; font-weight: 800; color: #555; text-transform: uppercase; text-align: right;}

    /* Batting Cell */
    .c-bat { flex: 1; justify-content: space-around; }
    .bat-blk { display: flex; flex-direction: column; }
    .b-n { font-size: 20px; font-weight: 800; }
    .b-r { font-size: 28px; font-weight: 900; }
    .b-b { font-size: 14px; color: #666; font-weight: 500;}
    .strike { color: #e63946; font-size: 14px; margin-right: 6px; }

    /* Divider inside bat */
    .v-div { width: 3px; height: 50px; background: #111; }

    /* Bowling Cell */
    .c-bowl { min-width: 300px; justify-content: space-between; background: #111; color: #fff;}
    .lbl-w { color: #aaa; font-size: 12px; font-weight: 800; text-transform: uppercase;}
    .bw-r { font-size: 32px; font-weight: 900; color: #e63946; } /* Red stats */

  </style>
</head>
<body>

  <div id="print-island">THE DAILY MATCH</div>
  <div id="print-event"></div>

  <div id="print-bottom">
    
    <div class="pr-cell c-score">
      <div id="teamName" class="pr-tm">TEAM</div>
      <div>
        <div class="pr-sc"><span id="teamScore">142</span><span>/</span><span id="teamWickets">2</span></div>
        <div class="pr-ov">OV <span id="teamOvers">12.1</span></div>
      </div>
    </div>

    <div class="pr-cell c-bat">
      <div class="bat-blk">
        <div><span class="strike">●</span><span id="strikerName" class="b-n">J. Root</span></div>
        <div><span id="strikerRuns" class="b-r">54</span> <span class="b-b">(<span id="strikerBalls">36</span>)</span></div>
      </div>

      <div class="v-div"></div>

      <div class="bat-blk">
        <div id="nonStrikerName" class="b-n" style="color: #666;">B. Stokes</div>
        <div><span id="nonStrikerRuns" class="b-r" style="color: #666;">22</span> <span class="b-b">(<span id="nonStrikerBalls">18</span>)</span></div>
      </div>
    </div>

    <div class="pr-cell c-bowl">
      <div class="bat-blk">
        <span class="lbl-w">BOWLER</span>
        <span id="bowlerName" class="b-n" style="color: #fff;">M. Wood</span>
      </div>
      <div style="text-align: right;">
        <div class="bw-r"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">18</span></div>
        <div class="b-b" style="color:#aaa;">(<span id="bowlerOvers">2.1</span>)</div>
      </div>
    </div>

  </div>

  <script>
    let ptSc = -1, ptWk = -1, ptSt = 0, ptDat = {};
    const set = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function popPrint(txt) {
      const e = document.getElementById('print-event');
      e.innerText = txt; e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('print-island');
      if(!ptDat.tournamentName) return;
      ptSt = (ptSt + 1) % 3;
      if(ptSt === 0) isl.innerText = ptDat.tournamentName;
      else if(ptSt === 1) isl.innerText = "CRR: " + (ptDat.runRate||'0.0');
      else isl.innerText = ptDat.target > 0 ? "TARGET: " + ptDat.target : "LIVE MATCH";
    }, 4500);

    function rx(d) {
      ptDat = d;
      set('teamName', d.team1Name); set('teamScore', d.team1Score); set('teamWickets', d.team1Wickets); set('teamOvers', d.team1Overs);
      set('strikerName', d.strikerName); set('strikerRuns', d.strikerRuns); set('strikerBalls', d.strikerBalls);
      set('nonStrikerName', d.nonStrikerName); set('nonStrikerRuns', d.nonStrikerRuns); set('nonStrikerBalls', d.nonStrikerBalls);
      set('bowlerName', d.bowlerName); set('bowlerRuns', d.bowlerRuns); set('bowlerWickets', d.bowlerWickets); set('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (ptSc !== -1) {
        if (nw > ptWk) popPrint("WICKET!");
        else if (ns - ptSc === 6) popPrint("SIX RUNS!");
        else if (ns - ptSc === 4) popPrint("FOUR RUNS!");
      }
      ptSc = ns; ptWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
