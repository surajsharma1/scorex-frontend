<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Retro Teal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Mono', monospace; text-transform: uppercase;}
    body { background: transparent; overflow: hidden; color: #111; }
    
    #static-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: #fefce8; border: 3px solid #111; box-shadow: 4px 4px 0px #0d9488;
      font-size: 14px; font-weight: 700; padding: 6px 20px;
    }

    /* Blocky layout with hard borders */
    #bottom-bar {
      position: absolute; bottom: 15px; left: 0; width: 100%; height: 70px;
      display: flex; gap: 10px; padding: 0 10px;
    }
    
    .panel { background: #fefce8; border: 3px solid #111; box-shadow: 4px 4px 0px #111; display: flex; align-items: center; padding: 0 30px; }
    .p-score { background: #0d9488; color: #fff; min-width: 300px; justify-content: space-between; box-shadow: 4px 4px 0px #f43f5e;}
    .p-bat { flex: 1; justify-content: space-around; }
    .p-bowl { min-width: 320px; justify-content: space-between; }

    .tm { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 1px; margin-top: 5px;}
    .sc { font-family: 'Bebas Neue', sans-serif; font-size: 50px; line-height: 0.8; }
    .sc span { font-size: 26px; color: #ccfbf1; }
    .ov { font-size: 13px; font-weight: 700; background: #111; color: #0d9488; padding: 2px 6px; margin-left: 10px;}
    
    .pn { font-size: 18px; font-weight: 700; }
    .ps { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: #f43f5e; margin-left: 10px; line-height: 0.8;}
    .pb { font-size: 13px; color: #666; font-weight: 700;}
    .lbl { font-size: 11px; color: #0d9488; font-weight: 700; margin-bottom: 2px;}
    .v-div { width: 3px; height: 100%; background: #111; margin: 0 15px; }
  </style>
</head>
<body>
  <div id="static-island">SCOREX-LIVE.VERCEL.APP</div>
  <div id="bottom-bar">
    <div class="panel p-score">
      <div id="teamName" class="tm">TEAM</div>
      <div style="display:flex; align-items:baseline;">
        <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov">OV <span id="teamOvers">0.0</span></div>
      </div>
    </div>
    <div class="panel p-bat">
      <div style="display:flex; align-items:baseline;">
        <span style="color:#0d9488; margin-right:8px; font-size: 14px;">></span>
        <span id="strikerName" class="pn">Striker</span><span id="strikerRuns" class="ps">0</span> <span class="pb" style="margin-left: 5px;">(<span id="strikerBalls">0</span>)</span>
      </div>
      <div class="v-div"></div>
      <div style="display:flex; align-items:baseline; opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span><span id="nonStrikerRuns" class="ps" style="color:#111;">0</span>
      </div>
    </div>
    <div class="panel p-bowl">
      <div style="display:flex; flex-direction:column;"><span class="lbl">Bowler</span><span id="bowlerName" class="pn">Bowler Name</span></div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:#111;"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span> <span class="pb" style="margin-left:10px;">OV <span id="bowlerOvers">0.0</span></span>
      </div>
    </div>
  </div>
  <script>
    const $ = id => document.getElementById(id);
    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') { const d = e.data.data; ['teamName','teamScore','teamWickets','teamOvers','strikerName','strikerRuns','strikerBalls','nonStrikerName','nonStrikerRuns','bowlerName','bowlerRuns','bowlerWickets','bowlerOvers'].forEach(k => { if($(k)) $(k).innerText = d[k]; }); }});
  </script>
</body>
</html>
