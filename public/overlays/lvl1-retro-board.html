<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Retro Arcade</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'VT323', monospace; }
    body { background: transparent; overflow: hidden; color: #39ff14; text-transform: uppercase; }

    /* CRT Scanline Effect Overlay for the UI */
    .crt::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }

    /* Top Island */
    #retro-island {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: #000; border: 2px solid #39ff14; padding: 8px 24px;
      font-size: 20px; text-shadow: 0 0 5px #39ff14;
      box-shadow: 4px 4px 0px #39ff14;
    }

    /* Event Popup */
    #retro-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 100px; color: #fff; background: #000; padding: 10px 40px;
      border: 4px solid #fff; box-shadow: 8px 8px 0px #fff;
      opacity: 0; transition: transform 0.2s steps(4), opacity 0.2s;
    }
    #retro-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Bottom Bar */
    #retro-bottom {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      width: 90%; height: 80px; display: flex; align-items: center; gap: 15px;
    }

    .r-panel {
      background: #000; border: 2px solid #39ff14; height: 100%;
      display: flex; align-items: center; padding: 0 20px;
      box-shadow: 4px 4px 0px #39ff14; position: relative;
    }

    /* Score Panel */
    .p-score { min-width: 250px; justify-content: space-between; border-color: #ff00ff; box-shadow: 4px 4px 0px #ff00ff; color: #ff00ff;}
    .p-score .s-team { font-size: 28px; text-shadow: 0 0 5px #ff00ff;}
    .p-score .s-runs { font-size: 46px; line-height: 1; }
    .p-score .s-ov { font-size: 18px; color: #aaa; text-shadow: none; }

    /* Player Panels */
    .p-players { flex: 1; justify-content: space-around; font-size: 22px; }
    .p-players span { text-shadow: 0 0 5px #39ff14; }
    
    .blink { animation: blinker 1s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }

    .p-bowl { min-width: 280px; border-color: #ffff00; box-shadow: 4px 4px 0px #ffff00; color: #ffff00; justify-content: space-between;}
    .p-bowl span { text-shadow: 0 0 5px #ffff00; }
  </style>
</head>
<body>

  <div id="retro-island" class="crt">INSERT COIN...</div>
  <div id="retro-event" class="crt"></div>

  <div id="retro-bottom" class="crt">
    
    <div class="r-panel p-score">
      <div id="teamName" class="s-team">PLYR 1</div>
      <div style="text-align: right;">
        <div class="s-runs"><span id="teamScore">0</span>-<span id="teamWickets">0</span></div>
        <div class="s-ov">LVL <span id="teamOvers">0.0</span></div>
      </div>
    </div>

    <div class="r-panel p-players">
      <div>
        <span class="blink" style="color: #ff00ff;">></span> 
        <span id="strikerName">BATSMAN A</span> 
        <span id="strikerRuns" style="font-size: 32px; margin-left: 10px;">00</span>
        <span style="color:#888;">(<span id="strikerBalls">00</span>)</span>
      </div>
      <div>
        <span id="nonStrikerName" style="color:#888;">BATSMAN B</span> 
        <span id="nonStrikerRuns" style="font-size: 32px; margin-left: 10px; color: #888;">00</span>
      </div>
    </div>

    <div class="r-panel p-bowl">
      <span id="bowlerName" style="font-size: 26px;">BOWLER X</span>
      <div>
        <span style="font-size: 36px;"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">00</span></span>
        <span style="font-size: 18px;">(<span id="bowlerOvers">0.0</span>)</span>
      </div>
    </div>

  </div>

  <script>
    let rSc = -1, rWk = -1, rSt = 0, rDat = {};
    const set = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function retroPop(msg, color, border) {
      const el = document.getElementById('retro-event');
      el.innerText = msg; el.style.color = color; 
      el.style.borderColor = border; el.style.boxShadow = `8px 8px 0px ${border}`;
      el.style.textShadow = `0 0 10px ${color}`;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }

    setInterval(() => {
      const isl = document.getElementById('retro-island');
      if(!rDat.tournamentName) return;
      rSt = (rSt + 1) % 3;
      if(rSt === 0) isl.innerText = `[ ${rDat.tournamentName} ]`;
      else if(rSt === 1) isl.innerText = `SCORE: ${rDat.runRate||'0.00'} PTS/SEC`;
      else isl.innerText = rDat.target > 0 ? `MISSION: ${rDat.target}` : "STAGE 1";
    }, 4000);

    function rx(d) {
      rDat = d;
      set('teamName', d.team1Name); set('teamScore', d.team1Score); set('teamWickets', d.team1Wickets); set('teamOvers', d.team1Overs);
      set('strikerName', d.strikerName); set('strikerRuns', d.strikerRuns); set('strikerBalls', String(d.strikerBalls).padStart(2, '0'));
      set('nonStrikerName', d.nonStrikerName); set('nonStrikerRuns', d.nonStrikerRuns);
      set('bowlerName', d.bowlerName); set('bowlerRuns', String(d.bowlerRuns).padStart(2, '0')); set('bowlerWickets', d.bowlerWickets); set('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (rSc !== -1) {
        if (nw > rWk) retroPop("GAME OVER!", "#ff0000", "#ff0000");
        else if (ns - rSc === 6) retroPop("SUPER HIT!", "#ffff00", "#ffff00");
        else if (ns - rSc === 4) retroPop("GREAT!", "#39ff14", "#39ff14");
      }
      rSc = ns; rWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
