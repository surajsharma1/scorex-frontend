<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Minimal Transparent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@500;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
    body { background: transparent; overflow: hidden; color: #fff; }

    /* Universal Text Shadow for Readability */
    .txt-shadow { text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 4px 15px rgba(0,0,0,0.8); }

    /* Top Floating Island */
    #transp-island {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: #ffeb3b;
    }

    /* Snappy Event Popup */
    #transp-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 140px; font-weight: 900; color: #fff; text-transform: uppercase;
      opacity: 0; transition: all 0.2s cubic-bezier(0.25, 1.5, 0.5, 1);
    }
    #transp-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Bottom Transparent Bar */
    #transp-bottom {
      position: absolute; bottom: 20px; left: 5%; width: 90%; height: 85px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }

    /* Score Area */
    .t-score-block { display: flex; align-items: baseline; gap: 15px; }
    .t-team { font-size: 48px; font-weight: 900; color: #ffeb3b; line-height: 0.8;}
    .t-sc { font-size: 70px; font-weight: 900; line-height: 0.75; }
    .t-sc span { font-size: 40px; color: #ccc; }
    .t-ov { font-size: 20px; font-weight: 700; color: #aaa;}

    /* Player Area */
    .t-bat-block { display: flex; gap: 40px; align-items: flex-end; }
    .p-col { display: flex; flex-direction: column; align-items: center; }
    .p-nm { font-size: 22px; font-weight: 700; }
    .p-st { font-size: 32px; font-weight: 900; line-height: 0.9;}
    .p-bl { font-size: 16px; color: #ccc; }
    
    .strike { color: #ffeb3b; }
    .strike .p-st { color: #ffeb3b; }

    /* Bowler Area */
    .t-bowl-block { display: flex; flex-direction: column; align-items: flex-end; }
    .b-lbl { font-size: 14px; color: #00e5ff; font-weight: 700; letter-spacing: 1px; margin-bottom: -5px;}
    .b-row { display: flex; align-items: baseline; gap: 15px; }
  </style>
</head>
<body>

  <div id="transp-island" class="txt-shadow">LIVE BROADCAST</div>
  <div id="transp-event" class="txt-shadow"></div>

  <div id="transp-bottom">
    
    <div class="t-score-block txt-shadow">
      <div id="teamName" class="t-team">TEAM</div>
      <div class="t-sc"><span id="teamScore">224</span><span>/</span><span id="teamWickets">2</span></div>
      <div class="t-ov">OV <span id="teamOvers">18.5</span></div>
    </div>

    <div class="t-bat-block txt-shadow">
      <div class="p-col strike">
        <span id="strikerName" class="p-nm">▶ Batter 1</span>
        <div><span id="strikerRuns" class="p-st">104</span> <span class="p-bl">(<span id="strikerBalls">52</span>)</span></div>
      </div>
      <div class="p-col" style="opacity: 0.8;">
        <span id="nonStrikerName" class="p-nm">Batter 2</span>
        <div><span id="nonStrikerRuns" class="p-st">24</span> <span class="p-bl">(<span id="nonStrikerBalls">15</span>)</span></div>
      </div>
    </div>

    <div class="t-bowl-block txt-shadow">
      <span class="b-lbl">CURRENT BOWLER</span>
      <div class="b-row">
        <span id="bowlerName" class="p-nm">Bowler Name</span>
        <span class="p-st" style="color: #00e5ff;"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">38</span></span>
        <span class="p-bl">Ov <span id="bowlerOvers">3.5</span></span>
      </div>
    </div>

  </div>

  <script>
    let tSc = -1, tWk = -1, tSt = 0, tDat = {};
    const pd = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function popT(txt, col) {
      const e = document.getElementById('transp-event');
      e.innerText = txt; e.style.color = col;
      e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('transp-island');
      if(!tDat.tournamentName) return;
      tSt = (tSt + 1) % 3;
      if(tSt === 0) isl.innerText = tDat.tournamentName;
      else if(tSt === 1) isl.innerText = "RUN RATE: " + (tDat.runRate||'0.0');
      else isl.innerText = tDat.target > 0 ? "TARGET: " + tDat.target : "FIRST INNINGS";
    }, 4000);

    function rx(d) {
      tDat = d;
      pd('teamName', d.team1Name); pd('teamScore', d.team1Score); pd('teamWickets', d.team1Wickets); pd('teamOvers', d.team1Overs);
      pd('strikerName', "▶ " + (d.strikerName || '')); pd('strikerRuns', d.strikerRuns); pd('strikerBalls', d.strikerBalls);
      pd('nonStrikerName', d.nonStrikerName); pd('nonStrikerRuns', d.nonStrikerRuns); pd('nonStrikerBalls', d.nonStrikerBalls);
      pd('bowlerName', d.bowlerName); pd('bowlerRuns', d.bowlerRuns); pd('bowlerWickets', d.bowlerWickets); pd('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (tSc !== -1) {
        if (nw > tWk) popT("WICKET", "#ff3333");
        else if (ns - tSc === 6) popT("SIX RUNS", "#00e5ff");
        else if (ns - tSc === 4) popT("BOUNDARY", "#ffeb3b");
      }
      tSc = ns; tWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
