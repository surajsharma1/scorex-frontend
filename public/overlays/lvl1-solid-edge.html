<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Retro Terminal HUD</title>
  <style>
    /* Classic terminal and pixel fonts */
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap');

    :root {
      --term-bg: #050505;
      --term-green: #39ff14;
      --term-amber: #ffb000;
      --term-cyan: #00ffff;
      --term-dim: #005500;
      --term-pink: #ff007f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--term-green);
      font-family: 'Space Mono', monospace;
    }

    /* CRT Scanline Effect Overlay */
    .scanlines {
      position: relative;
    }
    .scanlines::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
    }

    /* Terminal Animations */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    
    @keyframes bootUp {
      0% { transform: scaleY(0.01) scaleX(0); opacity: 0; }
      50% { transform: scaleY(0.01) scaleX(1); opacity: 1; }
      100% { transform: scaleY(1) scaleX(1); opacity: 1; }
    }

    /* Top Static Island */
    #term-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--term-bg);
      color: var(--term-amber);
      font-size: 14px; 
      font-weight: 700; 
      letter-spacing: 2px;
      padding: 8px 24px;
      border: 2px solid var(--term-amber);
      box-shadow: 4px 4px 0px rgba(255, 176, 0, 0.3);
      animation: bootUp 0.4s ease-out forwards;
    }

    /* Bottom Bar Layout */
    #term-bottom {
      position: absolute; 
      bottom: 25px; 
      left: 0; 
      width: 100%; 
      display: flex; 
      justify-content: center;
      gap: 20px;
      padding: 0 2vw;
      animation: bootUp 0.6s ease-out forwards;
    }

    /* Individual Data Blocks */
    .term-block {
      background: var(--term-bg);
      display: flex; 
      align-items: center; 
      padding: 15px 30px;
      position: relative;
    }

    .mod-score {
      flex: 0 1 320px;
      justify-content: space-between;
      border: 3px solid var(--term-green);
      box-shadow: 6px 6px 0px rgba(57, 255, 20, 0.2);
    }

    .mod-bat {
      flex: 1 1 auto;
      justify-content: space-around;
      border: 3px solid var(--term-cyan);
      box-shadow: 6px 6px 0px rgba(0, 255, 255, 0.2);
    }

    .mod-bowl {
      flex: 0 1 350px;
      justify-content: space-between;
      border: 3px solid var(--term-pink);
      box-shadow: 6px 6px 0px rgba(255, 0, 127, 0.2);
    }

    /* Typography */
    .tm { 
      font-size: 16px; 
      font-weight: 700; 
      color: var(--term-green);
      margin-bottom: 2px;
    }
    .sc { 
      font-family: 'VT323', monospace; 
      font-size: 65px; 
      line-height: 0.8; 
      color: var(--term-green);
      text-shadow: 0 0 8px rgba(57,255,20,0.5);
    }
    .sc span { font-size: 35px; color: var(--term-dim); margin: 0 5px;}
    
    .ov-container {
      border: 1px solid var(--term-green);
      padding: 4px 10px;
      margin-left: 20px;
      text-align: center;
    }
    .ov-lbl { font-size: 10px; color: var(--term-dim); margin-bottom: 2px; }
    .ov { font-family: 'VT323', monospace; font-size: 28px; line-height: 1; }

    .pn { font-size: 18px; font-weight: 700; }
    .ps { 
      font-family: 'VT323', monospace; 
      font-size: 50px; 
      margin-left: 15px;
      line-height: 0.8;
    }
    .pb { font-size: 14px; margin-left: 10px; font-weight: 700; color: var(--term-dim); }
    
    .lbl { 
      font-size: 12px; 
      color: var(--term-pink); 
      letter-spacing: 2px; 
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background-color: var(--term-cyan);
      margin-right: 8px;
      animation: blink 1s step-end infinite;
    }

    .v-div { 
      width: 2px; 
      height: 40px; 
      background: var(--term-dim); 
      margin: 0 20px;
    }

  </style>
</head>
<body>

  <div id="term-island" class="scanlines">[ SYS.SCOREX.LIVE ]</div>

  <div id="term-bottom">
    
    <div class="term-block mod-score scanlines">
      <div style="display:flex; flex-direction:column;">
        <div id="teamName" class="tm">> TEAM</div>
        <div style="display:flex; align-items:flex-end;">
          <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov-container">
            <div class="ov-lbl">OVERS</div>
            <div class="ov" id="teamOvers">0.0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="term-block mod-bat scanlines">
      <div style="display:flex; align-items:baseline;">
        <span class="cursor"></span>
        <span id="strikerName" class="pn" style="color:var(--term-cyan);">Striker</span>
        <span id="strikerRuns" class="ps" style="color:var(--term-cyan);">0</span>
        <span class="pb">(<span id="strikerBalls">0</span>)</span>
      </div>
      
      <div class="v-div"></div>
      
      <div style="display:flex; align-items:baseline; opacity: 0.7;">
        <span style="display:inline-block; width:10px; margin-right:8px;"></span> <span id="nonStrikerName" class="pn" style="color:var(--term-dim);">Non-Striker</span>
        <span id="nonStrikerRuns" class="ps" style="color:var(--term-dim);">0</span>
      </div>
    </div>

    <div class="term-block mod-bowl scanlines">
      <div style="display:flex; flex-direction:column;">
        <span class="lbl">> BOWL.EXE</span>
        <span id="bowlerName" class="pn" style="color:#fff;">Bowler Name</span>
      </div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:var(--term-pink);"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span>
        <span class="pb">OV <span id="bowlerOvers" style="color:#fff;">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null && val !== '' ? val : fallback;
      };

      safeSet('teamName', '> ' + (d.team1ShortName || d.team1Name || d.teamName || 'TEAM'));
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // Connect to engine triggers
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
