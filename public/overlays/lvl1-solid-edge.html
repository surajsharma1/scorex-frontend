<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Monochrome Noir (Edge-to-Edge)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;700;900&display=swap');

    :root {
      --mn-black: #000000;
      --mn-white: #ffffff;
      --mn-gray: #a1a1aa;
      --mn-dark-gray: #18181b;
      --mn-border: #3f3f46;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--mn-white);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Entrance Animations */
    @keyframes brutalSlam { 
      0% { transform: translateY(100px); opacity: 0; box-shadow: 0 0 0 transparent;} 
      100% { transform: translateY(0); opacity: 1; box-shadow: 0 -15px 40px rgba(0,0,0,0.9); } 
    }
    
    @keyframes strobeBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Static Top Island */
    #mn-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--mn-white); color: var(--mn-black);
      font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 6px; 
      padding: 8px 40px; border: 4px solid var(--mn-black);
      box-shadow: 8px 8px 0 rgba(0,0,0,1);
      animation: brutalSlam 0.4s ease-out forwards;
    }

    /* Edge to Edge Bottom Bar */
    #mn-bottom {
      position: absolute; bottom: 0; left: 0; width: 100vw; height: 95px;
      display: flex; background: var(--mn-black); 
      border-top: 4px solid var(--mn-white);
      animation: brutalSlam 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* The Brutalist Blocks */
    .mn-block {
      display: flex; height: 100%; position: relative;
      border-right: 4px solid var(--mn-white);
    }

    /* 1. Score Block (Inverted - White BG) */
    .mn-score-zone {
      flex: 0 0 450px; background: var(--mn-white); color: var(--mn-black);
    }
    
    .team-box { 
      font-family: 'Anton', sans-serif; font-size: 55px;
      color: var(--mn-white); padding: 0 35px; display: flex; align-items: center; 
      background: var(--mn-black); border-right: 4px solid var(--mn-white);
      letter-spacing: 2px;
    }
    
    .score-data { display: flex; flex-direction: column; justify-content: center; padding-left: 20px; }
    .score-txt { font-family: 'Anton', sans-serif; font-size: 70px; line-height: 0.85; color: var(--mn-black); letter-spacing: 1px;}
    .score-txt span { font-size: 40px; color: var(--mn-gray); margin: 0 5px; font-family: 'Space Grotesk', sans-serif; font-weight: 900;}
    .ov-txt { font-size: 16px; font-weight: 900; color: var(--mn-black); margin-top: 2px; letter-spacing: 2px;}
    .ov-txt span { color: var(--mn-dark-gray); font-size: 20px; margin-left: 6px;}

    /* 2. Batting Block (Black BG) */
    .mn-bat-zone { 
      flex: 1.2; padding: 0 40px;
      display: flex; flex-direction: column; justify-content: center;
      background: var(--mn-black); 
    }
    .bat-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 2px solid var(--mn-border); }
    .bat-row:last-child { border-bottom: none; }
    
    .b-name-wrap { display: flex; align-items: center; gap: 15px; flex: 1; }
    .b-ind { width: 14px; height: 14px; background: var(--mn-white); animation: strobeBlink 1s step-end infinite; }
    .b-name { font-size: 24px; font-weight: 900; color: var(--mn-white); letter-spacing: 1px;}
    .b-runs { font-family: 'Anton', sans-serif; font-size: 45px; color: var(--mn-white); line-height: 1; width: 60px; text-align: right;}
    .b-balls { font-size: 18px; color: var(--mn-gray); width: 50px; text-align: right; font-weight: 700;}
    
    .bat-row.inactive .b-ind { opacity: 0; }
    .bat-row.inactive .b-name { color: var(--mn-gray); }
    .bat-row.inactive .b-runs { font-size: 35px; color: var(--mn-gray); }

    /* 3. Bowling Block (Dark Gray BG) */
    .mn-bowl-zone { 
      flex: 1; padding: 0 40px;
      display: flex; flex-direction: column; justify-content: center;
      background: var(--mn-dark-gray); border-right: none;
    }
    
    .bw-main { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 2px solid var(--mn-border); padding-bottom: 4px;}
    .bw-name { font-size: 24px; font-weight: 900; flex: 1; color: var(--mn-white); letter-spacing: 1px;}
    .bw-fig { font-family: 'Anton', sans-serif; font-size: 48px; color: var(--mn-white); line-height: 0.8;}
    .bw-ov { font-size: 16px; color: var(--mn-black); font-weight: 900; margin-left: 20px; background: var(--mn-white); padding: 4px 12px;}

    .this-over-row { display: flex; align-items: center; gap: 10px; padding-top: 8px; }
    .this-over-row span { font-size: 16px; color: var(--mn-gray); font-weight: 900; letter-spacing: 2px; }
    .ball-dot { width: 18px; height: 18px; background: var(--mn-black); border: 2px solid var(--mn-white); }
    .ball-dot.fill { background: var(--mn-white); }


    /* =========================================
       4. EVENT ANIMATIONS (4, 6, OUT, DECISION)
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Anton', sans-serif; font-size: 220px; line-height: 1;
      text-align: center; opacity: 0; letter-spacing: 5px;
    }
    
    .anim-event.fire { animation: brutalPop 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: var(--mn-black); -webkit-text-stroke: 8px var(--mn-white); text-shadow: 15px 15px 0 var(--mn-black); }
    #ev-six { color: var(--mn-white); -webkit-text-stroke: 6px var(--mn-black); font-size: 280px; text-shadow: 15px 15px 0 var(--mn-white); }
    
    #ev-out { color: var(--mn-black); background: var(--mn-white); padding: 20px 80px; border: 10px solid var(--mn-black); }

    /* Strobe Radar */
    #ev-decision {
      position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
      background: var(--mn-white); border: 6px solid var(--mn-black);
      padding: 20px 80px; opacity: 0; transition: opacity 0.3s; text-align: center; pointer-events: none;
      box-shadow: 15px 15px 0 rgba(0,0,0,1);
    }
    #ev-decision.fire { opacity: 1; animation: strobeFlash 0.5s step-end infinite; }
    .d-title { font-size: 20px; color: var(--mn-black); letter-spacing: 8px; margin-bottom: 2px; font-weight: 900;}
    .d-text { font-family: 'Anton', sans-serif; font-size: 90px; color: var(--mn-black); line-height: 1; white-space: nowrap;}

    @keyframes brutalPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) translateY(-50px); opacity: 0; }
    }

    @keyframes strobeFlash {
      0%, 100% { filter: invert(0); }
      50% { filter: invert(1); }
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR</div>
    <div id="ev-six" class="anim-event">SIX</div>
    <div id="ev-out" class="anim-event">OUT</div>
    <div id="ev-decision">
      <div class="d-title">THIRD UMPIRE</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="mn-island">LIVE BROADCAST</div>

  <div id="mn-bottom">
      
    <div class="mn-block mn-score-zone">
      <div class="team-box" id="teamName">TM</div>
      <div class="score-data">
        <div class="score-txt"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov-txt">OVERS <span><span id="teamOvers">0.0</span></span></div>
      </div>
    </div>

    <div class="mn-block mn-bat-zone">
      <div class="bat-row">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="strikerName">Striker Name</div></div>
        <div class="b-runs" id="strikerRuns">0</div>
        <div class="b-balls">(<span id="strikerBalls">0</span>)</div>
      </div>
      <div class="bat-row inactive">
        <div class="b-name-wrap"><div class="b-ind"></div><div class="b-name" id="nonStrikerName">Non-Striker</div></div>
        <div class="b-runs" id="nonStrikerRuns">0</div>
        <div class="b-balls">(<span id="nonStrikerBalls">0</span>)</div>
      </div>
    </div>

    <div class="mn-block mn-bowl-zone">
      <div class="bw-main">
        <div class="bw-name">BOWL: <span id="bowlerName" style="color:var(--mn-gray); margin-left: 8px;">Name</span></div>
        <div style="display:flex; align-items:baseline;">
          <div class="bw-fig"><span id="bowlerWickets">0</span><span style="color:var(--mn-gray); font-size:35px; margin:0 4px; font-family:'Space Grotesk', sans-serif;">-</span><span id="bowlerRuns">0</span></div>
          <div class="bw-ov">OV <span id="bowlerOvers">0.0</span></div>
        </div>
      </div>
      <div class="this-over-row" id="this-over">
        <span>THIS OVER:</span>
        <div class="ball-dot"></div>
      </div>
    </div>

  </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/overlays/overlay-utils.js"></script>
<script src="/overlays/overlay-handlers.js"></script>
      <script src="/overlays/engine.js"></script>
<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  let eventTimer = null;
  let decisionPendingState = false;

  const safeSet = (id, val, fallback) => {
    const el = $(id);
    if (!el) return;
    const v = (val != null && val !== '') ? val : (fallback !== undefined ? fallback : '');
    el.innerText = String(v);
  };

  function processData(d) {
    if (!d) return;

    const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0, 4).toUpperCase();
    safeSet('teamName',      tName);
    safeSet('teamScore',     d.team1Score    ?? d.teamScore,    0);
    safeSet('teamWickets',   d.team1Wickets  ?? d.teamWickets,  0);
    safeSet('teamOvers',     d.team1Overs    ?? d.teamOvers,    '0.0');

    safeSet('strikerName',   d.strikerName,    'Striker');
    safeSet('strikerRuns',   d.strikerRuns,    0);
    safeSet('strikerBalls',  d.strikerBalls,   0);

    safeSet('nonStrikerName',  d.nonStrikerName,  'Non-Striker');
    safeSet('nonStrikerRuns',  d.nonStrikerRuns,  0);
    safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

    safeSet('bowlerName',    d.bowlerName,    'Bowler');
    safeSet('bowlerRuns',    d.bowlerRuns,    0);
    safeSet('bowlerWickets', d.bowlerWickets, 0);
    safeSet('bowlerOvers',   d.bowlerOvers,   '0.0');

    // Ball renderer
    if (typeof window.renderCurrentOver === 'function') {
      window.renderCurrentOver(d.thisOver || []);
    }
  }

  function handleTrigger(t) {
    const evFour     = $('ev-four');
    const evSix      = $('ev-six');
    const evOut      = $('ev-out');
    const evDecision = $('ev-decision');
    if (!evFour || !evSix || !evOut || !evDecision) return;

    // Clear all active animations first
    evFour.classList.remove('fire');
    evSix.classList.remove('fire');
    evOut.classList.remove('fire');
    clearTimeout(eventTimer);

    if (t.type === 'FOUR') {
      evFour.classList.add('fire');
      eventTimer = setTimeout(() => evFour.classList.remove('fire'), 3000);
    } else if (t.type === 'SIX') {
      evSix.classList.add('fire');
      eventTimer = setTimeout(() => evSix.classList.remove('fire'), 3000);
    } else if (t.type === 'WICKET') {
      evOut.classList.add('fire');
      eventTimer = setTimeout(() => evOut.classList.remove('fire'), 3000);
    } else if (t.type === 'DECISION_PENDING') {
      decisionPendingState = (t.data && t.data.active !== false);
      evDecision.classList.toggle('fire', decisionPendingState);
      // sharedHandleTrigger NOT called — evDecision handles DECISION_PENDING natively
    } else if (t.type === 'RESTORE') {
      decisionPendingState = false;
      evDecision.classList.remove('fire');
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'UPDATE_SCORE' && e.data.data) {
      processData(e.data.data);
    }
    if (e.data.type === 'OVERLAY_TRIGGER' && e.data.payload) {
      handleTrigger(e.data.payload);
    }
  });
})();
</script>
</body>
</html>
