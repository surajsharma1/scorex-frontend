<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 Yellow Impact</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@700;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; text-transform: uppercase;}
    body { background: transparent; overflow: hidden; color: #171717; }
    
    #static-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: #fde047; color: #171717; font-family: 'Righteous', cursive;
      font-size: 15px; letter-spacing: 2px; padding: 6px 30px;
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
      box-shadow: 5px 5px 0 rgba(0,0,0,0.8);
    }

    /* Extreme diagonal cuts */
    #bottom-bar {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 75px;
      display: flex; filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.5));
    }
    
    .panel { display: flex; align-items: center; padding: 0 40px; }
    .p-score { background: #fde047; min-width: 300px; justify-content: space-between; clip-path: polygon(0 0, 100% 0, calc(100% - 40px) 100%, 0 100%); z-index: 3; }
    .p-bat { background: #171717; color: #fff; flex: 1; justify-content: space-around; clip-path: polygon(40px 0, 100% 0, calc(100% - 40px) 100%, 0 100%); margin-left: -40px; padding-left: 80px; z-index: 2;}
    .p-bowl { background: #e5e5e5; min-width: 350px; justify-content: space-between; clip-path: polygon(40px 0, 100% 0, 100% 100%, 0 100%); margin-left: -40px; padding-left: 80px; z-index: 1;}

    .tm { font-family: 'Righteous', cursive; font-size: 28px; }
    .sc { font-family: 'Righteous', cursive; font-size: 50px; line-height: 1; }
    .sc span { font-size: 26px; color: #a16207; }
    .ov { font-size: 14px; font-weight: 900; color: #a16207; margin-left: 10px;}
    
    .pn { font-size: 22px; font-weight: 900; }
    .ps { font-family: 'Righteous', cursive; font-size: 38px; color: #fde047; margin-left: 10px; line-height: 1;}
    .pb { font-size: 14px; color: #737373; font-weight: 700;}
    .lbl { font-size: 12px; color: #a3a3a3; font-weight: 900; margin-bottom: 2px;}
  </style>
</head>
<body>
  <div id="static-island">SCOREX-LIVE.VERCEL.APP</div>
  <div id="bottom-bar">
    <div class="panel p-score">
      <div id="teamName" class="tm">TEAM</div>
      <div style="display:flex; align-items:baseline;">
        <div class="sc"><span id="teamScore">0</span><span>/</span><span id="teamWickets">0</span></div>
        <div class="ov">OV <span id="teamOvers">0.0</span></div>
      </div>
    </div>
    <div class="panel p-bat">
      <div style="display:flex; align-items:baseline;">
        <span style="color:#fde047; margin-right:8px;">▶</span>
        <span id="strikerName" class="pn">Striker</span><span id="strikerRuns" class="ps">0</span> <span class="pb">(<span id="strikerBalls">0</span>)</span>
      </div>
      <div style="display:flex; align-items:baseline; opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Non-Striker</span><span id="nonStrikerRuns" class="ps" style="color:#fff;">0</span>
      </div>
    </div>
    <div class="panel p-bowl">
      <div style="display:flex; flex-direction:column;"><span class="lbl">Bowler</span><span id="bowlerName" class="pn">Bowler Name</span></div>
      <div style="display:flex; align-items:baseline;">
        <span class="ps" style="color:#171717;"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></span> <span class="pb" style="margin-left:10px;">OV <span id="bowlerOvers">0.0</span></span>
      </div>
    </div>
  </div>
  <script>
    const $ = id => document.getElementById(id);

    function processData(d) {
      if (!d) return;
      
      // Safe DOM updater to handle missing data without crashing or printing "undefined"
      const safeSet = (id, val, fallback) => {
        const el = $(id);
        if (el) el.innerText = val != null ? val : fallback;
      };

      // Team Stats
      safeSet('teamName', d.team1Name || d.teamName, 'TEAM');
      safeSet('teamScore', d.team1Score ?? d.teamScore, 0);
      safeSet('teamWickets', d.team1Wickets ?? d.teamWickets, 0);
      safeSet('teamOvers', d.team1Overs ?? d.teamOvers, '0.0');

      // Striker Stats
      safeSet('strikerName', d.strikerName, 'Striker');
      safeSet('strikerRuns', d.strikerRuns, 0);
      safeSet('strikerBalls', d.strikerBalls, 0);

      // Non-Striker Stats
      safeSet('nonStrikerName', d.nonStrikerName, 'Non-Striker');
      safeSet('nonStrikerRuns', d.nonStrikerRuns, 0);

      // Bowler Stats
      safeSet('bowlerName', d.bowlerName, 'Bowler');
      safeSet('bowlerRuns', d.bowlerRuns, 0);
      safeSet('bowlerWickets', d.bowlerWickets, 0);
      safeSet('bowlerOvers', d.bowlerOvers, '0.0');
    }

    // 1. Listen for postMessage from engine.js or PreviewStudio.tsx
    window.addEventListener('message', e => { 
      if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
    });

    // 2. Listen for custom events
    window.addEventListener('scorex:update', e => { 
      if (e.detail) processData(e.detail); 
    });

    // 3. Listen for BroadcastChannel
    if ('BroadcastChannel' in window) {
      const channel = new BroadcastChannel('scorex_overlay_channel');
      channel.onmessage = e => { 
        if (e.data?.type === 'UPDATE_SCORE') processData(e.data.data); 
      };
    }
  </script>
</body>
</html>
