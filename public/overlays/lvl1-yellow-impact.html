<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 1 IPL Mega (Full Width & Animated)</title>
  <style>
    /* Classic sports broadcast fonts */
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700;900&family=Teko:wght@500;600;700&display=swap');

    :root {
      --ipl-navy: #06112a;
      --ipl-blue: #0f2a63;
      --ipl-blue-light: #1e40af;
      
      --ipl-gold: #fbbf24;
      --ipl-gold-dark: #b45309;
      --ipl-gold-grad: linear-gradient(180deg, #fde68a 0%, #fbbf24 50%, #d97706 100%);
      
      --ipl-white: #ffffff;
      --ipl-gray: #94a3b8;
      --ipl-red: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; text-transform: uppercase; }
    
    body { 
      background: transparent; 
      overflow: hidden; 
      color: var(--ipl-white);
      font-family: 'Roboto Condensed', sans-serif;
    }

    /* Animations */
    @keyframes barReveal {
      0% { transform: translateY(150px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes goldSweep {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes pulseActive {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Top Static Island */
    #ipl-island {
      position: absolute; 
      top: 15px; 
      left: 50%; 
      transform: translateX(-50%);
      background: var(--ipl-navy);
      color: var(--ipl-gold);
      font-family: 'Teko', sans-serif;
      font-size: 22px; 
      font-weight: 600; 
      letter-spacing: 3px;
      padding: 4px 50px;
      border: 1px solid var(--ipl-gold-dark);
      border-radius: 4px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.8);
      animation: barReveal 0.5s ease-out forwards;
    }

    /* Bottom Bar Wrapper - EDGE TO EDGE */
    #ipl-bottom {
      position: absolute; 
      bottom: 0; /* Flush to bottom */
      left: 0; 
      width: 100vw; /* Flush to sides */
      display: flex; 
      justify-content: center;
      padding: 0;
      filter: drop-shadow(0 -10px 25px rgba(0,0,0,0.8));
    }

    /* The Main Mega Bar */
    .ipl-mega-container {
      display: flex;
      width: 100%;
      background: var(--ipl-navy);
      border-top: 3px solid var(--ipl-gold);
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(15, 42, 99, 0.9);
      animation: barReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* 1. Score Component */
    .ipl-score-zone {
      flex: 1;
      display: flex;
      background: linear-gradient(135deg, var(--ipl-blue), var(--ipl-navy));
      border-right: 3px solid var(--ipl-gold);
      position: relative;
    }

    .t-name-box {
      background: var(--ipl-gold-grad);
      color: var(--ipl-navy);
      padding: 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Teko', sans-serif;
      font-size: 45px;
      font-weight: 700;
      letter-spacing: 1px;
      min-width: 140px;
      position: relative;
      overflow: hidden;
    }
    
    .t-name-box::after {
      content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-20deg); animation: goldSweep 3s infinite linear;
    }

    .t-score-box {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 0;
    }

    .sc { font-family: 'Teko', sans-serif; font-size: 70px; font-weight: 700; line-height: 0.75; text-shadow: 2px 2px 0px #000;}
    .sc span { font-size: 40px; color: var(--ipl-gray); margin: 0 4px; }
    
    .ov-box {
      margin-top: 8px; background: rgba(0,0,0,0.5); padding: 2px 15px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1); font-size: 16px; font-weight: 700; color: var(--ipl-gold);
    }
    .ov-box span { color: var(--ipl-white); font-size: 18px; margin-left: 6px; }

    /* 2. Batting Component */
    .ipl-bat-zone {
      flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid var(--ipl-blue-light);
    }

    .bat-row {
      flex: 1; display: flex; align-items: center; padding: 0 30px; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .bat-row:last-child { border-bottom: none; background: rgba(0,0,0,0.2); }

    .bat-icon { color: var(--ipl-gold); font-size: 14px; margin-right: 12px; animation: pulseActive 1.5s infinite; }

    .b-name { flex: 1; font-size: 22px; font-weight: 700; }
    .b-runs { font-family: 'Teko', sans-serif; font-size: 45px; font-weight: 600; width: 60px; text-align: right; line-height: 1;}
    .b-balls { font-size: 16px; color: var(--ipl-gray); width: 50px; text-align: right; font-weight: 700;}
    
    .bat-row.inactive .b-name, .bat-row.inactive .b-runs { color: var(--ipl-gray); }

    /* 3. Bowling Component */
    .ipl-bowl-zone { flex: 1.2; display: flex; flex-direction: column; }
    .bowl-header { background: var(--ipl-blue-light); color: var(--ipl-white); font-size: 14px; font-weight: 700; padding: 4px 30px; letter-spacing: 1px; }

    .bowl-data { flex: 1; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
    .bw-name { font-size: 22px; font-weight: 700; flex: 1; }
    .bw-fig { font-family: 'Teko', sans-serif; font-size: 48px; font-weight: 600; color: var(--ipl-gold); line-height: 1; }
    .bw-fig span { margin: 0 4px; }
    .bw-ov { font-size: 16px; color: var(--ipl-gray); font-weight: 700; margin-left: 20px; }

    .this-over-tracker { padding: 8px 30px 10px 30px; background: rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; }
    .this-over-tracker span { font-size: 13px; color: var(--ipl-gray); font-weight: 700; margin-right: 10px; }
    .ball-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--ipl-blue-light); background: rgba(255,255,255,0.1); }
    .ball-dot.fill { background: var(--ipl-white); border-color: var(--ipl-white); }


    /* =========================================
       4. EVENT ANIMATIONS (4, 6, OUT, DECISION)
       ========================================= */
    .event-layer { position: absolute; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;}
    
    .anim-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-family: 'Teko', sans-serif; font-size: 180px; font-weight: 700; line-height: 1;
      text-align: center; opacity: 0; text-shadow: 4px 4px 0 #000, 0 20px 40px rgba(0,0,0,0.8); font-style: italic;
    }
    
    .anim-event.fire { animation: smashIn 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    #ev-four { color: #38bdf8; -webkit-text-stroke: 4px var(--ipl-blue); }
    #ev-six { color: var(--ipl-gold); -webkit-text-stroke: 4px var(--ipl-gold-dark); font-size: 220px; }
    #ev-out { color: var(--ipl-red); -webkit-text-stroke: 4px #fff; }

    /* Decision Pending Radar */
    #ev-decision {
      position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
      background: rgba(6, 17, 42, 0.95); border: 3px solid var(--ipl-gold); border-radius: 8px;
      padding: 25px 80px; opacity: 0; transition: opacity 0.3s; text-align: center; pointer-events: none;
    }
    #ev-decision.fire { opacity: 1; animation: radarPulse 1.5s infinite; }
    .d-title { font-size: 22px; color: #cbd5e1; letter-spacing: 8px; margin-bottom: 5px; font-weight: 700;}
    .d-text { font-family: 'Teko', sans-serif; font-size: 85px; color: var(--ipl-gold); line-height: 1; white-space: nowrap;}

    @keyframes smashIn {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) translateY(-50px); opacity: 0; }
    }

    @keyframes radarPulse { 
      0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 
      70% { box-shadow: 0 0 0 50px rgba(251, 191, 36, 0); } 
      100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } 
    }

  </style>
</head>
<body>

  <div class="event-layer">
    <div id="ev-four" class="anim-event">FOUR!</div>
    <div id="ev-six" class="anim-event">SIX!</div>
    <div id="ev-out" class="anim-event">OUT!</div>
    <div id="ev-decision">
      <div class="d-title">THIRD UMPIRE</div>
      <div class="d-text">DECISION PENDING</div>
    </div>
  </div>

  <div id="ipl-island">T20 PREMIUM BROADCAST</div>

  <div id="ipl-bottom">
    <div class="ipl-mega-container">
      
      <div class="ipl-score-zone">
        <div class="t-name-box" id="teamName">TM</div>
        <div class="t-score-box">
          <div class="sc"><span id="teamScore" style="color:#fff; margin:0;">0</span><span>/</span><span id="teamWickets">0</span></div>
          <div class="ov-box">OVERS <span id="teamOvers">0.0</span></div>
        </div>
      </div>

      <div class="ipl-bat-zone">
        <div class="bat-row">
          <div class="bat-icon">▶</div>
          <div class="b-name" id="strikerName">Striker Name</div>
          <div class="b-runs" id="strikerRuns">0</div>
          <div class="b-balls">(<span id="strikerBalls">0</span>)</div>
        </div>
        <div class="bat-row inactive">
          <div class="bat-icon" style="opacity: 0;">▶</div>
          <div class="b-name" id="nonStrikerName">Non-Striker</div>
          <div class="b-runs" id="nonStrikerRuns">0</div>
          <div class="b-balls">(<span id="nonStrikerBalls">0</span>)</div>
        </div>
      </div>

      <div class="ipl-bowl-zone">
        <div class="bowl-header">CURRENT BOWLER</div>
        <div class="bowl-data">
          <div class="bw-name" id="bowlerName">Bowler Name</div>
          <div class="bw-fig"><span id="bowlerWickets">0</span><span style="color:var(--ipl-white); font-size:35px;">-</span><span id="bowlerRuns">0</span></div>
          <div class="bw-ov">OV <span id="bowlerOvers" style="color:var(--ipl-white);">0.0</span></div>
        </div>
        <div class="this-over-tracker" id="this-over">
          <span>THIS OVER</span>
          <div class="ball-dot"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="/overlays/overlay-utils.js"></script>
<script src="/overlays/engine.js"></script>
<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  let eventTimer = null;
  let decisionPendingState = false;

  const safeSet = (id, val, fallback) => {
    const el = $(id);
    if (!el) return;
    const v = (val != null && val !== '') ? val : (fallback !== undefined ? fallback : '');
    el.innerText = String(v);
  };

  function processData(d) {
    if (!d) return;

    const tName = d.team1ShortName || (d.team1Name || d.teamName || 'TEAM').substring(0, 4).toUpperCase();
    safeSet('teamName',      tName);
    safeSet('teamScore',     d.team1Score    ?? d.teamScore,    0);
    safeSet('teamWickets',   d.team1Wickets  ?? d.teamWickets,  0);
    safeSet('teamOvers',     d.team1Overs    ?? d.teamOvers,    '0.0');

    safeSet('strikerName',   d.strikerName,    'Striker');
    safeSet('strikerRuns',   d.strikerRuns,    0);
    safeSet('strikerBalls',  d.strikerBalls,   0);

    safeSet('nonStrikerName',  d.nonStrikerName,  'Non-Striker');
    safeSet('nonStrikerRuns',  d.nonStrikerRuns,  0);
    safeSet('nonStrikerBalls', d.nonStrikerBalls, 0);

    safeSet('bowlerName',    d.bowlerName,    'Bowler');
    safeSet('bowlerRuns',    d.bowlerRuns,    0);
    safeSet('bowlerWickets', d.bowlerWickets, 0);
    safeSet('bowlerOvers',   d.bowlerOvers,   '0.0');

    // Ball renderer
    if (typeof window.renderCurrentOver === 'function') {
      window.renderCurrentOver(d.thisOver || []);
    }
  }

  function handleTrigger(t) {
    const evFour     = $('ev-four');
    const evSix      = $('ev-six');
    const evOut      = $('ev-out');
    const evDecision = $('ev-decision');
    if (!evFour || !evSix || !evOut || !evDecision) return;

    // Clear all active animations first
    evFour.classList.remove('fire');
    evSix.classList.remove('fire');
    evOut.classList.remove('fire');
    clearTimeout(eventTimer);

    if (t.type === 'FOUR') {
      evFour.classList.add('fire');
      eventTimer = setTimeout(() => evFour.classList.remove('fire'), 3000);
    } else if (t.type === 'SIX') {
      evSix.classList.add('fire');
      eventTimer = setTimeout(() => evSix.classList.remove('fire'), 3000);
    } else if (t.type === 'WICKET') {
      evOut.classList.add('fire');
      eventTimer = setTimeout(() => evOut.classList.remove('fire'), 3000);
    } else if (t.type === 'DECISION_PENDING') {
      decisionPendingState = (t.data && t.data.active !== false);
      evDecision.classList.toggle('fire', decisionPendingState);
      if (window.sharedHandleTrigger) window.sharedHandleTrigger('DECISION_PENDING', { active: decisionPendingState }, 0);
    } else if (t.type === 'RESTORE') {
      decisionPendingState = false;
      evDecision.classList.remove('fire');
    }
  }

  window.addEventListener('message', function(e) {
    if (!e.data) return;
    if (e.data.type === 'UPDATE_SCORE' && e.data.data) {
      processData(e.data.data);
    }
    if (e.data.type === 'OVERLAY_TRIGGER' && e.data.payload) {
      handleTrigger(e.data.payload);
    }
  });
})();
</script>
</body>
</html>
