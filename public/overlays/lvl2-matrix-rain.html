<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Matrix Rain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier Prime', monospace; }
    body { background: transparent; overflow: hidden; color: #0f0; }

    /* Terminal Island */
    #matrix-island {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 50, 0, 0.8); color: #0f0;
      padding: 5px 20px; font-size: 16px; font-weight: 700;
      border: 1px solid #0f0; box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0;
    }

    /* Terminal Event Popup */
    #matrix-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
      background: #000; color: #0f0;
      font-size: 90px; font-weight: 700; letter-spacing: 5px;
      padding: 10px 40px; border: 2px dashed #0f0;
      box-shadow: 0 0 30px #0f0;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
    }
    #matrix-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Bottom Terminal Bar */
    #matrix-bottom {
      position: absolute; bottom: 20px; left: 5%; width: 90%; height: 80px;
      display: flex; gap: 10px;
    }

    .term-box {
      background: rgba(0, 15, 0, 0.95); border: 1px solid #0f0;
      display: flex; flex-direction: column; justify-content: center; padding: 0 20px;
      position: relative; overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    }
    /* Subtle scanline effect inside the boxes */
    .term-box::after {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.1) 2px, rgba(0,255,0,0.1) 4px);
      pointer-events: none;
    }

    .m-score { min-width: 250px; border-left: 5px solid #0f0; }
    .m-bat { flex: 1; flex-direction: row; align-items: center; justify-content: space-around; }
    .m-bowl { min-width: 280px; border-right: 5px solid #0f0; }

    .t-lbl { font-size: 12px; color: #0a0; margin-bottom: 2px; }
    .t-main { font-size: 24px; font-weight: 700; color: #fff; text-shadow: 0 0 5px #0f0;}
    .t-hl { font-size: 36px; font-weight: 700; line-height: 1; }
    .t-sub { font-size: 16px; color: #0a0; }

    .strike-cmd::before { content: '> '; color: #fff; animation: blink 1s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  </style>
</head>
<body>

  <div id="matrix-island">[ SYS.INIT: TOURNAMENT ]</div>
  <div id="matrix-event"></div>

  <div id="matrix-bottom">
    
    <div class="term-box m-score">
      <div class="t-lbl">TARGET_ENTITY</div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span id="teamName" class="t-main">HACKERS</span>
        <span class="t-hl"><span id="teamScore">128</span><span style="font-size:24px;color:#0a0;">/</span><span id="teamWickets">2</span></span>
      </div>
      <div class="t-lbl" style="text-align:right; margin-top:2px;">CYCLES: <span id="teamOvers">12.4</span></div>
    </div>

    <div class="term-box m-bat">
      <div style="display:flex; flex-direction:column;">
        <span id="strikerName" class="t-main strike-cmd">N. Anderson</span>
        <div><span id="strikerRuns" class="t-hl">45</span> <span class="t-sub">(<span id="strikerBalls">22</span>)</span></div>
      </div>
      <div style="display:flex; flex-direction:column; opacity:0.7;">
        <span id="nonStrikerName" class="t-main">M. Smith</span>
        <div><span id="nonStrikerRuns" class="t-hl" style="font-size:28px;">18</span> <span class="t-sub">(<span id="nonStrikerBalls">14</span>)</span></div>
      </div>
    </div>

    <div class="term-box m-bowl">
      <div class="t-lbl">EXECUTING_PROCESS: BOWL</div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span id="bowlerName" class="t-main">Agent_01</span>
        <span class="t-hl"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">24</span></span>
      </div>
      <div class="t-lbl" style="text-align:right; margin-top:2px;">CYC: <span id="bowlerOvers">2.4</span></div>
    </div>

  </div>

  <script>
    let mSc = -1, mWk = -1, mSt = 0, mDat = {};
    const set = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function sysPop(txt) {
      const e = document.getElementById('matrix-event');
      e.innerText = `[ ${txt} ]`; e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const el = document.getElementById('matrix-island');
      if(!mDat.tournamentName) return;
      mSt = (mSt + 1) % 3;
      if(mSt === 0) el.innerText = `[ ${mDat.tournamentName} ]`;
      else if(mSt === 1) el.innerText = `[ FLOW_RATE: ${mDat.runRate||'0.0'} ]`;
      else el.innerText = mDat.target > 0 ? `[ OBJ_TARGET: ${mDat.target} ]` : `[ STATUS: ACTIVE ]`;
    }, 4000);

    function rx(d) {
      mDat = d;
      set('teamName', d.team1Name); set('teamScore', d.team1Score); set('teamWickets', d.team1Wickets); set('teamOvers', d.team1Overs);
      set('strikerName', d.strikerName); set('strikerRuns', d.strikerRuns); set('strikerBalls', d.strikerBalls);
      set('nonStrikerName', d.nonStrikerName); set('nonStrikerRuns', d.nonStrikerRuns); set('nonStrikerBalls', d.nonStrikerBalls);
      set('bowlerName', d.bowlerName); set('bowlerRuns', d.bowlerRuns); set('bowlerWickets', d.bowlerWickets); set('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (mSc !== -1) {
        if (nw > mWk) sysPop("PROCESS_TERMINATED");
        else if (ns - mSc === 6) sysPop("CRITICAL_HIT: 6");
        else if (ns - mSc === 4) sysPop("OVERFLOW: 4");
      }
      mSc = ns; mWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
