<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Cyberpunk Yellow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; font-family: 'Chakra Petch', sans-serif; }

    /* Variables */
    :root { --cy-yellow: #f3e600; --cy-dark: #0d0d0d; --cy-cyan: #00ffcc; --cy-red: #ff003c; }

    /* Top Angular Island */
    #cp-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--cy-yellow); color: var(--cy-dark);
      padding: 4px 40px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
      border-bottom: 3px solid var(--cy-dark);
    }

    /* Glitch Alert Popup */
    #cp-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
      background: var(--cy-dark); color: var(--cy-yellow);
      font-family: 'Bebas Neue', sans-serif; font-size: 120px; letter-spacing: 5px;
      padding: 10px 60px; clip-path: polygon(0 0, 95% 0, 100% 20%, 100% 100%, 5% 100%, 0 80%);
      border: 4px solid var(--cy-cyan);
      opacity: 0; transition: all 0.2s ease-out;
    }
    #cp-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Bottom Industrial Bar */
    #cp-bottom {
      position: absolute; bottom: 20px; left: 2%; width: 96%; height: 95px;
      display: flex; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
    }

    .cp-sec { display: flex; align-items: center; padding: 0 30px; }

    /* Score Section (Yellow) */
    .s-score {
      background: var(--cy-yellow); color: var(--cy-dark); min-width: 280px; justify-content: space-between;
      clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); z-index: 3;
    }
    .cp-tm { font-family: 'Bebas Neue', sans-serif; font-size: 42px; margin-top: 5px;}
    .cp-sc { font-family: 'Bebas Neue', sans-serif; font-size: 58px; line-height: 0.8;}
    .cp-sc span { font-size: 28px; }
    .cp-ov { font-size: 15px; font-weight: 700; text-align: right; letter-spacing: 1px;}

    /* Batting Section (Dark) */
    .s-bat {
      background: var(--cy-dark); color: #fff; flex: 1; justify-content: space-around;
      clip-path: polygon(25px 0, 100% 0, calc(100% - 25px) 100%, 0 100%); z-index: 2; margin-left: -35px; padding-left: 50px;
      border-top: 2px solid var(--cy-cyan); border-bottom: 2px solid var(--cy-cyan);
    }
    .bat-block { display: flex; align-items: baseline; gap: 12px; }
    .pn { font-size: 22px; font-weight: 700; text-transform: uppercase;}
    .pr { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--cy-cyan); line-height: 0.8;}
    .pb { font-size: 15px; color: #888; font-weight: 700;}
    .strike { color: var(--cy-yellow); font-size: 16px; margin-right: -4px;}

    /* Bowling Section (Grey/Red) */
    .s-bowl {
      background: #222; color: #fff; min-width: 320px; justify-content: space-between;
      clip-path: polygon(25px 0, 100% 0, 100% 100%, 0 100%); z-index: 1; margin-left: -35px; padding-left: 50px;
      border-right: 8px solid var(--cy-red);
    }

  </style>
</head>
<body>

  <div id="cp-island">SYS_DATA: CONNECTED</div>
  <div id="cp-event"></div>

  <div id="cp-bottom">
    
    <div class="cp-sec s-score">
      <span id="teamName" class="cp-tm">CORP</span>
      <div style="text-align:right;">
        <div class="cp-sc"><span id="teamScore">208</span><span>/</span><span id="teamWickets">5</span></div>
        <div class="cp-ov">OV <span id="teamOvers">19.4</span></div>
      </div>
    </div>

    <div class="cp-sec s-bat">
      <div class="bat-block">
        <span class="strike">▶</span>
        <span id="strikerName" class="pn">Player V</span>
        <span id="strikerRuns" class="pr">77</span>
        <span class="pb">(<span id="strikerBalls">41</span>)</span>
      </div>
      <div class="bat-block" style="opacity: 0.5;">
        <span id="nonStrikerName" class="pn">Jackie</span>
        <span id="nonStrikerRuns" class="pr" style="color: #fff;">14</span>
        <span class="pb">(<span id="nonStrikerBalls">8</span>)</span>
      </div>
    </div>

    <div class="cp-sec s-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="pb" style="color:var(--cy-red);">BOWL_EXEC</span>
        <span id="bowlerName" class="pn">Smasher</span>
      </div>
      <div class="bat-block">
        <span class="pr" style="color:var(--cy-yellow);"><span id="bowlerWickets">2</span>-<span id="bowlerRuns">38</span></span>
        <span class="pb">OV <span id="bowlerOvers">3.4</span></span>
      </div>
    </div>

  </div>

  <script>
    let cSc = -1, cWk = -1, cSt = 0, cDat = {};
    const sd = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function cyberPop(txt, bg, col, brd) {
      const e = document.getElementById('cp-event');
      e.innerText = txt; e.style.background = bg; e.style.color = col; e.style.borderColor = brd;
      e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('cp-island');
      if(!cDat.tournamentName) return;
      cSt = (cSt + 1) % 3;
      if(cSt === 0) isl.innerText = "SYS_DATA: " + cDat.tournamentName;
      else if(cSt === 1) isl.innerText = "FLOW_RATE: " + (cDat.runRate||'0.0');
      else isl.innerText = cDat.target > 0 ? "OBJ_TARGET: " + cDat.target : "LINK_ACTIVE";
    }, 4000);

    function handleData(d) {
      cDat = d;
      sd('teamName', d.team1Name); sd('teamScore', d.team1Score); sd('teamWickets', d.team1Wickets); sd('teamOvers', d.team1Overs);
      sd('strikerName', d.strikerName); sd('strikerRuns', d.strikerRuns); sd('strikerBalls', d.strikerBalls);
      sd('nonStrikerName', d.nonStrikerName); sd('nonStrikerRuns', d.nonStrikerRuns); sd('nonStrikerBalls', d.nonStrikerBalls);
      sd('bowlerName', d.bowlerName); sd('bowlerRuns', d.bowlerRuns); sd('bowlerWickets', d.bowlerWickets); sd('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (cSc !== -1) {
        if (nw > cWk) cyberPop("CRITICAL: WICKET", "var(--cy-red)", "#fff", "#111");
        else if (ns - cSc === 6) cyberPop("MAXIMUM: 6", "var(--cy-dark)", "var(--cy-yellow)", "var(--cy-cyan)");
        else if (ns - cSc === 4) cyberPop("BOUNDARY: 4", "var(--cy-cyan)", "#111", "var(--cy-dark)");
      }
      cSc = ns; cWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') handleData(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') handleData(e.data.data); };
  </script>
</body>
</html>
