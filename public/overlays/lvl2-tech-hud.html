<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Stadium LED</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: transparent; overflow: hidden; 
      font-family: 'Share Tech Mono', monospace; 
      text-transform: uppercase; color: #ff9900; 
    }

    /* Simulate physical LED Grid */
    .led-bg {
      background-color: #0a0a0a;
      background-image: radial-gradient(#222 1px, transparent 1px);
      background-size: 4px 4px;
      border: 4px solid #111;
      box-shadow: 0 0 20px rgba(255, 153, 0, 0.2), inset 0 0 15px rgba(0,0,0,0.9);
    }

    /* Top LED Screen */
    #led-island {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      padding: 8px 35px; font-size: 18px; letter-spacing: 4px;
      text-shadow: 0 0 8px #ff9900;
    }

    /* Giant LED Flash */
    #led-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 120px; text-shadow: 0 0 20px #ff9900, 0 0 40px #ff9900;
      opacity: 0; pointer-events: none;
    }
    #led-event.show { opacity: 1; animation: flicker 0.1s infinite; }
    @keyframes flicker { 0% {opacity:0.8;} 100% {opacity:1;} }

    /* Bottom Main Board */
    #led-bottom {
      position: absolute; bottom: 25px; left: 5%; width: 90%; height: 95px;
      display: flex; gap: 8px;
    }

    .l-panel { display: flex; align-items: center; padding: 0 20px; }

    /* Score Module */
    .c-score { min-width: 250px; justify-content: space-between; border-right: 2px solid #333; }
    .t-name { font-size: 30px; text-shadow: 0 0 8px #ff9900;}
    .t-runs { font-size: 52px; line-height: 1; text-shadow: 0 0 12px #ff9900;}
    .t-ov { font-size: 16px; color: #cc7a00; }

    /* Player Module */
    .c-bat { flex: 1; justify-content: space-around; border-right: 2px solid #333;}
    .l-col { display: flex; flex-direction: column; }
    .pn { font-size: 22px; color: #cc7a00; }
    .pr { font-size: 36px; text-shadow: 0 0 10px #ff9900; line-height: 0.9;}
    .pb { font-size: 16px; color: #995c00; }
    .strike::before { content: '>'; margin-right: 8px; animation: blink 1s infinite step-end; }
    
    @keyframes blink { 50% { opacity: 0; } }

    /* Bowler Module */
    .c-bowl { min-width: 300px; justify-content: space-between; }

  </style>
</head>
<body>

  <div id="led-island" class="led-bg">SYS_ONLINE</div>
  <div id="led-event"></div>

  <div id="led-bottom" class="led-bg">
    
    <div class="l-panel c-score">
      <div class="l-col">
        <span id="teamName" class="t-name">HOME</span>
        <span class="t-ov">OV <span id="teamOvers">00.0</span></span>
      </div>
      <div class="t-runs"><span id="teamScore">000</span>-<span id="teamWickets">0</span></div>
    </div>

    <div class="l-panel c-bat">
      <div class="l-col strike">
        <span id="strikerName" class="pn">BATSMAN_1</span>
        <div><span id="strikerRuns" class="pr">00</span> <span class="pb">(<span id="strikerBalls">00</span>)</span></div>
      </div>
      <div class="l-col">
        <span id="nonStrikerName" class="pn">BATSMAN_2</span>
        <div><span id="nonStrikerRuns" class="pr" style="color:#cc7a00; text-shadow:none;">00</span> <span class="pb">(<span id="nonStrikerBalls">00</span>)</span></div>
      </div>
    </div>

    <div class="l-panel c-bowl">
      <div class="l-col">
        <span class="pb">BOWLER</span>
        <span id="bowlerName" class="pn" style="color:#ff9900;">BOWL_1</span>
      </div>
      <div class="l-col" style="text-align: right;">
        <span class="pr"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">00</span></span>
        <span class="t-ov">OV <span id="bowlerOvers">0.0</span></span>
      </div>
    </div>

  </div>

  <script>
    let ledSc = -1, ledWk = -1, ledSt = 0, ledDat = {};
    const st = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function ledPop(txt) {
      const e = document.getElementById('led-event');
      e.innerText = txt; e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('led-island');
      if(!ledDat.tournamentName) return;
      ledSt = (ledSt + 1) % 3;
      if(ledSt === 0) isl.innerText = ledDat.tournamentName;
      else if(ledSt === 1) isl.innerText = "CRR: " + (ledDat.runRate||'0.00');
      else isl.innerText = ledDat.target > 0 ? "TRG: " + ledDat.target : "PLAY";
    }, 4500);

    function rx(d) {
      ledDat = d;
      st('teamName', d.team1Name); 
      st('teamScore', String(d.team1Score).padStart(3, '0')); 
      st('teamWickets', d.team1Wickets); 
      st('teamOvers', d.team1Overs);
      
      st('strikerName', d.strikerName); st('strikerRuns', String(d.strikerRuns).padStart(2, '0')); st('strikerBalls', String(d.strikerBalls).padStart(2, '0'));
      st('nonStrikerName', d.nonStrikerName); st('nonStrikerRuns', String(d.nonStrikerRuns).padStart(2, '0')); st('nonStrikerBalls', String(d.nonStrikerBalls).padStart(2, '0'));
      
      st('bowlerName', d.bowlerName); st('bowlerRuns', String(d.bowlerRuns).padStart(2, '0')); st('bowlerWickets', d.bowlerWickets); st('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (ledSc !== -1) {
        if (nw > ledWk) ledPop("OUT!");
        else if (ns - ledSc === 6) ledPop("SIX!");
        else if (ns - ledSc === 4) ledPop("FOUR!");
      }
      ledSc = ns; ledWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
