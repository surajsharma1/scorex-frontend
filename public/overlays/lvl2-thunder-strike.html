<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Thunder Strike</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=Roboto:wght@700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { background: transparent; overflow: hidden; color: #fff; }

    /* Top Voltage Ticker */
    #thunder-island {
      position: absolute; top: 15px; left: 30px;
      background: #f1c40f; color: #111;
      font-family: 'Saira Stencil One', cursive; font-size: 20px; padding: 4px 25px;
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
      box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4);
    }

    /* Strike Event Flash */
    #thunder-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(1.5);
      font-family: 'Saira Stencil One', cursive; font-size: 130px; color: #fff;
      text-shadow: 6px 6px 0px #111, -4px -4px 0px #00e5ff;
      opacity: 0; pointer-events: none; transition: opacity 0.1s ease-in;
    }
    #thunder-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
    
    @keyframes shake { 
      10%, 90% { transform: translate(-52%, -50%) scale(1); }
      20%, 80% { transform: translate(-48%, -50%) scale(1); }
      30%, 50%, 70% { transform: translate(-54%, -50%) scale(1); }
      40%, 60% { transform: translate(-46%, -50%) scale(1); }
    }

    /* Bottom Jagged Layout */
    #thunder-bottom {
      position: absolute; bottom: 20px; left: 5%; width: 90%; height: 85px; display: flex;
      filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
    }

    .t-block { display: flex; align-items: center; padding: 0 30px; }

    /* Score Block (Cyan) */
    .b-score {
      background: #00e5ff; color: #111; min-width: 280px; justify-content: space-between;
      clip-path: polygon(0 0, 100% 0, calc(100% - 25px) 50%, 100% 100%, 0 100%); z-index: 3;
    }
    .t-tm { font-family: 'Saira Stencil One', cursive; font-size: 32px; letter-spacing: 1px;}
    .t-sc { font-size: 56px; font-weight: 900; line-height: 0.8;}
    .t-sc span { font-size: 28px; color: #333;}
    .t-ov { font-size: 15px; font-weight: 700; text-align: right; margin-top: 2px;}

    /* Batting Block (Black) */
    .b-bat {
      background: #111; flex: 1; justify-content: space-around; margin-left: -30px; padding-left: 60px;
      clip-path: polygon(25px 0, 100% 0, calc(100% - 25px) 50%, 100% 100%, 25px 100%, 0 50%); z-index: 2;
    }
    .p-row { display: flex; align-items: baseline; gap: 10px; }
    .pn { font-size: 22px; font-weight: 700; }
    .pr { font-size: 36px; font-weight: 900; color: #f1c40f; line-height: 0.8;}
    .pb { font-size: 14px; color: #888; font-weight: 700;}
    .strike { color: #00e5ff; font-size: 16px; margin-right: -4px;}

    /* Bowling Block (Dark Grey/Yellow) */
    .b-bowl {
      background: #222; min-width: 320px; justify-content: space-between; margin-left: -30px; padding-left: 60px;
      clip-path: polygon(25px 0, 100% 0, 100% 100%, 25px 100%, 0 50%); z-index: 1;
      border-right: 8px solid #f1c40f;
    }
    .bw-r { font-size: 36px; font-weight: 900; color: #fff; line-height: 0.8;}

  </style>
</head>
<body>

  <div id="thunder-island">THUNDER LEAGUE</div>
  <div id="thunder-event"></div>

  <div id="thunder-bottom">
    
    <div class="t-block b-score">
      <span id="teamName" class="t-tm">VOLTS</span>
      <div style="text-align: right;">
        <div class="t-sc"><span id="teamScore">228</span><span>/</span><span id="teamWickets">2</span></div>
        <div class="t-ov">OVERS <span id="teamOvers">18.5</span></div>
      </div>
    </div>

    <div class="t-block b-bat">
      <div class="p-row">
        <span class="strike">⚡</span>
        <span id="strikerName" class="pn">Player X</span>
        <span id="strikerRuns" class="pr">104</span>
        <span class="pb">(<span id="strikerBalls">52</span>)</span>
      </div>
      <div class="p-row" style="opacity: 0.6;">
        <span id="nonStrikerName" class="pn">Player Y</span>
        <span id="nonStrikerRuns" class="pr" style="color: #fff;">24</span>
        <span class="pb">(<span id="nonStrikerBalls">15</span>)</span>
      </div>
    </div>

    <div class="t-block b-bowl">
      <div style="display:flex; flex-direction:column;">
        <span class="pb" style="color:#00e5ff;">BOWLER</span>
        <span id="bowlerName" class="pn">Player Z</span>
      </div>
      <div class="p-row">
        <span class="bw-r"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">38</span></span>
        <span class="pb">Ov <span id="bowlerOvers">3.5</span></span>
      </div>
    </div>

  </div>

  <script>
    let thSc = -1, thWk = -1, thSt = 0, thDat = {};
    const dId = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function thunderPop(txt, bgShd) {
      const e = document.getElementById('thunder-event');
      e.innerText = txt; e.style.textShadow = `6px 6px 0px #111, -4px -4px 0px ${bgShd}`;
      e.classList.remove('show');
      void e.offsetWidth; // trigger reflow
      e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2200);
    }

    setInterval(() => {
      const isl = document.getElementById('thunder-island');
      if(!thDat.tournamentName) return;
      thSt = (thSt + 1) % 3;
      if(thSt === 0) isl.innerText = thDat.tournamentName;
      else if(thSt === 1) isl.innerText = "RATE: " + (thDat.runRate||'0.0');
      else isl.innerText = thDat.target > 0 ? "TARGET: " + thDat.target : "LIVE";
    }, 4000);

    function rx(d) {
      thDat = d;
      dId('teamName', d.team1Name); dId('teamScore', d.team1Score); dId('teamWickets', d.team1Wickets); dId('teamOvers', d.team1Overs);
      dId('strikerName', d.strikerName); dId('strikerRuns', d.strikerRuns); dId('strikerBalls', d.strikerBalls);
      dId('nonStrikerName', d.nonStrikerName); dId('nonStrikerRuns', d.nonStrikerRuns); dId('nonStrikerBalls', d.nonStrikerBalls);
      dId('bowlerName', d.bowlerName); dId('bowlerRuns', d.bowlerRuns); dId('bowlerWickets', d.bowlerWickets); dId('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (thSc !== -1) {
        if (nw > thWk) thunderPop("WICKET!", "#ff003c");
        else if (ns - thSc === 6) thunderPop("THUNDER 6!", "#f1c40f");
        else if (ns - thSc === 4) thunderPop("STRIKE 4!", "#00e5ff");
      }
      thSc = ns; thWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
