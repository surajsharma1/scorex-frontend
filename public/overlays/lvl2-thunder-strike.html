<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Thunder Strike</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Teko:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Teko', sans-serif; text-transform: uppercase; }
    body { background: transparent; overflow: hidden; color: #fff; }

    :root {
      --ts-storm: #0b0914;
      --ts-lightning: #fce114;
      --ts-electric: #00e5ff;
    }

    /* Slant Utilities */
    .slant { transform: skewX(-20deg); }
    .unslant { transform: skewX(20deg); display: block; }

    /* Top Voltage Ticker */
    #ts-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%) skewX(-20deg);
      background: var(--ts-storm); border: 2px solid var(--ts-lightning);
      color: var(--ts-lightning); padding: 4px 40px; font-size: 20px; font-weight: 700; letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(252, 225, 20, 0.4), inset 0 0 10px rgba(252, 225, 20, 0.2);
    }

    /* Lightning Flash Popup */
    #ts-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
      font-family: 'Black Ops One', cursive; font-size: 110px; color: #fff;
      text-shadow: 0 0 20px var(--ts-electric), 0 0 40px var(--ts-electric), 0 0 60px var(--ts-electric);
      opacity: 0; transition: all 0.1s ease-in; pointer-events: none;
    }
    #ts-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: flash 0.2s alternate 3; }
    
    @keyframes flash { 
      0% { filter: brightness(1); } 
      100% { filter: brightness(2) contrast(1.5); } 
    }

    /* Bottom High-Voltage Bar */
    #ts-bottom {
      position: absolute; bottom: 20px; left: 5%; width: 90%; height: 90px; display: flex;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8)); gap: 4px;
    }

    .ts-panel {
      background: var(--ts-storm); display: flex; align-items: center; padding: 0 30px;
      border-top: 3px solid var(--ts-electric); border-bottom: 3px solid var(--ts-electric);
    }

    /* Score Module */
    .p-score { 
      min-width: 260px; justify-content: space-between; border-left: 6px solid var(--ts-lightning);
      background: linear-gradient(90deg, #161129, var(--ts-storm));
    }
    .ts-tm { font-family: 'Black Ops One', cursive; font-size: 26px; color: var(--ts-lightning); letter-spacing: 1px;}
    .ts-sc { font-size: 58px; font-weight: 700; line-height: 0.8; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);}
    .ts-sc span { font-size: 32px; color: #888; text-shadow: none;}
    .ts-ov { font-size: 16px; font-weight: 700; color: #aaa; text-align: right; margin-top: 2px;}

    /* Batting Module */
    .p-bat { flex: 1; justify-content: space-around; }
    .bat-block { display: flex; align-items: baseline; gap: 12px; }
    .pn { font-size: 24px; font-weight: 700; color: #fff; }
    .pr { font-size: 40px; font-weight: 700; color: var(--ts-electric); line-height: 0.8;}
    .pb { font-size: 16px; color: #666; font-weight: 700;}
    .bolt { color: var(--ts-lightning); font-size: 20px; margin-right: -4px;}

    /* Bowling Module */
    .p-bowl { min-width: 300px; justify-content: space-between; border-right: 6px solid var(--ts-electric); }
    .bw-r { font-size: 40px; font-weight: 700; color: var(--ts-lightning); line-height: 0.8;}

  </style>
</head>
<body>

  <div id="ts-island" class="slant"><span class="unslant" id="island-text">HIGH VOLTAGE SERIES</span></div>
  <div id="ts-event"></div>

  <div id="ts-bottom">
    
    <div class="ts-panel slant p-score">
      <div class="unslant">
        <div id="teamName" class="ts-tm">STORM</div>
        <div class="ts-ov">OVERS <span id="teamOvers" style="color:#fff;">16.5</span></div>
      </div>
      <div class="unslant ts-sc"><span id="teamScore" style="color:#fff;">204</span><span>/</span><span id="teamWickets">2</span></div>
    </div>

    <div class="ts-panel slant p-bat">
      <div class="unslant bat-block">
        <span class="bolt">⚡</span>
        <span id="strikerName" class="pn">R. Sharma</span>
        <span id="strikerRuns" class="pr">88</span>
        <span class="pb">(<span id="strikerBalls">41</span>)</span>
      </div>
      <div class="unslant bat-block" style="opacity: 0.6;">
        <span id="nonStrikerName" class="pn">S. Yadav</span>
        <span id="nonStrikerRuns" class="pr" style="color: #fff;">18</span>
        <span class="pb">(<span id="nonStrikerBalls">9</span>)</span>
      </div>
    </div>

    <div class="ts-panel slant p-bowl">
      <div class="unslant" style="display:flex; flex-direction:column;">
        <span class="pb" style="color:var(--ts-electric);">BOWLER</span>
        <span id="bowlerName" class="pn">M. Starc</span>
      </div>
      <div class="unslant bat-block">
        <span class="bw-r"><span id="bowlerWickets">1</span>-<span id="bowlerRuns">30</span></span>
        <span class="pb">Ov <span id="bowlerOvers">2.5</span></span>
      </div>
    </div>

  </div>

  <script>
    let tSc = -1, tWk = -1, tSt = 0, tDat = {};
    const dId = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function flashStrike(txt, col) {
      const e = document.getElementById('ts-event');
      e.innerText = txt; e.style.textShadow = `0 0 20px ${col}, 0 0 40px ${col}, 0 0 60px #fff`;
      e.classList.remove('show');
      void e.offsetWidth; 
      e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('island-text');
      if(!tDat.tournamentName) return;
      tSt = (tSt + 1) % 3;
      if(tSt === 0) isl.innerText = tDat.tournamentName;
      else if(tSt === 1) isl.innerText = "CRR: " + (tDat.runRate||'0.0');
      else isl.innerText = tDat.target > 0 ? "TARGET: " + tDat.target : "LIVE";
    }, 4000);

    function rx(d) {
      tDat = d;
      dId('teamName', d.team1Name); dId('teamScore', d.team1Score); dId('teamWickets', d.team1Wickets); dId('teamOvers', d.team1Overs);
      dId('strikerName', d.strikerName); dId('strikerRuns', d.strikerRuns); dId('strikerBalls', d.strikerBalls);
      dId('nonStrikerName', d.nonStrikerName); dId('nonStrikerRuns', d.nonStrikerRuns); dId('nonStrikerBalls', d.nonStrikerBalls);
      dId('bowlerName', d.bowlerName); dId('bowlerRuns', d.bowlerRuns); dId('bowlerWickets', d.bowlerWickets); dId('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (tSc !== -1) {
        if (nw > tWk) flashStrike("WICKET!", "#ff003c");
        else if (ns - tSc === 6) flashStrike("THUNDER 6!", "var(--ts-lightning)");
        else if (ns - tSc === 4) flashStrike("STRIKE 4!", "var(--ts-electric)");
      }
      tSc = ns; tWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
