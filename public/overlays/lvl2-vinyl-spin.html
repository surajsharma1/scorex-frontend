<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Lvl 2 Vinyl Spin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; color: #fff; font-family: 'Outfit', sans-serif; }

    :root {
      --dj-deck: linear-gradient(180deg, #2b2b2b 0%, #111 100%);
      --dj-neon: #ff4500; /* Bright amplifier orange */
      --dj-cyan: #00e5ff;
    }

    /* Amplifier Top Screen */
    #vs-island {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: #0a0a0a; color: var(--dj-neon);
      font-family: 'Share Tech Mono', monospace; font-size: 15px; letter-spacing: 2px;
      padding: 6px 25px; border-radius: 6px; border: 1px solid #333;
      box-shadow: inset 0 0 10px rgba(255, 69, 0, 0.2);
    }

    /* DJ Drop Popup */
    #vs-event {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
      font-family: 'Outfit', sans-serif; font-size: 100px; font-weight: 900; text-transform: uppercase;
      background: var(--dj-neon); color: #111; padding: 10px 50px; border-radius: 20px;
      box-shadow: 0 20px 40px rgba(255, 69, 0, 0.5);
      opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #vs-event.show { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-3deg); }

    /* Bottom Deck */
    #vs-bottom {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 1100px; height: 90px;
      display: flex; align-items: center; justify-content: flex-end;
    }

    /* The Spinning Vinyl Record */
    .vinyl-wrapper {
      position: absolute; left: 0; bottom: -5px; /* Sticks out above and below the bar slightly */
      width: 130px; height: 130px; z-index: 10;
      filter: drop-shadow(10px 10px 15px rgba(0,0,0,0.8));
    }
    
    .vinyl {
      width: 100%; height: 100%; border-radius: 50%;
      background: repeating-radial-gradient( #111, #111 4px, #1a1a1a 5px, #1a1a1a 6px );
      border: 2px solid #000;
      display: flex; align-items: center; justify-content: center;
      animation: spin 4s linear infinite;
    }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* The Record Label (Holds the Score) */
    .vinyl-label {
      width: 65%; height: 65%; border-radius: 50%;
      background: radial-gradient(circle, #ff4500 0%, #aa2b00 100%);
      border: 3px solid #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: 'Outfit', sans-serif;
    }
    .label-hole {
      width: 8px; height: 8px; background: #000; border-radius: 50%; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    }
    .vl-sc { font-size: 28px; font-weight: 900; line-height: 1; margin-top: 8px;}
    .vl-wk { font-size: 16px; color: #ffd1b3; font-weight: 700;}

    /* The DJ Deck (Right side of the vinyl) */
    .deck-panel {
      width: calc(100% - 70px); height: 100%; /* Pushed right to make room for vinyl overlap */
      background: var(--dj-deck); border-radius: 12px;
      border: 1px solid #444; border-top: 1px solid #666;
      box-shadow: 0 15px 25px rgba(0,0,0,0.7);
      display: flex; padding-left: 70px; overflow: hidden;
    }

    .vs-sec { display: flex; align-items: center; padding: 0 25px; border-right: 1px solid #222; border-left: 1px solid #444;}
    .vs-sec:first-child { border-left: none; }
    .vs-sec:last-child { border-right: none; }

    /* Meta Deck info */
    .d-meta { min-width: 150px; flex-direction: column; justify-content: center; align-items: flex-start; }
    .d-tm { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 1px;}
    .d-ov { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--dj-neon);}

    /* Player Display (Amplifier Style) */
    .d-bat { flex: 1; justify-content: space-around; font-family: 'Share Tech Mono', monospace; }
    .amp-block { display: flex; flex-direction: column; }
    .pn { font-size: 18px; color: #aaa; }
    .pr { font-size: 32px; color: var(--dj-cyan); text-shadow: 0 0 10px rgba(0, 229, 255, 0.4); line-height: 1;}
    .pb { font-size: 14px; color: #555; }
    .strike { color: var(--dj-cyan); margin-right: 6px; }

    /* Bowler Display */
    .d-bowl { min-width: 250px; justify-content: space-between; font-family: 'Share Tech Mono', monospace;}
    .bw-r { font-size: 28px; color: var(--dj-neon); text-shadow: 0 0 10px rgba(255, 69, 0, 0.4);}

  </style>
</head>
<body>

  <div id="vs-island">TRACK: LIVE MATCH</div>
  <div id="vs-event"></div>

  <div id="vs-bottom">
    
    <div class="vinyl-wrapper">
      <div class="vinyl">
        <div class="vinyl-label">
          <div class="label-hole"></div>
          <div class="vl-sc"><span id="teamScore">0</span></div>
          <div class="vl-wk">WK: <span id="teamWickets">0</span></div>
        </div>
      </div>
    </div>

    <div class="deck-panel">
      
      <div class="vs-sec d-meta">
        <div id="teamName" class="d-tm">TEAM</div>
        <div class="d-ov">OV: <span id="teamOvers">0.0</span></div>
      </div>

      <div class="vs-sec d-bat">
        <div class="amp-block">
          <div><span class="strike">▶</span><span id="strikerName" class="pn">Player 1</span></div>
          <div><span id="strikerRuns" class="pr">0</span> <span class="pb">(<span id="strikerBalls">0</span>)</span></div>
        </div>
        <div class="amp-block">
          <div id="nonStrikerName" class="pn" style="color: #666;">Player 2</div>
          <div><span id="nonStrikerRuns" class="pr" style="color: #888; text-shadow:none;">0</span> <span class="pb">(<span id="nonStrikerBalls">0</span>)</span></div>
        </div>
      </div>

      <div class="vs-sec d-bowl">
        <div class="amp-block">
          <span class="pb">BOWL_CH</span>
          <span id="bowlerName" class="pn">Bowler X</span>
        </div>
        <div style="text-align: right;">
          <div class="bw-r"><span id="bowlerWickets">0</span>-<span id="bowlerRuns">0</span></div>
          <div class="pb">OV: <span id="bowlerOvers">0.0</span></div>
        </div>
      </div>

    </div>

  </div>

  <script>
    let vSc = -1, vWk = -1, vSt = 0, vDat = {};
    const pd = (id, val) => { const e = document.getElementById(id); if(e && val != null) e.innerText = val; };

    function dropBeat(txt, bg, col) {
      const e = document.getElementById('vs-event');
      e.innerText = txt; e.style.background = bg; e.style.color = col;
      e.classList.add('show');
      setTimeout(() => e.classList.remove('show'), 2500);
    }

    setInterval(() => {
      const isl = document.getElementById('vs-island');
      if(!vDat.tournamentName) return;
      vSt = (vSt + 1) % 3;
      if(vSt === 0) isl.innerText = "TRACK: " + vDat.tournamentName;
      else if(vSt === 1) isl.innerText = "BPM (CRR): " + (vDat.runRate||'0.0');
      else isl.innerText = vDat.target > 0 ? "TARGET: " + vDat.target : "PLAYING...";
    }, 4500);

    function rx(d) {
      vDat = d;
      pd('teamName', d.team1Name); pd('teamScore', d.team1Score); pd('teamWickets', d.team1Wickets); pd('teamOvers', d.team1Overs);
      pd('strikerName', d.strikerName); pd('strikerRuns', d.strikerRuns); pd('strikerBalls', d.strikerBalls);
      pd('nonStrikerName', d.nonStrikerName); pd('nonStrikerRuns', d.nonStrikerRuns); pd('nonStrikerBalls', d.nonStrikerBalls);
      pd('bowlerName', d.bowlerName); pd('bowlerRuns', d.bowlerRuns); pd('bowlerWickets', d.bowlerWickets); pd('bowlerOvers', d.bowlerOvers);

      let ns = parseInt(d.team1Score)||0, nw = parseInt(d.team1Wickets)||0;
      if (vSc !== -1) {
        if (nw > vWk) dropBeat("WICKET!", "#ff4500", "#111");
        else if (ns - vSc === 6) dropBeat("HUGE DROP! 6", "#00e5ff", "#111");
        else if (ns - vSc === 4) dropBeat("FOUR!", "#fff", "#111");
      }
      vSc = ns; vWk = nw;
    }

    window.addEventListener('message', e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); });
    if ('BroadcastChannel' in window) new BroadcastChannel('scorex_overlay_channel').onmessage = e => { if(e.data?.type === 'UPDATE_SCORE') rx(e.data.data); };
  </script>
</body>
</html>
