<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScoreX - Studio Tester</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
    
    #control-panel { width: 100%; height: auto; min-height: 200px; background: rgba(15, 23, 42, 1); border-bottom: 2px solid #334155; color: #fff; display: flex; flex-direction: column; z-index: 9999; flex-shrink: 0;}
    #drag-handle { background: #1e293b; padding: 10px 20px; font-weight: bold; border-bottom: 1px solid #334155; font-size: 14px; color: #3b82f6; text-transform: uppercase; letter-spacing: 2px;}
    .panel-content { padding: 15px 20px; display: flex; flex-wrap: wrap; gap: 20px; }
    
    .control-group { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 8px; padding: 10px 15px; min-width: 250px; flex: 1; }
    .section-title { font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;}
    
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    select { width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 6px; font-weight: bold;}
    button { cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 11px; text-transform: uppercase; padding: 10px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    button:hover { filter: brightness(1.2); }
    button:active { transform: scale(0.95); }

    .bg-cyan { background: #0891b2; } .bg-magenta { background: #db2777; } .bg-red { background: #dc2626; } .bg-gold { background: #d97706; } .bg-slate { background: #475569; } .bg-green { background: #16a34a; } .bg-blue { background: #2563eb; }

    #canvas-container { flex: 1; width: 100vw; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; overflow: hidden; position: relative; }
    iframe { position: absolute; width: 1920px; height: 1080px; border: none; background: transparent; transform-origin: center center; }
  </style>
</head>
<body>

  <div id="control-panel">
    <div id="drag-handle">ScoreX Broadcast Studio (Master Controls)</div>
    <div class="panel-content">
      
      <div class="control-group" style="max-width: 300px;">
        <div class="section-title">Design Theme</div>
        <select id="theme-selector" onchange="document.getElementById('overlay-frame').src = this.value; setTimeout(()=>pushScore(false), 500);">
          <option value="lvl2-2024-dynamic.html">1. Lvl 2: 2024 3D Light</option>
          <option value="lvl2-broadcast-pro.html">2. Lvl 2: Broadcast Pro (IPL Navy/Gold)</option>
          <option value="lvl2-cyber-glitch.html">3. Lvl 2: Cyber Glitch</option>
          <option value="lvl2-flame-thrower.html">4. Lvl 2: Flame Thrower</option>
          <option value="lvl2-Fluid-Ribbon.html">5. Lvl 2: Fluid Ribbon</option>
          <option value="lvl2-glass-morphism.html">6. Lvl 2: Glass Morphism</option>
          <option value="lvl2-Global-Sports-Ticker.html">7. Lvl 2: Global Sports Ticker</option>
          <option value="lvl2-hologram.html">8. Lvl 2: Hologram</option>
          <option value="lvl2-matrix-rain.html">9. Lvl 2: Matrix Rain</option>
          <option value="lvl2-neon-pulse.html">10. Lvl 2: Neon Pulse</option>
          <option value="lvl2-water-flow.html">11. Lvl 2: Water Flow</option>
          <option value="lvl2-particle-storm.html">12. Lvl 2: Particle Storm</option>
          <option value="lvl2-rgb-split.html">13. Lvl 2: RGB Split</option>

        </select>
        <button class="bg-green" style="width: 100%; margin-top:10px;" onclick="pushScore(false)">Push Live Data</button>
      </div>

      <div class="control-group">
        <div class="section-title">1. Match Startup Events</div>
        <div class="btn-grid">
          <button class="bg-slate" onclick="fire('VS_SCREEN')">Show VS Screen</button>
          <button class="bg-gold" onclick="fire('SHOW_TOSS')">Toss Result</button>
          <button class="bg-blue" style="grid-column: span 2;" onclick="fire('START_INNINGS_INTRO')">Start Innings (3-Card Popup)</button>
        </div>
      </div>

      <div class="control-group">
        <div class="section-title">2. Live Action Highlights</div>
        <div class="btn-grid">
          <button class="bg-cyan" onclick="fire('FOUR')">Score 4 (Slide)</button>
          <button class="bg-magenta" onclick="fire('SIX')">Score 6 (Pop)</button>
          <button class="bg-red" onclick="fire('WICKET')">Wicket Fall</button>
          <button class="bg-gold" onclick="fire('DECISION_PENDING')">Decision (Toggle)</button>
          <button class="bg-cyan" onclick="fire('50_RUNS')">50 Runs</button>
          <button class="bg-magenta" onclick="fire('100_RUNS')">100 Runs</button>
        </div>
      </div>

      <div class="control-group">
        <div class="section-title">3. Player Changes & Profiles</div>
        <div class="btn-grid">
          <button class="bg-slate" onclick="fire('BATSMAN_PROFILE')">Batsman Profile</button>
          <button class="bg-slate" onclick="fire('BOWLER_PROFILE')">Bowler Profile</button>
          <button class="bg-red" onclick="fire('WICKET_SWITCH')">Wicket Switch</button>
          <button class="bg-blue" onclick="fire('BATSMAN_CHANGE')">Batsman Change</button>
          <button class="bg-blue" onclick="fire('NEW_BOWLER')">Bowler Change Card</button>
        </div>
      </div>

      <div class="control-group">
        <div class="section-title">4. Full-Screen Overlays</div>
        <div class="btn-grid">
          <button class="bg-slate" onclick="fire('SHOW_SQUADS')">Teams Lineup</button>
          <button class="bg-cyan" onclick="fire('INNINGS_BREAK')">Target Break</button>
          <button class="bg-blue" onclick="fire('BATTING_CARD')">Batting Summary</button>
          <button class="bg-blue" onclick="fire('BOWLING_CARD')">Bowling Summary</button>
          <button class="bg-blue" onclick="fire('BOTH_CARDS')">Full Over Summary</button>
          <button class="bg-gold" onclick="fire('MATCH_END')">Match End</button>
          <button class="bg-red" style="background: #7f1d1d; grid-column: span 2;" onclick="fire('RESTORE')">Close Graphics / Restore</button>
        </div>
      </div>

    </div>
  </div>

  <div id="canvas-container">
    <iframe id="overlay-frame" src="lvl2-water-flow.html"></iframe>
  </div>

  <script>
    function resizeIframe() {
      const container = document.getElementById('canvas-container');
      const iframe = document.getElementById('overlay-frame');
      const scale = Math.min(container.clientWidth / 1920, container.clientHeight / 1080);
      iframe.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeIframe);
    resizeIframe();

    const iframe = document.getElementById('overlay-frame');

    const squadIndia = [
      { name: "R. Sharma", runs: 45, balls: 28, fours: 4, sixes: 2, sr: 160.7, role: '(C)' }, { name: "V. Kohli", runs: 82, balls: 45, fours: 8, sixes: 3, sr: 182.2, role: '' }, { name: "S. Yadav", runs: 12, balls: 8, fours: 2, sixes: 0, sr: 150.0, role: '' }, { name: "R. Pant", runs: 30, balls: 15, fours: 3, sixes: 2, sr: 200.0, role: '(WK)' }, { name: "H. Pandya", runs: 24, balls: 12, fours: 1, sixes: 2, sr: 200.0, role: '', overs: 3, maidens: 0, wkts: 1, econ: 8.5 }, { name: "R. Jadeja", runs: 10, balls: 5, fours: 1, sixes: 0, sr: 200.0, role: '', overs: 4, maidens: 0, wkts: 2, econ: 6.0 }, { name: "A. Patel", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 7.2 }, { name: "K. Yadav", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 6.8 }, { name: "J. Bumrah", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 1, wkts: 3, econ: 5.0 }, { name: "M. Siraj", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 8.0 }, { name: "A. Singh", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 2, econ: 7.5 }
    ];

    const squadAus = [
      { name: "T. Head", runs: 65, balls: 30, fours: 6, sixes: 4, sr: 216.6, role: '' }, { name: "D. Warner", runs: 20, balls: 15, fours: 3, sixes: 0, sr: 133.3, role: '' }, { name: "M. Marsh", runs: 45, balls: 20, fours: 4, sixes: 3, sr: 225.0, role: '', overs: 2, maidens: 0, wkts: 0, econ: 12.0 }, { name: "G. Maxwell", runs: 10, balls: 8, fours: 1, sixes: 0, sr: 125.0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 7.5 }, { name: "M. Stoinis", runs: 15, balls: 10, fours: 2, sixes: 0, sr: 150.0, role: '', overs: 3, maidens: 0, wkts: 0, econ: 9.0 }, { name: "T. David", runs: 5, balls: 4, fours: 1, sixes: 0, sr: 125.0, role: '', overs: 2, maidens: 0, wkts: 0, econ: 10.0 }, { name: "M. Wade", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '(WK)' }, { name: "P. Cummins", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '(C)', overs: 4, maidens: 0, wkts: 2, econ: 8.5 }, { name: "M. Starc", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 8.0 }, { name: "A. Zampa", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 3, econ: 6.5 }, { name: "J. Hazlewood", runs: 0, balls: 0, fours: 0, sixes: 0, sr: 0, role: '', overs: 4, maidens: 0, wkts: 1, econ: 9.0 }
    ];

    function fire(type) {
      let payload = { type: type, data: {} };

      if (type === 'VS_SCREEN') payload.data = { team1: "MUMBAI", team2: "CHENNAI" };
      if (type === 'SHOW_TOSS') payload.data = { text: "MUMBAI WON TOSS & BOWL" };
      if (type === 'START_INNINGS_INTRO') payload.data = {};
      if (type === '50_RUNS' || type === '100_RUNS') payload.data = { playerName: "R. SHARMA" };
      if (type === 'SHOW_SQUADS') payload.data = { team1Name: "MUMBAI", team2Name: "CHENNAI", team1Players: squadIndia, team2Players: squadAus };
      if (type === 'INNINGS_BREAK') payload.data = { chasingTeam: 'CHENNAI', target: 214 };
      if (type === 'WICKET_SWITCH') payload.data = { outName: "R. SHARMA", outScore: "82 (45)", inName: "S. YADAV" };
      if (type === 'BATSMAN_CHANGE') payload.data = { outName: "V. KOHLI", outScore: "RET", inName: "R. PANT" };
      if (type === 'NEW_BOWLER') payload.data = { title: "NEW BOWLING SPELL", stats: [{ label: "BOWLER", value: "J. BUMRAH" }, { label: "OVERS SO FAR", value: "0" }] };
      if (type === 'BATSMAN_PROFILE') payload.data = { title: "CURRENT BATSMAN", stats: [{ label: "BATSMAN", value: "R. SHARMA" }, { label: "RUNS", value: "82 (45)" }, { label: "STRIKE RATE", value: "182.2" }, { label: "BOUNDARIES", value: "8x4, 3x6" }] };
      if (type === 'BOWLER_PROFILE') payload.data = { title: "CURRENT BOWLING SPELL", stats: [{ label: "BOWLER", value: "P. CUMMINS" }, { label: "OVERS", value: "3.2" }, { label: "FIGURES", value: "1 - 34" }, { label: "ECONOMY", value: "10.2" }] };
      
      // Batting/Bowling Summaries
      if (type === 'BATTING_CARD') payload.data = { batsmen: squadIndia.slice(0, 4) };
      if (type === 'BOWLING_CARD') payload.data = { bowlers: squadAus.filter(p => p.overs > 0) };
      if (type === 'BOTH_CARDS') payload.data = { batsmen: squadIndia.slice(0, 4), bowlers: squadAus.filter(p => p.overs > 0) };

      if (type === 'MATCH_END') {
        payload.data = {
          team1: { name: 'MUMBAI', batsmen: squadIndia, bowlers: squadIndia.filter(p => p.overs > 0).map(p => ({...p, wickets: p.wkts})) },
          team2: { name: 'CHENNAI', batsmen: squadAus, bowlers: squadAus.filter(p => p.overs > 0).map(p => ({...p, wickets: p.wkts})) }
        };
      }

      iframe.contentWindow.postMessage({ type: 'OVERLAY_TRIGGER', payload: payload }, '*');
    }

    let total4s = 12, total6s = 5;
    function pushScore(isPreMatch = false) { 
      total4s++; total6s++;
      const mockData = {
        team1Name: "MI", team2Name: "CSK", team1Score: 213, team1Wickets: 4, team1Overs: isPreMatch ? "0.0" : "19.4",
        strikerName: isPreMatch ? "" : "R. Sharma", strikerRuns: 82, strikerBalls: 45, nonStrikerName: isPreMatch ? "" : "H. Pandya", nonStrikerRuns: 24, nonStrikerBalls: 12,
        bowlerName: isPreMatch ? "" : "P. Cummins", bowlerRuns: 34, bowlerWickets: 1, bowlerOvers: "3.4", target: 214, requiredRuns: 1, remainingBalls: 2,
        thisOver: ['1', 'W', '4', '6', '•', '1'], totalFours: total4s, totalSixes: total6s,
        sponsors: ['TATA', 'DREAM11', 'CEAT', 'RUPAY', 'UPSTOX', 'SAUDI TOURISM']
      };
      iframe.contentWindow.OVERLAY_CONFIG = { config: { islandDuration: 6, switchInterval: 8 } };
      iframe.contentWindow.postMessage({ type: 'UPDATE_SCORE', data: mockData, raw: mockData }, '*'); 
    }
    window.onload = () => setTimeout(() => pushScore(false), 500);
  </script>
</body>
</html>
